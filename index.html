<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="用完整寓言讲清复杂金融概念。每篇独立阅读，从故事进入市场机制。">
  <meta property="og:title" content="金融寓言">
  <meta property="og:description" content="先进入一个故事，再看懂背后的金融机制。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://xuxu8421.github.io/financial-fables/">
  <meta property="og:image" content="https://xuxu8421.github.io/financial-fables/assets/story-01.webp">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://xuxu8421.github.io/financial-fables/">
  <title>金融寓言｜用故事学懂金融</title>
  <style>
    :root {
      --paper:#f5f4ef;--raised:#fffefa;--ink:#17372e;--soft:#415e55;--muted:#718079;
      --teal:#147565;--teal-deep:#0c574b;--mist:#dce9ed;--coral:#d7604c;
      --gold:#dcae3c;--line:#d7ddd8;--concept:#eaf1ed;--shadow:rgba(27,48,40,.12);
      --body-size:19px;--reader-width:740px;
    }
    [data-theme="dark"] {
      --paper:#141c19;--raised:#1c2723;--ink:#eef5f1;--soft:#c5d4cd;--muted:#93a59d;
      --teal:#6ab9a8;--teal-deep:#90ccbe;--mist:#26393e;--coral:#ef8d79;
      --gold:#e6c66e;--line:#354941;--concept:#1d2a25;--shadow:rgba(0,0,0,.3);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth;overflow-x: hidden;scroll-padding-top:76px}
    body{margin:0;overflow-x: hidden;color:var(--ink);background:var(--paper);font-family:"Songti SC","STSong","Noto Serif CJK SC",serif;letter-spacing:0;transition:background-color .18s,color .18s}
    button,a{font:inherit;letter-spacing:0}button{color:inherit}[hidden]{display:none!important}
    button:focus-visible{outline:3px solid color-mix(in srgb,var(--gold) 80%,white);outline-offset:3px}

    .site-header{position:sticky;top:0;z-index:60;height:64px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 max(20px,calc((100vw - 1180px)/2));border-bottom:1px solid color-mix(in srgb,var(--line) 78%,transparent);background:color-mix(in srgb,var(--paper) 94%,transparent);backdrop-filter:blur(18px)}
    .brand-button{justify-self:start;display:inline-flex;align-items:center;gap:10px;padding:6px 8px;border:0;border-radius:6px;background:transparent;cursor:pointer;font:700 15px/1 "PingFang SC","Microsoft YaHei",sans-serif}
    .brand-button:hover,.icon-button:hover,.primary-nav button:hover{background:var(--concept)}
    .brand-mark{position:relative;width:27px;height:27px;border:2px solid var(--teal);border-radius:6px 6px 2px 6px}
    .brand-mark:before{content:"";position:absolute;left:5px;bottom:5px;width:5px;height:5px;border-radius:50%;background:var(--coral);box-shadow:8px -8px 0 var(--gold)}
    .primary-nav{display:flex;align-items:stretch;height:64px;font:650 14px/1 "PingFang SC","Microsoft YaHei",sans-serif}
    .primary-nav button{position:relative;min-width:90px;padding:0 16px;border:0;background:transparent;cursor:pointer}
    .primary-nav button[aria-current="page"]:after{content:"";position:absolute;right:16px;bottom:0;left:16px;height:3px;background:var(--coral)}
    .header-actions{justify-self:end;display:flex;align-items:center;gap:3px}
    .icon-button{width:40px;height:40px;display:inline-grid;place-items:center;border:0;border-radius:6px;background:transparent;cursor:pointer;font:650 14px/1 "PingFang SC",sans-serif}

    .home-view{min-height:calc(100vh - 64px)}
    .hero{height:clamp(560px,calc(100svh - 200px),700px);display:grid;grid-template-rows:auto minmax(230px,1fr);gap:30px;width:min(1180px,calc(100% - 44px));margin:auto;padding:42px 0 30px}
    .hero-copy{display:grid;grid-template-columns:minmax(0,1fr) minmax(300px,470px);align-items:end;gap:44px}
    .hero-kicker{margin:0 0 12px;color:var(--coral);font:700 12px/1.4 "PingFang SC",sans-serif}
    .hero h1{margin:0;font-family:"Kaiti SC","STKaiti","FangSong",serif;font-size:clamp(58px,7.2vw,96px);font-weight:600;line-height:.98;letter-spacing:0}
    .hero-intro{margin:0 0 4px;color:var(--soft);font-size:18px;line-height:1.9}
    .hero-intro strong{display:block;margin-bottom:8px;color:var(--ink);font-family:"PingFang SC",sans-serif;font-size:18px}
    .story-map{display:grid;grid-template-columns:3fr 2fr 1.35fr 1.35fr 1.35fr;min-height:0;overflow:hidden;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--mist)}
    .map-story{position:relative;min-width:0;padding:0;overflow:hidden;border:0;border-right:1px solid rgba(255,255,255,.7);background:var(--mist);cursor:pointer;text-align:left}
    .map-story:last-child{border-right:0}.map-story img{display:block;width:100%;height:100%;object-fit:cover;transition:transform .35s ease}.map-story:hover img{transform:scale(1.035)}
    .map-caption{position:absolute;right:0;bottom:0;left:0;display:grid;gap:4px;padding:13px 14px;background:color-mix(in srgb,var(--raised) 92%,transparent);border-top:1px solid var(--line)}
    .map-caption small{color:var(--coral);font:700 10px/1.2 "SFMono-Regular",Consolas,monospace}.map-caption strong{overflow:hidden;font:650 14px/1.4 "PingFang SC",sans-serif;text-overflow:ellipsis;white-space:nowrap}

    .shelf-band{padding:42px 0 92px;background:var(--raised)}
    .section-inner{width:min(1120px,calc(100% - 44px));margin:auto}
    .section-heading{display:flex;align-items:end;justify-content:space-between;gap:24px;margin-bottom:34px}
    .section-heading h2{margin:0;font-family:"Kaiti SC","STKaiti",serif;font-size:42px;font-weight:600;line-height:1.2}
    .section-heading p{max-width:480px;margin:0;color:var(--muted);font-size:15px;line-height:1.8}
    .section-rule{display:flex;align-items:center;gap:10px;margin-bottom:18px;color:var(--teal);font:700 11px/1.4 "PingFang SC",sans-serif}.section-rule:after{content:"";height:1px;flex:1;background:var(--line)}
    .story-shelf{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:18px}
    .story-card{position:relative;grid-column:span 4;min-height:430px;display:grid;grid-template-rows:220px 1fr;padding:0;overflow:hidden;border:1px solid var(--line);border-radius:6px;background:var(--paper);cursor:pointer;text-align:left;transition:transform .16s,border-color .16s,box-shadow .16s}
    .story-card:nth-child(1){grid-column:span 7;grid-template-rows:270px 1fr}.story-card:nth-child(2){grid-column:span 5;grid-template-rows:270px 1fr}
    .story-card:hover{transform:translateY(-3px);border-color:var(--teal);box-shadow:0 14px 34px var(--shadow)}
    .story-card-art{display:block;width:100%;height:100%;object-fit:cover;background:var(--mist)}
    .story-card-copy{display:grid;grid-template-rows:auto 1fr auto;padding:22px 24px 20px}
    .story-card-number{color:var(--coral);font:700 11px/1.4 "SFMono-Regular",Consolas,monospace}.story-card-field{color:var(--teal);font:650 11px/1.4 "PingFang SC",sans-serif}
    .story-card h3{margin:19px 0 8px;font-family:"Kaiti SC","STKaiti",serif;font-size:28px;font-weight:600;line-height:1.3}
    .story-card-question{margin:0;color:var(--soft);font-size:15px;line-height:1.7}
    .story-card-footer{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:24px;padding-top:16px;border-top:1px solid var(--line);color:var(--muted);font:12px/1.5 "PingFang SC",sans-serif}
    .read-status{display:inline-flex;align-items:center;gap:7px;color:var(--teal);font-weight:650}.read-status:before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}.card-arrow{color:var(--teal);font-size:20px}
    .site-footer{padding:28px 22px;border-top:1px solid var(--line);color:var(--muted);text-align:center;font:12px/1.7 "PingFang SC",sans-serif}

    .reader-view{min-height:calc(100vh - 64px)}
    .reader-progress{position:fixed;z-index:70;top:63px;left:0;width:0;height:3px;background:var(--coral);transition:width .09s linear}
    .reader-shell{width:min(100%,var(--reader-width));margin:auto;padding:0 0 100px}
    .story-header{padding:76px 0 44px;border-bottom:1px solid var(--line)}
    .story-index{margin-bottom:17px;color:var(--coral);font:700 12px/1.5 "SFMono-Regular",Consolas,monospace}
    .story-header h1{margin:0;font-family:"Kaiti SC","STKaiti",serif;font-size:52px;font-weight:600;line-height:1.18}
    .story-deck{margin:20px 0 0;color:var(--soft);font-size:17px;line-height:1.75}.story-meta{display:flex;flex-wrap:wrap;gap:10px 20px;margin-top:24px;color:var(--muted);font:13px/1.6 "PingFang SC",sans-serif}
    .story-opening{width:min(940px,calc(100vw - 44px));margin:38px 0 0 50%;transform:translateX(-50%)}.story-opening img{display:block;width:100%;aspect-ratio:3/2;object-fit:cover;border-radius:6px;background:var(--mist)}
    .story-body{padding:52px 0 24px;font-size:var(--body-size);line-height:2.05}.story-body p{margin:0 0 1.25em}.story-body p:first-child:first-letter{float:left;margin:.13em .12em 0 0;color:var(--coral);font-family:"Kaiti SC","STKaiti",serif;font-size:3.55em;line-height:.78}
    .reveal-divider{display:flex;align-items:center;gap:14px;margin:52px 0 0;color:var(--coral);font:700 12px/1.5 "PingFang SC",sans-serif}.reveal-divider:before,.reveal-divider:after{content:"";height:1px;flex:1;background:var(--line)}
    .concept-section{margin-top:24px;padding:42px;border:1px solid var(--line);border-top:4px solid var(--coral);border-radius:6px;background:var(--concept)}
    .concept-kicker{margin-bottom:10px;color:var(--coral);font:700 12px/1.5 "PingFang SC",sans-serif}.concept-section h2{margin:0 0 30px;font-family:"Kaiti SC","STKaiti",serif;font-size:31px;font-weight:600;line-height:1.35}
    .concept-copy{font-size:calc(var(--body-size) - 1px);line-height:1.95}.concept-copy p{margin:0 0 1.16em}.concept-copy p>strong:only-child{display:block;margin-top:1.8em;color:var(--teal-deep);font-family:"PingFang SC",sans-serif;font-size:16px;line-height:1.6}.concept-copy ul{margin:.4em 0 1.3em;padding-left:1.35em}.concept-copy li{margin:.45em 0}
    .formula{margin:28px 0;padding:19px 20px;overflow-x:auto;border-left:3px solid var(--teal);background:var(--raised);font:500 15px/1.7 "SFMono-Regular",Consolas,monospace;white-space:nowrap}.math-inline{padding:.05em .28em;color:var(--teal-deep);font:.88em/1.5 "SFMono-Regular",Consolas,monospace}
    .transfer-quiz{margin-top:32px;padding:30px;border:1px solid var(--line);border-radius:6px;background:var(--raised)}
    .quiz-kicker{margin:0 0 8px;color:var(--coral);font:700 12px/1.5 "PingFang SC",sans-serif}.transfer-quiz h2{margin:0 0 12px;font-family:"Kaiti SC","STKaiti",serif;font-size:29px;font-weight:600;line-height:1.35}.quiz-context{margin:0 0 22px;color:var(--soft);font-size:16px;line-height:1.85}.quiz-options{display:grid;gap:10px}
    .quiz-option{width:100%;min-height:54px;padding:13px 16px;border:1px solid var(--line);border-radius:6px;background:transparent;cursor:pointer;text-align:left;font:15px/1.65 "PingFang SC",sans-serif}.quiz-option:hover:not(:disabled){border-color:var(--teal);background:var(--concept)}.quiz-option.selected{border-color:var(--teal);box-shadow:inset 3px 0 0 var(--teal);background:var(--concept)}.quiz-option:disabled{cursor:default}.quiz-explanation{margin-top:22px;padding-top:20px;border-top:1px solid var(--line);color:var(--soft);font-size:15px;line-height:1.85}.quiz-explanation strong{display:block;margin-bottom:6px;color:var(--ink);font-family:"PingFang SC",sans-serif}
    .completion{margin-top:28px;padding:22px 24px;border-left:4px solid var(--gold);background:color-mix(in srgb,var(--gold) 12%,var(--raised))}.completion strong{display:block;margin-bottom:5px;font:650 15px/1.5 "PingFang SC",sans-serif}.completion span{color:var(--muted);font:13px/1.7 "PingFang SC",sans-serif}
    .story-nav{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:42px}.story-nav button{min-height:84px;padding:16px 18px;border:1px solid var(--line);border-radius:6px;background:transparent;cursor:pointer;text-align:left;font-family:"PingFang SC",sans-serif}.story-nav button:last-child{text-align:right}.story-nav button:hover:not(:disabled){border-color:var(--teal);background:var(--concept)}.story-nav button:disabled{opacity:.35;cursor:default}.nav-direction{display:block;margin-bottom:6px;color:var(--muted);font-size:11px}.nav-story-title{font-size:14px;line-height:1.5}
    .mobile-dock{display:none}

    @media(max-width:900px){.site-header{grid-template-columns:auto 1fr auto}.primary-nav{justify-self:center}.hero{height:auto;min-height:calc(100svh - 140px)}.hero-copy{grid-template-columns:1fr;gap:18px}.hero h1{font-size:72px}.story-card,.story-card:nth-child(1),.story-card:nth-child(2){grid-column:span 6}.reader-shell{width:min(100% - 48px,var(--reader-width))}}
    @media(max-width:640px){
      :root{--body-size:18px}.site-header{height:58px;padding:0 8px}.brand-button{gap:7px;padding:5px}.brand-button>span:last-child{display:none}.brand-mark{width:25px;height:25px}.primary-nav{height:58px}.primary-nav button{min-width:70px;padding:0 9px;font-size:13px}.primary-nav button[aria-current="page"]:after{right:9px;left:9px}.desktop-only{display:none}
      .hero{width:calc(100% - 32px);min-height:max(520px,calc(100svh - 140px));gap:22px;padding:28px 0 24px}.hero-copy{gap:10px}.hero h1{font-size:56px}.hero-intro{font-size:16px;line-height:1.65}.hero-intro strong{font-size:16px}.story-map{grid-auto-flow:column;grid-auto-columns:78vw;grid-template-columns:none;min-height:250px;overflow-x:auto;scroll-snap-type:x mandatory}.map-story{scroll-snap-align:start}.map-caption strong{white-space:normal}
      .section-inner{width:calc(100% - 32px)}.shelf-band{padding:34px 0 68px}.section-heading{display:block}.section-heading h2{font-size:34px}.section-heading p{margin-top:12px}.story-shelf{display:grid;grid-template-columns:1fr}.story-card,.story-card:nth-child(1),.story-card:nth-child(2){grid-column:auto;min-height:430px;grid-template-rows:215px 1fr}.story-card h3{font-size:27px}
      .reader-progress{top:57px}.reader-shell{width:min(100% - 36px,var(--reader-width));padding-bottom:106px}.story-header{padding:50px 0 34px}.story-header h1{font-size:40px}.story-opening{width:calc(100% + 36px);margin-top:26px}.story-opening img{border-radius:0}.story-body{padding-top:38px;line-height:1.95}.concept-section,.transfer-quiz{margin-left:-18px;margin-right:-18px;border-right:0;border-left:0;border-radius:0}.concept-section{padding:30px 18px 36px}.concept-section h2{font-size:27px}.transfer-quiz{padding:28px 18px}.story-nav{grid-template-columns:1fr}.story-nav button:last-child{text-align:left}
      .mobile-dock{position:fixed;z-index:55;left:50%;bottom:max(12px,env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;align-items:center;gap:2px;padding:5px;border:1px solid var(--line);border-radius:6px;background:color-mix(in srgb,var(--raised) 94%,transparent);box-shadow:0 14px 34px var(--shadow);backdrop-filter:blur(18px)}.mobile-dock .icon-button{width:42px;height:42px}
    }
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <header class="site-header">
    <button type="button" class="brand-button" data-route="home" aria-label="返回金融寓言首页"><span class="brand-mark" aria-hidden="true"></span><span>金融寓言</span></button>
    <nav class="primary-nav" aria-label="主导航">
      <button type="button" data-route="home">首页</button>
      <button type="button" data-route="stories">寓言故事</button>
    </nav>
    <div class="header-actions" aria-label="阅读设置">
      <button type="button" class="icon-button desktop-only" data-action="font-down" aria-label="减小字号" title="减小字号">A−</button>
      <button type="button" class="icon-button desktop-only" data-action="font-up" aria-label="增大字号" title="增大字号">A+</button>
      <button type="button" class="icon-button" data-action="toggle-theme" aria-label="切换深浅模式" title="切换深浅模式">◐</button>
    </div>
  </header>

  <main class="home-view" id="homeView">
    <section class="hero" aria-labelledby="homeTitle">
      <div class="hero-copy">
        <div><p class="hero-kicker">FINANCIAL FABLES</p><h1 id="homeTitle">金融寓言</h1></div>
        <p class="hero-intro"><strong>复杂的金融概念，应该先发生，再被解释。</strong>先跟着人物经历一次价格、风险与选择，故事结束后，再把直觉还原成可以反复使用的金融框架。</p>
      </div>
      <div class="story-map" id="storyMap" aria-label="五个故事，五种市场困境"></div>
    </section>

    <section class="shelf-band" id="storyShelfSection">
      <div class="section-inner">
        <div class="section-rule">五个故事，五种市场困境</div>
        <div class="section-heading">
          <h2>寓言故事</h2>
          <p><span id="storyCount"></span>，每篇独立成章。雾港、矿镇、香料街、粮仓与远洋船，随便从哪一处进去。</p>
        </div>
        <div class="story-shelf" id="storyShelf"></div>
      </div>
    </section>
  </main>

  <main class="reader-view" id="readerView" hidden>
    <div class="reader-progress" id="readerProgress" aria-hidden="true"></div>
    <article class="reader-shell" id="reader" aria-live="polite"></article>
    <div class="mobile-dock" aria-label="移动端阅读设置">
      <button type="button" class="icon-button" data-route="stories" aria-label="返回寓言故事" title="寓言故事">←</button>
      <button type="button" class="icon-button" data-action="font-down" aria-label="减小字号" title="减小字号">A−</button>
      <button type="button" class="icon-button" data-action="font-up" aria-label="增大字号" title="增大字号">A+</button>
    </div>

  <script id="storyData" type="application/json">[{"number": "01", "title": "雾港最后一张船票", "concept": "随机贴现因子", "story_html": "<p>雾港的人一生都在等两种风。<\/p>\n<p>东风来时，海面平得像一块擦亮的银。货船当天就能出港，鱼市、酒馆和旅店挤满外乡客。西风来时，浓雾会从海上压进城里，钟楼只剩一个模糊的影子。船要停，货会烂，码头工也领不到工钱。<\/p>\n<p>阿洛在码头抄写货单。他攒了十年，终于有一百枚银币。<\/p>\n<p>钱庄给了他两个选择。<\/p>\n<p>第一张契据写着：明年东风来时，凭据可兑一百枚银币；西风来时，一枚也没有。<\/p>\n<p>第二张正好相反：西风来时兑一百枚，东风来时作废。<\/p>\n<p>钱庄掌柜说，两种风出现的机会差不多，因此两张契据都卖五十枚。<\/p>\n<p>阿洛觉得公平。可第二天一早，卖西风契据的窗口前排起长队，价格很快涨到七十。东风契据降到三十，仍无人问津。<\/p>\n<p>掌柜骂那些人胆小：“明明都是一半的机会，为什么一张贵一倍？”<\/p>\n<p>阿洛也想不明白。<\/p>\n<p>直到那年冬天，雾港来了一位修船的老妇人。她从不预测天气，只问阿洛：“东风来时，你的一百枚能买什么？”<\/p>\n<p>“一间酒馆，也许还能剩一点。”<\/p>\n<p>“西风呢？”<\/p>\n<p>阿洛想了想：“西风来时大家都没有收入。粮价会涨，药铺只收现钱。一百枚可能只能保住一家人。”<\/p>\n<p>老妇人说：“所以契据上写着同样的一百枚，装的却不是同一种东西。”<\/p>\n<p>阿洛没有听懂。<\/p>\n<p>老妇人带他去了港口尽头。那里停着一艘小船，船主准备离开雾港。他只剩一个座位，开价一百枚。<\/p>\n<p>“现在付一百，明天无论什么风都能走。”船主说。<\/p>\n<p>阿洛提出用契据交换。船主看了看两张纸，愿意用七十枚的价格接过西风契据，却只肯给东风契据三十枚。<\/p>\n<p>掌柜又争辩：“两张都有一半机会兑付！”<\/p>\n<p>船主指着码头说：“东风来了，我的船能装满客人，一百枚只是锦上添花。西风来了，整个港口都会停摆，那一百枚能让我买到粮、雇到人、修好船。你数的是银币出现的机会，我算的是银币出现时，我有多需要它。”<\/p>\n<p>阿洛忽然明白，雾港从来没有一把固定的尺子，把明年的银币折成今天的价格。<\/p>\n<p>东风里的银币，被轻轻折了一下。<\/p>\n<p>西风里的银币，被郑重地捧在手里。<\/p>\n<p>后来，阿洛用七十枚买了西风契据，把剩下三十枚留在身边。那年春天果然吹来东风，他的契据成了废纸。<\/p>\n<p>掌柜笑他赔了钱。<\/p>\n<p>阿洛却没有争辩。他知道自己买的并不是对西风的预测。<\/p>\n<p>他买的是：如果最坏的时候真的到来，自己仍有选择。<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：未来的一枚银币，没有一个固定的今天价格。<\/strong><\/p>\n<p>我们平时做贴现，习惯把明年的100元除以一个利率，得到它今天值多少。这个算法默认了一件很强的事：无论明年过得好还是坏，那100元对你的重要程度都一样。<\/p>\n<p>现实里并非如此。<\/p>\n<p>收入稳定、市场繁荣的时候，多出来的100元可能只够多吃一顿饭；失业、资产下跌、现金紧张的时候，同样的100元可能决定你是否需要低价卖掉手里的资产。金额没有变，它出现的场景变了，它对人的价值也随之改变。<\/p>\n<p>这就是故事里两张契据价格不同的原因。东风契据在全城都赚钱时支付，像锦上添花；西风契据在码头停摆、粮价上涨时支付，像雪中送炭。两种风即使各有一半概率，两张契据也不必各值50。<\/p>\n<p><strong>故事里的对应关系<\/strong><\/p>\n<p>雾港的东风和西风，代表未来不同的经济状态。<\/p>\n<p>契据承诺的100枚银币，是资产在某个状态下支付的现金流。<\/p>\n<p>船主愿意给西风契据更高的价格，说明市场给“坏时候的钱”更高权重。<\/p>\n<p>老妇人真正使用的那把尺子，叫随机贴现因子。<\/p>\n<p>资产定价里常写成：<\/p>\n<div class=\"formula\" role=\"math\">P_t=E_t[m_{t+1}X_{t+1}]<\/div>\n<p><span class=\"math-inline\">X_{t+1}<\/span> 是资产未来支付多少，<span class=\"math-inline\">m_{t+1}<\/span> 是未来每种状态下的一元钱，折回今天时分别有多重。<\/p>\n<p>在好日子里，现金不稀缺，<span class=\"math-inline\">m<\/span> 较低；在坏日子里，现金最有用，<span class=\"math-inline\">m<\/span> 较高。所以资产价格看的不只是“平均能赚多少”，还看它在什么时候赚钱。<\/p>\n<p><strong>放到市场里，会看到两类完全不同的资产。<\/strong><\/p>\n<p>一类资产往往在经济好、大家收入高、风险偏好强的时候表现最好。它的收益看起来很高，但真正需要钱时，它也可能一起下跌。投资者愿意持有它，通常需要更高的预期回报作为补偿。<\/p>\n<p>另一类资产可能长期收益没有那么耀眼，却能在衰退、恐慌或收入受损时保住价值。它提供了保险，投资者愿意出更高价格购买，因此它未来的平均回报反而可能更低。<\/p>\n<p>这能解释资产定价里一个很反直觉的现象：高预期收益有时并不是奖励你“眼光好”，而是在补偿这项资产偏偏会在你最难受的时候亏钱。<\/p>\n<p>更严格地说，风险溢价取决于资产收益和随机贴现因子的共同变化：<\/p>\n<div class=\"formula\" role=\"math\">E[R]-R_f=-(Cov(m,R))/(E[m])<\/div>\n<p>如果一项资产在 <span class=\"math-inline\">m<\/span> 很高的坏状态中表现很差，右边就会变大，市场会要求它提供更高的预期收益。<\/p>\n<p><strong>为什么这个概念重要？<\/strong><\/p>\n<p>因为它会改变“收益高不高”的问法。<\/p>\n<p>只看年化收益、平均回报或上涨概率，会漏掉最重要的一层：这项收益和你自己的处境是什么关系？如果你的工作收入、奖金和投资组合都在经济繁荣时变好，在衰退时一起变差，那么它们表面上是不同资产，实际可能压在同一种风险上。<\/p>\n<p>反过来，一项看起来收益不高的配置，如果能在你现金最紧张的时候提供流动性，它的价值不能只用平均收益衡量。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>资产的价值，不只取决于它未来给你多少钱，还取决于它在你多需要钱的时候给你钱。<\/p>\n<p>雾港里昂贵的从来不是“西风更可能发生”这个判断。<\/p>\n<p>昂贵的是：当西风真的来临时，你仍然握有选择。<\/p>", "reading_minutes": "7"}, {"number": "02", "title": "所有人都觉得自己捡漏的拍卖会", "concept": "共同价值拍卖与赢家诅咒", "story_html": "<p>北山脚下有一座废弃的银矿。<\/p>\n<p>矿井已经封了二十年。老矿主去世前留下一句话：“最后一层岩脉还在，只是不知道有多厚。”<\/p>\n<p>城里决定拍卖开采权。谁出价最高，谁就能把矿里剩下的银全部带走。<\/p>\n<p>拍卖前，每位竞买人都可以派一名勘探师下井。矿井太深，每个人只能在一个位置敲下一小块岩石。有人带回亮得刺眼的矿样，有人只带回灰黑石屑。<\/p>\n<p>珠宝商估计矿藏值八千枚金币。<\/p>\n<p>铁匠估计五千。<\/p>\n<p>远道而来的商队首领估计一万二千。<\/p>\n<p>年轻的矿商伊森拿到的矿样最好。他在灯下看见密密麻麻的银线，觉得整座山至少值一万五千。<\/p>\n<p>他的会计劝他谨慎：“别人也看过矿井。”<\/p>\n<p>伊森说：“正因为别人看过，他们才更不敢出高价。我亲眼看见了银。”<\/p>\n<p>拍卖开始后，价格很快超过五千。铁匠退出，珠宝商也在七千时停手。商队首领坚持到一万，最后还是放下号牌。<\/p>\n<p>伊森以一万零五百枚金币拍下矿井。<\/p>\n<p>全场鼓掌。他只比第二名多出五百，却买下了可能价值一万五千的东西。伊森觉得自己捡了一个大漏。<\/p>\n<p>开采后的第一个月，矿石质量很好。第二个月开始，银线变细。第三个月，工人挖穿了那层岩脉，后面只剩普通石头。<\/p>\n<p>卖掉全部银矿后，伊森只收回七千枚金币。<\/p>\n<p>他怀疑有人在拍卖前动了手脚，便把所有勘探师找来核对记录。<\/p>\n<p>珠宝商的样本推算值八千，铁匠的样本推算值五千，商队首领的是一万二千。还有几个早早退出的人，估值只有三四千。<\/p>\n<p>伊森拍着桌子：“那我明明拿到了最准确的样本，为什么还会输？”<\/p>\n<p>年老的地质师把所有样本排成一列，说：“你拿到的不是最准确的样本，只是最乐观的样本。”<\/p>\n<p>伊森不服：“可它确实来自矿里。”<\/p>\n<p>“每一块都来自矿里。问题是，你在赢下拍卖的那一刻，已经知道了一件新事。”<\/p>\n<p>“什么？”<\/p>\n<p>“你知道，在所有看过矿井的人中，你是估得最高的那个。”<\/p>\n<p>地质师把伊森的矿样放到最右边。<\/p>\n<p>“拍卖之前，你只看见自己的银线。拍卖结束时，其他人的沉默也成了证据。他们一个个退出，不只是因为胆小。他们是在告诉你：他们看到的矿井，没有你看到的那么好。”<\/p>\n<p>伊森这才意识到，他最后一次加价时，仍在用拍卖开始前的估值。<\/p>\n<p>他把胜利当成了自己判断正确的证明。<\/p>\n<p>可在这种拍卖里，胜利本身恰恰是一个警告：也许不是别人没看见便宜，而是只有你看得那么贵。<\/p>\n<p>下一年，城里又拍卖一座铜矿。伊森仍派勘探师下井，也仍认真估值。<\/p>\n<p>不同的是，当他的估值高过所有人时，他先问了一句：<\/p>\n<p>“如果我恰好是最乐观的那个人，我应该从自己的数字里减掉多少？”<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：在有共同答案的竞争里，赢本身也是一条信息。<\/strong><\/p>\n<p>如果拍卖的是一幅画，有人喜欢它，有人不喜欢它，每个人心里的价值不同。这叫私人价值拍卖。你愿意花多少，主要取决于它对你有多重要。<\/p>\n<p>银矿不同。无论最后是谁买下，地下能挖出多少银都不会改变。大家面对的是同一个真实价值，只是每个人看见的矿样不同。这类场景叫共同价值拍卖。<\/p>\n<p>设银矿真正价值为 <span class=\"math-inline\">V<\/span>，每位竞买人看到的信号是：<\/p>\n<div class=\"formula\" role=\"math\">s_i=V+ε_i<\/div>\n<p><span class=\"math-inline\">ε_i<\/span> 是勘探误差。有人刚好敲到富矿，有人刚好敲到贫矿。每份样本都包含信息，也都带着噪声。<\/p>\n<p><strong>伊森错在哪里？<\/strong><\/p>\n<p>他在拍卖前根据自己的矿样估值，这一步没有问题。问题出现在他赢下拍卖之后，仍然把原来的估值当成全部信息。<\/p>\n<p>当其他人陆续退出时，伊森已经得到一批新信号：他们看到的东西没有支持更高价格。尤其当所有竞买人都专业、都做过调查时，“只有我愿意出到这里”不能简单理解为自己比别人勇敢。<\/p>\n<p>赢家真正该计算的是：<\/p>\n<div class=\"formula\" role=\"math\">E[V |  s_i, s_i 是所有信号中最高的]<\/div>\n<p>这比只计算 <span class=\"math-inline\">E[V |  s_i]<\/span> 多了一个条件：我的判断恰好是全场最乐观的那个。<\/p>\n<p>而最高估值往往不只包含最多的信息，也更可能包含最大的正向误差。就像十个人分别称同一头牛，最后一定是读数最高的人赢，但最高读数也最容易把秤的误差一起买回家。<\/p>\n<p><strong>这就是赢家诅咒。<\/strong><\/p>\n<p>它并不是说赢家一定亏钱，也不是说拍卖永远不能参加。它提醒竞买人：如果你只有在自己的估值高于所有人时才会成交，那么成交这一刻，你面对的样本已经被筛选过了。<\/p>\n<p>参与者越多，最高误差被挑出来的机会越大；信息越模糊，每个人的估值越分散；竞争越激烈，留给赢家修正错误的余地越小。因此理性的竞买人通常会“压价”，给自己看到的估值打一个折扣。<\/p>\n<p><strong>放到现实市场里，会出现在哪里？<\/strong><\/p>\n<p>矿权、土地、艺术品、公司并购、牌照和广告竞价，都是常见的共同价值场景。大家争的东西最终能产生多少现金流，大体上有一个共同答案，但每个人掌握的资料和判断精度不同。<\/p>\n<p>股票二级市场并不是一场标准的单轮拍卖，不过类似的筛选仍会发生。某个资产人人都研究过，而你还能轻松以自己认定的“便宜价”买到时，可以多问一句：对手为什么愿意在这个价格卖给我？这不证明你错，却提醒你成交对手也可能掌握了你没看到的信息。<\/p>\n<p>热门发行、拥挤交易和叙事最强的时候，问题会反过来出现。大家都觉得稀缺，最后拿到最多份额的人，可能恰好也是对乐观假设修正最少的人。<\/p>\n<p><strong>为什么这个概念重要？<\/strong><\/p>\n<p>因为很多亏损并非来自不会估值，而是来自把“赢得竞争”误当成“估值被市场认证”。<\/p>\n<p>真正成熟的判断，需要在成交后再更新一次：我刚刚获胜，这件事对标的真实价值意味着什么？如果没有新的独有信息支撑，赢得太轻松和赢得太坚决，都值得重新检查。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>在共同价值的竞争里，你支付的不只是标的价格，还可能替全场买下了最乐观的误差。<\/p>", "reading_minutes": "7"}, {"number": "03", "title": "沉默集市里的第二种价格", "concept": "知情交易、逆向选择与买卖价差", "story_html": "<p>海边有一座香料城。每天清晨，远洋船会带来胡椒、肉桂和藏红花。没有船靠岸的日子，城里的存货就会少一截，价格也会涨。<\/p>\n<p>城中最大的香料摊由塞缪尔经营。他每天在木牌上写一个价格，买卖都按这个数成交。<\/p>\n<p>有一天，他发现自己总在最糟的时候卖出香料。<\/p>\n<p>每当一个戴灰帽的人来大量买胡椒，下午就会传来船队延误的消息，胡椒价格暴涨。每当一个提红篮子的女人急着卖肉桂，傍晚就会有新船进港，肉桂价格大跌。<\/p>\n<p>塞缪尔怀疑他们能比别人更早看到港口信号。<\/p>\n<p>第二天，他把胡椒价格从十枚银币提高到十二枚。普通居民嫌贵，灰帽人仍然买走全部存货。下午果然起雾，船队没有进港，市价涨到十五。<\/p>\n<p>塞缪尔还是亏。<\/p>\n<p>第三天，他把价格提到十四。灰帽人没有出现，普通居民也不买。摊位一整天没有成交。<\/p>\n<p>塞缪尔陷入两难。<\/p>\n<p>价格低，知道消息的人会把便宜货买走；价格高，不知道消息的人也不愿来。<\/p>\n<p>他去请教住在钟楼上的记账人。记账人听完，只问：“有人走到摊前说要买时，你知道了什么？”<\/p>\n<p>“我知道他想买。”<\/p>\n<p>“还有呢？”<\/p>\n<p>塞缪尔沉默。<\/p>\n<p>记账人说：“你知道，他有可能只是今晚要办宴会，也有可能刚从灯塔回来。买这个动作本身，会让‘船队延误’变得更可能。”<\/p>\n<p>“那我该拒绝所有买家？”<\/p>\n<p>“如果拒绝所有可能知道消息的人，你也会拒绝所有普通人。你能做的，是让交易方向进入价格。”<\/p>\n<p>第二天，塞缪尔擦掉木牌上的单一价格，写下两个数：<\/p>\n<p>买入胡椒，每袋九枚。<\/p>\n<p>卖出胡椒，每袋十一枚。<\/p>\n<p>居民们很生气：“同一袋胡椒，为什么你买时只给九枚，卖时却要十一枚？”<\/p>\n<p>塞缪尔没有解释。<\/p>\n<p>上午，一个普通厨师以十一枚买了一袋。中午，一个农夫把多余的胡椒以九枚卖给他。塞缪尔在两笔生意之间赚了两枚。<\/p>\n<p>下午，灰帽人出现，一口气买走二十袋。塞缪尔知道对方可能掌握消息，但这一次，他每袋按十一枚卖出。多收的部分，补偿了他偶尔卖给知情者的损失。<\/p>\n<p>几天后，提红篮子的女人来卖肉桂。塞缪尔只肯按较低的买入价接货。傍晚新船到港，肉桂果然跌价，但他没有像以前那样损失惨重。<\/p>\n<p>集市里渐渐出现了两种价格。越难判断消息真假的香料，两个价格离得越远；消息透明、货源稳定的香料，两个价格几乎挨在一起。<\/p>\n<p>后来，港口修了一座人人看得见的信号塔。船队是否进港，不再只有少数人提前知道。<\/p>\n<p>灰帽人从此很少来。塞缪尔木牌上的两个数字，也慢慢靠近。<\/p>\n<p>居民们以为是他终于变得厚道。<\/p>\n<p>只有钟楼上的记账人知道，塞缪尔并没有突然改变性情。<\/p>\n<p>只是走到他面前的每一笔交易，不再像从前那样可能藏着一个秘密。<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：市场看到一笔交易时，也在猜交易背后藏着什么。<\/strong><\/p>\n<p>塞缪尔面对的买家有两种。<\/p>\n<p>普通厨师买胡椒，是因为今晚要办宴会。他没有预测胡椒价值，只是需要用货。灰帽人买胡椒，是因为他比别人更早知道船队无法进港。<\/p>\n<p>对塞缪尔来说，两个人走到摊前时长得差不多。可只要交易发生，结果就很不对称：卖给普通厨师，他能赚一点正常利润；卖给灰帽人，他往往会在坏消息公布前把便宜货交出去。<\/p>\n<p>更麻烦的是，知情者会挑时间交易。<\/p>\n<p>当塞缪尔的价格对他有利时，他才会出现；没有信息优势时，他可以沉默。于是塞缪尔成交的订单，并不是从所有居民里随机抽出来的，而是被知情者主动筛选过的。这就是逆向选择。<\/p>\n<p><strong>为什么同一袋胡椒会有两个价格？<\/strong><\/p>\n<p>在简化的 Glosten-Milgrom 模型中，做市者先设想资产真正价值 <span class=\"math-inline\">V<\/span>，然后根据自己看到的订单方向更新判断：<\/p>\n<div class=\"formula\" role=\"math\">Ask=E[V |  Buy],     Bid=E[V |  Sell]<\/div>\n<p>当有人主动买入，做市者会提高“对方知道利好消息”的概率，所以卖价靠近一个更高的条件期望。<\/p>\n<p>当有人主动卖出，做市者会提高“对方知道利空消息”的概率，所以买价靠近一个更低的条件期望。<\/p>\n<p>因此：<\/p>\n<div class=\"formula\" role=\"math\">E[V |  Buy]&gt;E[V |  Sell]<\/div>\n<p>两者之间的距离，就是买卖价差的一部分。<\/p>\n<p>价差看起来像摊主两头赚钱，实际要同时覆盖库存风险、订单处理成本，也要补偿他偶尔站在知情者对面的损失。普通交易者支付的那一点价差，有一部分正是在替市场吸收信息不对称的成本。<\/p>\n<p><strong>价差什么时候会突然变宽？<\/strong><\/p>\n<p>答案通常和“谁可能知道得更多”有关。<\/p>\n<p>重大消息公布前、公司情况难以判断时、交易冷清的品种里，做市者更担心下一张订单来自知情者，于是报价会更保守，买卖两边拉得更开。<\/p>\n<p>当公开信息充分、参与者众多、成交连续时，一笔订单携带的秘密更少，价差往往收窄。故事里人人看得见的信号塔，就相当于更及时、更公平的公共信息披露。<\/p>\n<p>这也解释了为什么“流动性”不是一个固定属性。同一项资产平时可能很好成交，一到消息混乱或市场恐慌时，报价深度突然消失。大家担心的并不只是价格波动，还担心站在自己对面的人比自己更清楚发生了什么。<\/p>\n<p><strong>放到个人交易里，最直接的影响是什么？<\/strong><\/p>\n<p>第一，市价成交并非没有代价。你为了立刻成交，通常要跨过买卖价差。交易越频繁、标的越冷门，这项成本越容易侵蚀收益。<\/p>\n<p>第二，看到大单后价格继续同向移动，不一定意味着有人“操纵”价格。市场可能只是从订单方向里学习：主动买入越坚决，其他报价者越怀疑背后有尚未公开的信息。<\/p>\n<p>第三，账面上的最新成交价不等于你能立刻买入或卖出的价格。真正能执行的，是买一价和卖一价，以及那个价格上愿意承接多少数量。<\/p>\n<p><strong>最容易误解的一点<\/strong><\/p>\n<p>塞缪尔不需要准确认出灰帽人。他只要知道“来买的人里有一定比例可能知情”，就必须把这个概率写进报价。<\/p>\n<p>市场价格正是在这种不断猜测、成交、更新中吸收信息的。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>买卖价差不只是交易的门票，它也是市场对“对手可能比我知道得更多”收取的保险费。<\/p>", "reading_minutes": "7"}, {"number": "04", "title": "冬眠之前，粮仓只开一次门", "concept": "Diamond-Dybvig 银行挤兑模型", "story_html": "<p>北谷的冬天长达六个月。<\/p>\n<p>每年秋末，居民会把谷物交给中央粮仓。粮仓给每个人一张木牌，承诺需要时可以换回粮食。<\/p>\n<p>粮仓不会把所有谷物堆在原地。管理员把一部分留在前厅，另一部分送进山后的酿造窖。进入窖里的谷物，到春天会变成更耐储存、也更值钱的麦酒；但如果冬天中途砸开酒桶，只能收回很少一点湿麦。<\/p>\n<p>这套安排运行了很多年。<\/p>\n<p>有些家庭冬天突然生病，需要提前取粮；更多家庭可以等到春天。粮仓只需在前厅保留一部分谷物，就能照顾提前需要的人，同时让大部分谷物在酒窖里增值。<\/p>\n<p>某年初冬，一个旅行商人住进北谷。他在酒馆里说，自己看见粮仓管理员深夜从后门搬东西。<\/p>\n<p>第二天，十户人家拿木牌来取粮。<\/p>\n<p>管理员照常支付。<\/p>\n<p>第三天，队伍变成五十户。排在后面的人问前面的人：“粮仓真的出问题了吗？”<\/p>\n<p>前面的人说：“不知道。但如果所有人都来取，最后来的人一定什么也拿不到。”<\/p>\n<p>这句话传遍了队伍。<\/p>\n<p>有些人原本打算等到春天，现在也回家拿来木牌。不是因为他们相信粮仓偷了粮，而是因为他们相信别人会先取。<\/p>\n<p>前厅的谷物很快见底。管理员请求大家回去：“酒窖里还有足够的麦酒。等到春天，每张木牌都兑得起。”<\/p>\n<p>没人离开。<\/p>\n<p>排在最前面的木匠说：“你说春天兑得起，可我若今天不拿，明天可能排在最后。”<\/p>\n<p>管理员被迫砸开第一批酒桶。原本春天能换回一百袋粮食的麦酒，现在只能滤出六十袋湿麦。<\/p>\n<p>队伍看见运回来的粮食更少，反而更加恐慌。<\/p>\n<p>更多酒桶被砸开，更多价值在冬天里消失。到了第五天，粮仓真的无法兑付全部木牌。<\/p>\n<p>旅行商人的传言最终被查明是误会。管理员深夜搬走的是发霉的空麻袋。<\/p>\n<p>可真相已经没有用了。<\/p>\n<p>北谷长老召集居民，问：“粮仓倒下，是因为它一开始没有足够的财产吗？”<\/p>\n<p>酿酒师说：“如果等到春天，酒窖里的东西足够每个人取回粮食，还有剩余。”<\/p>\n<p>“那是因为传言吗？”<\/p>\n<p>木匠摇头：“后来我已经不在乎传言是真是假。我只在乎别人会不会先到。”<\/p>\n<p>第二年，北谷重新建立粮仓。有人主张把所有谷物都留在前厅，永远不再酿酒。<\/p>\n<p>长老拒绝了：“那样不会发生挤兑，但我们也会失去整个冬天的增值。”<\/p>\n<p>他们最终制定了两条规则。<\/p>\n<p>一旦取粮人数超过某个限度，粮仓暂时关门清点；同时由全谷共同设立一座应急小仓，在恐慌时借粮给中央粮仓。<\/p>\n<p>这并没有让酒窖里的麦酒一夜之间变成现粮。<\/p>\n<p>它改变的是居民对别人的猜测。<\/p>\n<p>当大家相信自己不必抢在最前面时，队伍就没有出现。<\/p>\n<p>粮仓也因此保住了本来就足够的财富。<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：一家原本有足够资产的机构，也可能被所有人的合理自保挤垮。<\/strong><\/p>\n<p>北谷粮仓做了一件现代金融里非常重要的事：期限转换。<\/p>\n<p>居民交进来的木牌可以随时换粮，属于短期承诺；粮仓却把大部分谷物放进酿造窖，只有等到春天才能获得更高价值，属于长期资产。<\/p>\n<p>如果每个人都只能把粮食锁到春天，突然生病的家庭会很痛苦。如果粮仓把所有粮都放在前厅，随时准备兑付，北谷又会失去酿造带来的增值。粮仓把两种需求接在了一起：少数人需要随时取用，多数人的粮食可以长期投入。<\/p>\n<p>这套安排能够成立，因为正常情况下，不会所有人同时来取。<\/p>\n<p><strong>怪事从哪里开始？<\/strong><\/p>\n<p>旅行商人的传言并没有直接烧掉一袋粮食。它只改变了居民对其他居民的判断。<\/p>\n<p>木匠原本愿意等到春天，后来却发现：如果别人都提前拿，我坚持等待就可能成为最后一个拿不到粮的人。即使他仍然相信酒窖里的资产最终足够，也有理由今天排队。<\/p>\n<p>每个人都这么想时，粮仓只能提前砸开酒桶。原本春天值100袋的长期资产，冬天只能卖60袋。真正的损失在清算过程中发生，最初关于粮仓不足的担忧，也被挤兑本身变成了事实。<\/p>\n<p>Diamond-Dybvig 模型最重要的地方，就在于同一套资产可以支持两种结果：<\/p>\n<ul><li>正常均衡：只有真正需要流动性的人提前取粮，其他人愿意等待，粮仓能够兑现承诺。<\/li><li>挤兑均衡：所有人都预期别人会抢先，因此自己也抢先，长期资产被迫贱卖，粮仓最终无法兑付。<\/li><\/ul>\n<p>两种结果之间，资产质量可以没有任何变化。改变结果的是大家对别人行动的预期。<\/p>\n<p><strong>这和“真的资不抵债”有什么区别？<\/strong><\/p>\n<p>资不抵债意味着把所有资产耐心持有并按合理价格出售，仍然还不起全部负债。<\/p>\n<p>流动性危机则可能是：长期看资产够，短期却拿不出所有人同时索要的现金。问题拖得太久，机构被迫低价抛售，流动性危机也可能进一步变成偿付危机。<\/p>\n<p>现实里两者经常纠缠在一起。外部观察者越难判断究竟是哪一种，恐慌越容易自我强化。<\/p>\n<p><strong>为什么存款保险和最后贷款人有用？<\/strong><\/p>\n<p>它们不一定需要真的支付所有人。只要承诺足够可信，让居民相信“即使我不抢在第一位，也能拿到钱”，挤兑均衡就可能失去基础。<\/p>\n<p>暂停兑付也有类似作用。它打断先到先得，让排队不再拥有决定性优势。故事里的应急小仓，则相当于在长期资产无法立刻变现时，先提供一座流动性桥梁。<\/p>\n<p>可是保护越强，粮仓也越可能觉得自己无论如何都会被救，于是把更多粮食投入危险项目。这就是道德风险。所以稳定金融体系通常需要两只手同时工作：危机时提供可信流动性，平时约束机构承担过度风险。<\/p>\n<p><strong>放到投资市场里，这个机制并不只属于银行。<\/strong><\/p>\n<p>任何“允许投资者很快赎回、底层资产却很难快速卖出”的结构，都可能遇到类似问题。开放式基金、信用产品、不动产产品或某些高收益理财，一旦赎回压力集中出现，管理人可能被迫先卖最好卖的资产，再打折处理难卖的资产。<\/p>\n<p>先退出的人拿走接近账面价值的现金，留下的人承受抛售造成的损失，于是“别人可能先跑”本身就会制造抢跑动力。<\/p>\n<p>因此判断一项产品时，只看底层资产好不好还不够。还要看它向投资者承诺了多快的流动性，以及底层资产真正变现需要多久。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>挤兑最可怕的地方，不是所有人都相信坏消息，而是每个人都相信别人会先行动。<\/p>", "reading_minutes": "7"}, {"number": "05", "title": "船长为什么选择驶进风暴", "concept": "有限责任、风险转移与股东—债权人冲突", "story_html": "<p>南方商会有一艘老货船，名叫远星号。<\/p>\n<p>船由三方共同维系：商人们出了本金，债主借钱修船，船长负责决定航线。按契约，远星号每年先偿还债主，剩下的利润才归商人。<\/p>\n<p>最初几年，远星号走的是东岸航线。海面平稳，利润不高，却足以按时还债。<\/p>\n<p>后来，新铁路抢走了大半生意。远星号的货舱越来越空，欠债却不会变少。<\/p>\n<p>到了冬天，船上的全部货物即使平安抵港，也只值一千二百枚金币。债主到期应收一千枚。扣除费用后，商人们几乎拿不到什么。<\/p>\n<p>这时，船长带回一张旧海图。<\/p>\n<p>海图上画着一条穿过风暴海峡的近路。若成功，远星号能抢先到达香料港，带回两千枚金币；若失败，船和货都会沉没。<\/p>\n<p>老水手估计，成功和失败的机会各一半。<\/p>\n<p>债主听后立即反对：“走东岸，船大概率能带回一千二百。穿风暴，平均只能带回一千，而且有一半机会什么都没有。”<\/p>\n<p>商人们却一致支持船长。<\/p>\n<p>债主不明白：“你们以前最怕冒险，为什么现在突然勇敢？”<\/p>\n<p>最大的商人把账本推到他面前。<\/p>\n<p>走东岸，远星号带回一千二百。先还债主一千，再付费用，商人们所得无几。<\/p>\n<p>穿风暴若成功，带回两千。还完一千，商人们可以分走很大一笔。<\/p>\n<p>若失败，远星号沉没。商人们失去的只是已经几乎不值钱的船份；剩余债务无法从他们其他产业追讨。<\/p>\n<p>债主看懂了账本：“成功时，多出来的收益大多归你们；失败时，大部分损失却落在我身上。”<\/p>\n<p>商人说：“契约就是这样写的。”<\/p>\n<p>债主去找船长，希望他坚持东岸航线。船长摊开双手：“我受商人雇用。他们若得不到任何剩余，我保住船也不会有奖金。只有穿过风暴，我和他们才有翻身的机会。”<\/p>\n<p>出航前一夜，老水手问船长：“你真的认为风暴航线更好吗？”<\/p>\n<p>船长说：“对整艘船未必更好。”<\/p>\n<p>“那为什么还去？”<\/p>\n<p>“因为如今决定航线的人，和承担沉船损失的人，已经不是同一群人。”<\/p>\n<p>远星号最终进入风暴海峡。<\/p>\n<p>故事没有记载它是否平安抵港。港口只留下后来重写的借款契约：从此以后，远星号改变航线需要债主同意；船体价值下降到一定程度时，必须增加抵押；船长的奖金也不再只看最好的结果。<\/p>\n<p>人们常说，是那场风暴让契约变得复杂。<\/p>\n<p>其实真正让契约复杂的，并不是海上的风。<\/p>\n<p>而是同一场风暴，对船长、商人和债主意味着完全不同的输赢。<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：同一个项目，对公司、股东和债权人可能有三套不同的答案。<\/strong><\/p>\n<p>远星号走东岸，能带回1200枚金币。债主先拿走1000，商人剩下200。<\/p>\n<p>如果走风暴航线，一半概率带回2000，一半概率归零。整艘船的预期价值只有1000，低于东岸航线的1200。从公司整体看，这是一项会损失价值的选择。<\/p>\n<p>可商人的账并不是这样。<\/p>\n<p>成功时，2000减去债务1000，股东拿走1000；失败时，公司归零，有限责任让股东最差只损失已经投入船里的资本，无法偿还的部分落到债权人身上。<\/p>\n<p>所以股东在风暴航线下的预期所得是：<\/p>\n<div class=\"formula\" role=\"math\">50%×1000+50%×0=500<\/div>\n<p>这比走东岸稳稳得到的200更多。<\/p>\n<p>债权人恰好相反。走东岸，他能收回1000；走风暴，成功收1000，失败收0，预期只能收回500。<\/p>\n<p>公司总价值从1200降到1000，股东的预期所得却从200升到500。消失的价值和增加的股东收益，最后都压在债权人的损失里。<\/p>\n<p>这就是风险转移，也叫资产替代。<\/p>\n<p><strong>为什么股东的收益像一份看涨期权？<\/strong><\/p>\n<p>公司到期时，股东拿到的是偿还债务之后的剩余：<\/p>\n<div class=\"formula\" role=\"math\">Equity=max(V-D,0)<\/div>\n<p><span class=\"math-inline\">V<\/span> 是公司资产价值，<span class=\"math-inline\">D<\/span> 是到期债务。<\/p>\n<p>如果公司价值低于债务，股东所得为0；如果公司价值超过债务，超过的部分归股东。这个收益结构和看涨期权非常相似：下行被0截住，上行仍然保留。<\/p>\n<p>当公司经营健康、资产价值远高于债务时，股东承担的大部分损失最终还是自己的，通常不会随便拿公司去赌。<\/p>\n<p>当公司已经接近违约时，保守经营带来的好处往往先用于保住债权人本金，股东能分到的剩余很少；高风险项目一旦成功，超过债务的上行却主要归股东。这时，提高波动可能成为股东眼里有吸引力的选择。<\/p>\n<p><strong>它为什么常在困境公司里出现？<\/strong><\/p>\n<p>因为债务把公司的收益切成了两段。<\/p>\n<p>债权人的收益上方有封顶：公司赚得再多，通常也只收回本金和利息；下方却要承担公司资产不足时的损失。<\/p>\n<p>股东的收益下方有地板：最差归零；上方没有同样的封顶。<\/p>\n<p>公司越接近资不抵债，这种不对称越尖锐。于是管理层可能选择孤注一掷，也可能拒绝一个能增加公司总价值、却主要用来偿还旧债的稳健项目。前者叫风险转移，后者常被称为债务悬置或投资不足。<\/p>\n<p><strong>放到市场里，会看到什么？<\/strong><\/p>\n<p>高负债企业突然进入陌生的高风险业务、用核心资产为新赌注融资、在经营困难时大幅提高项目波动，都需要检查收益最终流向谁、损失由谁承担。<\/p>\n<p>这不等于所有转型和冒险都是错误的。关键要分别计算三件事：项目是否增加公司总价值，股东是否因此受益，债权人是否承担了更多下行。三项答案可能完全不同。<\/p>\n<p>对股票投资者来说，高波动有时确实能提高股权的“翻身价值”，但这不代表企业质量变好。它也可能只是把一部分价值从债权人手里转给股东，同时提高归零概率。<\/p>\n<p><strong>为什么借款合同总有那么多限制？<\/strong><\/p>\n<p>抵押物、负债率约束、分红限制、交叉违约条款和重大投资需获同意，看起来像债权人多管闲事，实际是在防止借款完成后，公司悄悄换成一场更大的赌局。<\/p>\n<p>如果这些约束缺失，债权人会在一开始就提高利率，或者干脆不借。复杂契约的成本，正是为了解决“决定风险的人”和“承担损失的人”并非同一群人的问题。<\/p>\n<p><strong>最容易误解的一点<\/strong><\/p>\n<p>风险转移不要求任何人故意作恶。商人、船长和债主都可以严格遵守契约，也都在做对自己最有利的选择，最后仍然得到一个损害公司总价值的决定。<\/p>\n<p>问题不在人突然变坏，而在不同人的收益曲线从一开始就没有对齐。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>判断一家公司为什么突然愿意冒险，不能只问项目会赚多少，还要问：赢了归谁，输了又由谁买单。<\/p>", "reading_minutes": "8"}]</script>
  <script>
    const stories=JSON.parse(document.getElementById('storyData').textContent);
    const storyMeta={'01':{field:'资产定价',question:'同样的一百枚银币，为什么会有两种价格？'},'02':{field:'拍卖与信息',question:'赢得越漂亮，为什么越可能买贵？'},'03':{field:'市场微观结构',question:'同一件东西，为什么同时有两个价格？'},'04':{field:'银行与流动性',question:'资产明明足够，为什么还是会倒下？'},'05':{field:'公司金融',question:'谁决定风险，最后又是谁承担损失？'}};
    const storyArtwork={'01':'assets/story-01.webp','02':'assets/story-02.webp','03':'assets/story-03.webp','04':'assets/story-04.webp','05':'assets/story-05.webp'};
    const quizData={'01':{question:'某个市场明年有两种状态：繁荣概率 80%，衰退概率 20%。繁荣时的随机贴现因子为 1，衰退时为 6。现在有两份契约，各自在对应状态支付 100 元，在另一状态支付 0。哪份契约今天更贵？',options:[{id:'A',label:'繁荣契约更贵，价格约为衰退契约的 4 倍'},{id:'B',label:'衰退契约更贵，价格约为繁荣契约的 1.5 倍'},{id:'C',label:'两份契约一样贵，因为支付金额相同'}],answer:'B',explanation:'按 P=E[mX] 计算：繁荣契约的定价权重是 80%×1=0.8；衰退契约的定价权重是 20%×6=1.2。两者支付金额相同，所以衰退契约价格是繁荣契约的 1.2÷0.8=1.5 倍。衰退发生得更少，但那时的一元钱更有价值。'}};
    const homeView=document.getElementById('homeView'),readerView=document.getElementById('readerView'),reader=document.getElementById('reader'),storyShelf=document.getElementById('storyShelf'),storyMap=document.getElementById('storyMap'),readerProgress=document.getElementById('readerProgress');
    const routeHashes={home:'#home',stories:'#stories'};
    let currentIndex=-1,fontSize=Number(localStorage.getItem('fable-font-size')||19),completionObserver=null,routeFrame=0;

    function readStoredSet(key){try{const value=JSON.parse(localStorage.getItem(key)||'[]');return new Set(Array.isArray(value)?value:[])}catch{return new Set()}}
    const readStories=readStoredSet('fable-read-stories');
    function saveReadStories(){localStorage.setItem('fable-read-stories',JSON.stringify([...readStories]))}
    function metaFor(story){return storyMeta[story.number]||{field:'金融学习',question:'这个故事里，价格和选择为什么会走到这一步？'}}
    function artworkFor(story){return storyArtwork[story.number]||`assets/story-${story.number}.webp`}
    function targetFromLocation(){return location.hash.replace(/^#/,'')||'home'}
    function normalizeTarget(target){if(target==='home'||target==='stories')return target;return stories.some(story=>story.number===target)?target:'home'}

    function renderStoryMap(){storyMap.innerHTML=stories.slice(0,5).map((story,index)=>`<button type="button" class="map-story" data-action="open-story" data-index="${index}" aria-label="阅读《${story.title}》"><img src="${artworkFor(story)}" alt="" fetchpriority="${index===0?'high':'auto'}"><span class="map-caption"><small>${story.number}</small><strong>${story.title}</strong></span></button>`).join('')}
    function renderShelf(){storyShelf.innerHTML=stories.map((story,index)=>{const meta=metaFor(story),isRead=readStories.has(story.number);return `<button type="button" class="story-card" data-action="open-story" data-index="${index}" aria-label="阅读《${story.title}》"><img class="story-card-art" src="${artworkFor(story)}" alt="" loading="lazy"><span class="story-card-copy"><span><span class="story-card-number">寓言 ${story.number}</span> · <span class="story-card-field">${meta.field}</span></span><span><h3>${story.title}</h3><p class="story-card-question">${meta.question}</p></span><span class="story-card-footer"><span>${isRead?'<span class="read-status">已读</span>':`约 ${story.reading_minutes} 分钟`}</span><span class="card-arrow" aria-hidden="true">→</span></span></span></button>`}).join('')}
    function setActiveNavigation(target){document.querySelectorAll('.primary-nav [data-route]').forEach(button=>{const active=button.dataset.route===(target==='stories'?'stories':'home');button.setAttribute('aria-current',active?'page':'false')})}

    function renderHome(target='home'){
      currentIndex=-1;homeView.hidden=false;readerView.hidden=true;document.getElementById('siteFooter').hidden=false;document.title='金融寓言｜用故事学懂金融';renderStoryMap();renderShelf();readerProgress.style.width='0';setActiveNavigation(target);
    }
    function renderStory(index){
      const story=stories[index];if(!story)return renderHome();currentIndex=index;const meta=metaFor(story),previous=stories[index-1],next=stories[index+1],quiz=quizData[story.number];
      const quizMarkup=quiz?`<section class="transfer-quiz" aria-labelledby="quizTitle"><p class="quiz-kicker">换一个场景</p><h2 id="quizTitle">你能算出这两份契约的相对价格吗？</h2><p class="quiz-context">${quiz.question}</p><div class="quiz-options">${quiz.options.map(option=>`<button type="button" class="quiz-option" data-action="answer-quiz" data-option="${option.id}"><strong>${option.id}.</strong> ${option.label}</button>`).join('')}</div><div class="quiz-explanation" id="quizExplanation" aria-live="polite" hidden></div></section>`:'';
      homeView.hidden=true;readerView.hidden=false;document.getElementById('siteFooter').hidden=true;localStorage.setItem('fable-last-story',story.number);setActiveNavigation('stories');
      reader.innerHTML=`<header class="story-header"><div class="story-index">寓言 ${story.number} / ${String(stories.length).padStart(2,'0')} · ${meta.field}</div><h1>${story.title}</h1><p class="story-deck">${meta.question}</p><div class="story-meta"><span>约 ${story.reading_minutes} 分钟</span><span>故事结束后揭晓概念</span></div></header><figure class="story-opening"><img src="${artworkFor(story)}" alt="" fetchpriority="high"></figure><section class="story-body">${story.story_html}</section><div class="reveal-divider">答案揭晓</div><section class="concept-section" id="conceptSection"><div class="concept-kicker">这个故事讲的是</div><h2>${story.concept}</h2><div class="concept-copy">${story.concept_html}</div></section>${quizMarkup}<div class="completion"><strong>这一篇读完了</strong><span>回到寓言故事，还可以从另一种市场困境继续。</span></div><nav class="story-nav" aria-label="切换寓言"><button type="button" data-action="previous-story" ${previous?'':'disabled'}><span class="nav-direction">上一篇</span><span class="nav-story-title">${previous?previous.title:'已经是第一篇'}</span></button><button type="button" data-action="next-story" ${next?'':'disabled'}><span class="nav-direction">下一篇</span><span class="nav-story-title">${next?next.title:'已经是最后一篇'}</span></button></nav>`;
      document.title=`${story.title}｜金融寓言`;observeCompletion(story.number);updateProgress();
    }

    function scrollForTarget(target){requestAnimationFrame(()=>{if(target==='stories'){document.getElementById('storyShelfSection').scrollIntoView({block:'start'})}else{window.scrollTo({top:0,left:0})}})}
    function renderRoute(target){const normalized=normalizeTarget(target),index=stories.findIndex(story=>story.number===normalized);if(index>=0)renderStory(index);else renderHome(normalized);scrollForTarget(normalized)}
    function navigate(target,options={}){const normalized=normalizeTarget(target),hash=routeHashes[normalized]||`#${normalized}`,method=options.replace?'replaceState':'pushState';if(location.hash!==hash){history[method](null,'',hash)}renderRoute(normalized)}
    function scheduleLocationRoute(){cancelAnimationFrame(routeFrame);routeFrame=requestAnimationFrame(()=>renderRoute(targetFromLocation()))}

    function showQuizExplanation(optionId){const story=stories[currentIndex],quiz=story&&quizData[story.number],explanation=document.getElementById('quizExplanation');if(!quiz||!explanation)return;reader.querySelectorAll('.quiz-option').forEach(button=>{button.disabled=true;button.classList.toggle('selected',button.dataset.option===optionId)});const selected=quiz.options.find(option=>option.id===optionId);explanation.hidden=false;explanation.innerHTML=`<strong>${optionId===quiz.answer?'结论成立':'再核对一次'}：正确答案是 ${quiz.answer}</strong><span>你选择了 ${selected?selected.id:optionId}。${quiz.explanation}</span>`;updateProgress()}
    function handleAction(action,element){if(action==='open-story'){const index=Number(element.dataset.index);if(Number.isInteger(index)&&stories[index])navigate(stories[index].number)}else if(action==='previous-story'&&currentIndex>0){navigate(stories[currentIndex-1].number)}else if(action==='next-story'&&currentIndex<stories.length-1){navigate(stories[currentIndex+1].number)}else if(action==='answer-quiz'){showQuizExplanation(element.dataset.option)}else if(action==='font-down'){setFontSize(fontSize-1)}else if(action==='font-up'){setFontSize(fontSize+1)}else if(action==='toggle-theme'){toggleTheme()}}
    function observeCompletion(storyNumber){if(completionObserver)completionObserver.disconnect();const concept=document.getElementById('conceptSection');if(!concept)return;if(!('IntersectionObserver' in window)){readStories.add(storyNumber);saveReadStories();return}completionObserver=new IntersectionObserver(entries=>{if(!entries.some(entry=>entry.isIntersecting))return;readStories.add(storyNumber);saveReadStories()},{threshold:.12});completionObserver.observe(concept)}
    function updateProgress(){if(currentIndex<0)return;const scrollable=document.documentElement.scrollHeight-window.innerHeight,ratio=scrollable>0?Math.min(1,Math.max(0,window.scrollY/scrollable)):0;readerProgress.style.width=`${ratio*100}%`}
    function setFontSize(value){fontSize=Math.min(23,Math.max(16,value));document.documentElement.style.setProperty('--body-size',`${fontSize}px`);localStorage.setItem('fable-font-size',String(fontSize));updateProgress()}
    function toggleTheme(){const nextTheme=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=nextTheme;localStorage.setItem('fable-theme',nextTheme)}

    document.addEventListener('click',event=>{const routeControl=event.target.closest('[data-route]');if(routeControl){navigate(routeControl.dataset.route);return}const actionControl=event.target.closest('[data-action]');if(actionControl&&!actionControl.disabled)handleAction(actionControl.dataset.action,actionControl)});
    window.addEventListener('popstate',scheduleLocationRoute);window.addEventListener('hashchange',scheduleLocationRoute);window.addEventListener('scroll',updateProgress,{passive:true});window.addEventListener('resize',updateProgress);
    window.addEventListener('keydown',event=>{if(currentIndex<0)return;if(event.key==='ArrowLeft'&&currentIndex>0)navigate(stories[currentIndex-1].number);if(event.key==='ArrowRight'&&currentIndex<stories.length-1)navigate(stories[currentIndex+1].number);if(event.key==='Escape')navigate('stories')});
    document.getElementById('storyCount').textContent=`${stories.length} 篇完整故事`;const savedTheme=localStorage.getItem('fable-theme');if(savedTheme)document.documentElement.dataset.theme=savedTheme;setFontSize(fontSize);navigate(targetFromLocation(),{replace:true});
  </script>
</body>
</html>
