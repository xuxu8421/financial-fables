  <script id="storyData" type="application/json">[{"number": "01", "title": "雾港最后一张船票", "concept": "随机贴现因子", "story_html": "<p>雾港的人一生都在等两种风。<\/p>\n<p>东风来时，海面平得像一块擦亮的银。货船当天就能出港，鱼市、酒馆和旅店挤满外乡客。西风来时，浓雾会从海上压进城里，钟楼只剩一个模糊的影子。船要停，货会烂，码头工也领不到工钱。<\/p>\n<p>阿洛在码头抄写货单。他攒了十年，终于有一百枚银币。<\/p>\n<p>钱庄给了他两个选择。<\/p>\n<p>第一张契据写着：明年东风来时，凭据可兑一百枚银币；西风来时，一枚也没有。<\/p>\n<p>第二张正好相反：西风来时兑一百枚，东风来时作废。<\/p>\n<p>钱庄掌柜说，两种风出现的机会差不多，因此两张契据都卖五十枚。<\/p>\n<p>阿洛觉得公平。可第二天一早，卖西风契据的窗口前排起长队，价格很快涨到七十。东风契据降到三十，仍无人问津。<\/p>\n<p>掌柜骂那些人胆小：“明明都是一半的机会，为什么一张贵一倍？”<\/p>\n<p>阿洛也想不明白。<\/p>\n<p>直到那年冬天，雾港来了一位修船的老妇人。她从不预测天气，只问阿洛：“东风来时，你的一百枚能买什么？”<\/p>\n<p>“一间酒馆，也许还能剩一点。”<\/p>\n<p>“西风呢？”<\/p>\n<p>阿洛想了想：“西风来时大家都没有收入。粮价会涨，药铺只收现钱。一百枚可能只能保住一家人。”<\/p>\n<p>老妇人说：“所以契据上写着同样的一百枚，装的却不是同一种东西。”<\/p>\n<p>阿洛没有听懂。<\/p>\n<p>老妇人带他去了港口尽头。那里停着一艘小船，船主准备离开雾港。他只剩一个座位，开价一百枚。<\/p>\n<p>“现在付一百，明天无论什么风都能走。”船主说。<\/p>\n<p>阿洛提出用契据交换。船主看了看两张纸，愿意用七十枚的价格接过西风契据，却只肯给东风契据三十枚。<\/p>\n<p>掌柜又争辩：“两张都有一半机会兑付！”<\/p>\n<p>船主指着码头说：“东风来了，我的船能装满客人，一百枚只是锦上添花。西风来了，整个港口都会停摆，那一百枚能让我买到粮、雇到人、修好船。你数的是银币出现的机会，我算的是银币出现时，我有多需要它。”<\/p>\n<p>阿洛忽然明白，雾港从来没有一把固定的尺子，把明年的银币折成今天的价格。<\/p>\n<p>东风里的银币，被轻轻折了一下。<\/p>\n<p>西风里的银币，被郑重地捧在手里。<\/p>\n<p>后来，阿洛用七十枚买了西风契据，把剩下三十枚留在身边。那年春天果然吹来东风，他的契据成了废纸。<\/p>\n<p>掌柜笑他赔了钱。<\/p>\n<p>阿洛却没有争辩。他知道自己买的并不是对西风的预测。<\/p>\n<p>他买的是：如果最坏的时候真的到来，自己仍有选择。<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：未来的一枚银币，没有一个固定的今天价格。<\/strong><\/p>\n<p>我们平时做贴现，习惯把明年的100元除以一个利率，得到它今天值多少。这个算法默认了一件很强的事：无论明年过得好还是坏，那100元对你的重要程度都一样。<\/p>\n<p>现实里并非如此。<\/p>\n<p>收入稳定、市场繁荣的时候，多出来的100元可能只够多吃一顿饭；失业、资产下跌、现金紧张的时候，同样的100元可能决定你是否需要低价卖掉手里的资产。金额没有变，它出现的场景变了，它对人的价值也随之改变。<\/p>\n<p>这就是故事里两张契据价格不同的原因。东风契据在全城都赚钱时支付，像锦上添花；西风契据在码头停摆、粮价上涨时支付，像雪中送炭。两种风即使各有一半概率，两张契据也不必各值50。<\/p>\n<p><strong>故事里的对应关系<\/strong><\/p>\n<p>雾港的东风和西风，代表未来不同的经济状态。<\/p>\n<p>契据承诺的100枚银币，是资产在某个状态下支付的现金流。<\/p>\n<p>船主愿意给西风契据更高的价格，说明市场给“坏时候的钱”更高权重。<\/p>\n<p>老妇人真正使用的那把尺子，叫随机贴现因子。<\/p>\n<p>资产定价里常写成：<\/p>\n<div class=\"formula\" role=\"math\">P_t=E_t[m_{t+1}X_{t+1}]<\/div>\n<p><span class=\"math-inline\">X_{t+1}<\/span> 是资产未来支付多少，<span class=\"math-inline\">m_{t+1}<\/span> 是未来每种状态下的一元钱，折回今天时分别有多重。<\/p>\n<p>在好日子里，现金不稀缺，<span class=\"math-inline\">m<\/span> 较低；在坏日子里，现金最有用，<span class=\"math-inline\">m<\/span> 较高。所以资产价格看的不只是“平均能赚多少”，还看它在什么时候赚钱。<\/p>\n<p><strong>放到市场里，会看到两类完全不同的资产。<\/strong><\/p>\n<p>一类资产往往在经济好、大家收入高、风险偏好强的时候表现最好。它的收益看起来很高，但真正需要钱时，它也可能一起下跌。投资者愿意持有它，通常需要更高的预期回报作为补偿。<\/p>\n<p>另一类资产可能长期收益没有那么耀眼，却能在衰退、恐慌或收入受损时保住价值。它提供了保险，投资者愿意出更高价格购买，因此它未来的平均回报反而可能更低。<\/p>\n<p>这能解释资产定价里一个很反直觉的现象：高预期收益有时并不是奖励你“眼光好”，而是在补偿这项资产偏偏会在你最难受的时候亏钱。<\/p>\n<p>更严格地说，风险溢价取决于资产收益和随机贴现因子的共同变化：<\/p>\n<div class=\"formula\" role=\"math\">E[R]-R_f=-(Cov(m,R))/(E[m])<\/div>\n<p>如果一项资产在 <span class=\"math-inline\">m<\/span> 很高的坏状态中表现很差，右边就会变大，市场会要求它提供更高的预期收益。<\/p>\n<p><strong>为什么这个概念重要？<\/strong><\/p>\n<p>因为它会改变“收益高不高”的问法。<\/p>\n<p>只看年化收益、平均回报或上涨概率，会漏掉最重要的一层：这项收益和你自己的处境是什么关系？如果你的工作收入、奖金和投资组合都在经济繁荣时变好，在衰退时一起变差，那么它们表面上是不同资产，实际可能压在同一种风险上。<\/p>\n<p>反过来，一项看起来收益不高的配置，如果能在你现金最紧张的时候提供流动性，它的价值不能只用平均收益衡量。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>资产的价值，不只取决于它未来给你多少钱，还取决于它在你多需要钱的时候给你钱。<\/p>\n<p>雾港里昂贵的从来不是“西风更可能发生”这个判断。<\/p>\n<p>昂贵的是：当西风真的来临时，你仍然握有选择。<\/p>", "reading_minutes": "7"}, {"number": "02", "title": "所有人都觉得自己捡漏的拍卖会", "concept": "共同价值拍卖与赢家诅咒", "story_html": "<p>北山脚下有一座废弃的银矿。<\/p>\n<p>矿井已经封了二十年。老矿主去世前留下一句话：“最后一层岩脉还在，只是不知道有多厚。”<\/p>\n<p>城里决定拍卖开采权。谁出价最高，谁就能把矿里剩下的银全部带走。<\/p>\n<p>拍卖前，每位竞买人都可以派一名勘探师下井。矿井太深，每个人只能在一个位置敲下一小块岩石。有人带回亮得刺眼的矿样，有人只带回灰黑石屑。<\/p>\n<p>珠宝商估计矿藏值八千枚金币。<\/p>\n<p>铁匠估计五千。<\/p>\n<p>远道而来的商队首领估计一万二千。<\/p>\n<p>年轻的矿商伊森拿到的矿样最好。他在灯下看见密密麻麻的银线，觉得整座山至少值一万五千。<\/p>\n<p>他的会计劝他谨慎：“别人也看过矿井。”<\/p>\n<p>伊森说：“正因为别人看过，他们才更不敢出高价。我亲眼看见了银。”<\/p>\n<p>拍卖开始后，价格很快超过五千。铁匠退出，珠宝商也在七千时停手。商队首领坚持到一万，最后还是放下号牌。<\/p>\n<p>伊森以一万零五百枚金币拍下矿井。<\/p>\n<p>全场鼓掌。他只比第二名多出五百，却买下了可能价值一万五千的东西。伊森觉得自己捡了一个大漏。<\/p>\n<p>开采后的第一个月，矿石质量很好。第二个月开始，银线变细。第三个月，工人挖穿了那层岩脉，后面只剩普通石头。<\/p>\n<p>卖掉全部银矿后，伊森只收回七千枚金币。<\/p>\n<p>他怀疑有人在拍卖前动了手脚，便把所有勘探师找来核对记录。<\/p>\n<p>珠宝商的样本推算值八千，铁匠的样本推算值五千，商队首领的是一万二千。还有几个早早退出的人，估值只有三四千。<\/p>\n<p>伊森拍着桌子：“那我明明拿到了最准确的样本，为什么还会输？”<\/p>\n<p>年老的地质师把所有样本排成一列，说：“你拿到的不是最准确的样本，只是最乐观的样本。”<\/p>\n<p>伊森不服：“可它确实来自矿里。”<\/p>\n<p>“每一块都来自矿里。问题是，你在赢下拍卖的那一刻，已经知道了一件新事。”<\/p>\n<p>“什么？”<\/p>\n<p>“你知道，在所有看过矿井的人中，你是估得最高的那个。”<\/p>\n<p>地质师把伊森的矿样放到最右边。<\/p>\n<p>“拍卖之前，你只看见自己的银线。拍卖结束时，其他人的沉默也成了证据。他们一个个退出，不只是因为胆小。他们是在告诉你：他们看到的矿井，没有你看到的那么好。”<\/p>\n<p>伊森这才意识到，他最后一次加价时，仍在用拍卖开始前的估值。<\/p>\n<p>他把胜利当成了自己判断正确的证明。<\/p>\n<p>可在这种拍卖里，胜利本身恰恰是一个警告：也许不是别人没看见便宜，而是只有你看得那么贵。<\/p>\n<p>下一年，城里又拍卖一座铜矿。伊森仍派勘探师下井，也仍认真估值。<\/p>\n<p>不同的是，当他的估值高过所有人时，他先问了一句：<\/p>\n<p>“如果我恰好是最乐观的那个人，我应该从自己的数字里减掉多少？”<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：在有共同答案的竞争里，赢本身也是一条信息。<\/strong><\/p>\n<p>如果拍卖的是一幅画，有人喜欢它，有人不喜欢它，每个人心里的价值不同。这叫私人价值拍卖。你愿意花多少，主要取决于它对你有多重要。<\/p>\n<p>银矿不同。无论最后是谁买下，地下能挖出多少银都不会改变。大家面对的是同一个真实价值，只是每个人看见的矿样不同。这类场景叫共同价值拍卖。<\/p>\n<p>设银矿真正价值为 <span class=\"math-inline\">V<\/span>，每位竞买人看到的信号是：<\/p>\n<div class=\"formula\" role=\"math\">s_i=V+ε_i<\/div>\n<p><span class=\"math-inline\">ε_i<\/span> 是勘探误差。有人刚好敲到富矿，有人刚好敲到贫矿。每份样本都包含信息，也都带着噪声。<\/p>\n<p><strong>伊森错在哪里？<\/strong><\/p>\n<p>他在拍卖前根据自己的矿样估值，这一步没有问题。问题出现在他赢下拍卖之后，仍然把原来的估值当成全部信息。<\/p>\n<p>当其他人陆续退出时，伊森已经得到一批新信号：他们看到的东西没有支持更高价格。尤其当所有竞买人都专业、都做过调查时，“只有我愿意出到这里”不能简单理解为自己比别人勇敢。<\/p>\n<p>赢家真正该计算的是：<\/p>\n<div class=\"formula\" role=\"math\">E[V |  s_i, s_i 是所有信号中最高的]<\/div>\n<p>这比只计算 <span class=\"math-inline\">E[V |  s_i]<\/span> 多了一个条件：我的判断恰好是全场最乐观的那个。<\/p>\n<p>而最高估值往往不只包含最多的信息，也更可能包含最大的正向误差。就像十个人分别称同一头牛，最后一定是读数最高的人赢，但最高读数也最容易把秤的误差一起买回家。<\/p>\n<p><strong>这就是赢家诅咒。<\/strong><\/p>\n<p>它并不是说赢家一定亏钱，也不是说拍卖永远不能参加。它提醒竞买人：如果你只有在自己的估值高于所有人时才会成交，那么成交这一刻，你面对的样本已经被筛选过了。<\/p>\n<p>参与者越多，最高误差被挑出来的机会越大；信息越模糊，每个人的估值越分散；竞争越激烈，留给赢家修正错误的余地越小。因此理性的竞买人通常会“压价”，给自己看到的估值打一个折扣。<\/p>\n<p><strong>放到现实市场里，会出现在哪里？<\/strong><\/p>\n<p>矿权、土地、艺术品、公司并购、牌照和广告竞价，都是常见的共同价值场景。大家争的东西最终能产生多少现金流，大体上有一个共同答案，但每个人掌握的资料和判断精度不同。<\/p>\n<p>股票二级市场并不是一场标准的单轮拍卖，不过类似的筛选仍会发生。某个资产人人都研究过，而你还能轻松以自己认定的“便宜价”买到时，可以多问一句：对手为什么愿意在这个价格卖给我？这不证明你错，却提醒你成交对手也可能掌握了你没看到的信息。<\/p>\n<p>热门发行、拥挤交易和叙事最强的时候，问题会反过来出现。大家都觉得稀缺，最后拿到最多份额的人，可能恰好也是对乐观假设修正最少的人。<\/p>\n<p><strong>为什么这个概念重要？<\/strong><\/p>\n<p>因为很多亏损并非来自不会估值，而是来自把“赢得竞争”误当成“估值被市场认证”。<\/p>\n<p>真正成熟的判断，需要在成交后再更新一次：我刚刚获胜，这件事对标的真实价值意味着什么？如果没有新的独有信息支撑，赢得太轻松和赢得太坚决，都值得重新检查。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>在共同价值的竞争里，你支付的不只是标的价格，还可能替全场买下了最乐观的误差。<\/p>", "reading_minutes": "7"}, {"number": "03", "title": "沉默集市里的第二种价格", "concept": "知情交易、逆向选择与买卖价差", "story_html": "<p>海边有一座香料城。每天清晨，远洋船会带来胡椒、肉桂和藏红花。没有船靠岸的日子，城里的存货就会少一截，价格也会涨。<\/p>\n<p>城中最大的香料摊由塞缪尔经营。他每天在木牌上写一个价格，买卖都按这个数成交。<\/p>\n<p>有一天，他发现自己总在最糟的时候卖出香料。<\/p>\n<p>每当一个戴灰帽的人来大量买胡椒，下午就会传来船队延误的消息，胡椒价格暴涨。每当一个提红篮子的女人急着卖肉桂，傍晚就会有新船进港，肉桂价格大跌。<\/p>\n<p>塞缪尔怀疑他们能比别人更早看到港口信号。<\/p>\n<p>第二天，他把胡椒价格从十枚银币提高到十二枚。普通居民嫌贵，灰帽人仍然买走全部存货。下午果然起雾，船队没有进港，市价涨到十五。<\/p>\n<p>塞缪尔还是亏。<\/p>\n<p>第三天，他把价格提到十四。灰帽人没有出现，普通居民也不买。摊位一整天没有成交。<\/p>\n<p>塞缪尔陷入两难。<\/p>\n<p>价格低，知道消息的人会把便宜货买走；价格高，不知道消息的人也不愿来。<\/p>\n<p>他去请教住在钟楼上的记账人。记账人听完，只问：“有人走到摊前说要买时，你知道了什么？”<\/p>\n<p>“我知道他想买。”<\/p>\n<p>“还有呢？”<\/p>\n<p>塞缪尔沉默。<\/p>\n<p>记账人说：“你知道，他有可能只是今晚要办宴会，也有可能刚从灯塔回来。买这个动作本身，会让‘船队延误’变得更可能。”<\/p>\n<p>“那我该拒绝所有买家？”<\/p>\n<p>“如果拒绝所有可能知道消息的人，你也会拒绝所有普通人。你能做的，是让交易方向进入价格。”<\/p>\n<p>第二天，塞缪尔擦掉木牌上的单一价格，写下两个数：<\/p>\n<p>买入胡椒，每袋九枚。<\/p>\n<p>卖出胡椒，每袋十一枚。<\/p>\n<p>居民们很生气：“同一袋胡椒，为什么你买时只给九枚，卖时却要十一枚？”<\/p>\n<p>塞缪尔没有解释。<\/p>\n<p>上午，一个普通厨师以十一枚买了一袋。中午，一个农夫把多余的胡椒以九枚卖给他。塞缪尔在两笔生意之间赚了两枚。<\/p>\n<p>下午，灰帽人出现，一口气买走二十袋。塞缪尔知道对方可能掌握消息，但这一次，他每袋按十一枚卖出。多收的部分，补偿了他偶尔卖给知情者的损失。<\/p>\n<p>几天后，提红篮子的女人来卖肉桂。塞缪尔只肯按较低的买入价接货。傍晚新船到港，肉桂果然跌价，但他没有像以前那样损失惨重。<\/p>\n<p>集市里渐渐出现了两种价格。越难判断消息真假的香料，两个价格离得越远；消息透明、货源稳定的香料，两个价格几乎挨在一起。<\/p>\n<p>后来，港口修了一座人人看得见的信号塔。船队是否进港，不再只有少数人提前知道。<\/p>\n<p>灰帽人从此很少来。塞缪尔木牌上的两个数字，也慢慢靠近。<\/p>\n<p>居民们以为是他终于变得厚道。<\/p>\n<p>只有钟楼上的记账人知道，塞缪尔并没有突然改变性情。<\/p>\n<p>只是走到他面前的每一笔交易，不再像从前那样可能藏着一个秘密。<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：市场看到一笔交易时，也在猜交易背后藏着什么。<\/strong><\/p>\n<p>塞缪尔面对的买家有两种。<\/p>\n<p>普通厨师买胡椒，是因为今晚要办宴会。他没有预测胡椒价值，只是需要用货。灰帽人买胡椒，是因为他比别人更早知道船队无法进港。<\/p>\n<p>对塞缪尔来说，两个人走到摊前时长得差不多。可只要交易发生，结果就很不对称：卖给普通厨师，他能赚一点正常利润；卖给灰帽人，他往往会在坏消息公布前把便宜货交出去。<\/p>\n<p>更麻烦的是，知情者会挑时间交易。<\/p>\n<p>当塞缪尔的价格对他有利时，他才会出现；没有信息优势时，他可以沉默。于是塞缪尔成交的订单，并不是从所有居民里随机抽出来的，而是被知情者主动筛选过的。这就是逆向选择。<\/p>\n<p><strong>为什么同一袋胡椒会有两个价格？<\/strong><\/p>\n<p>在简化的 Glosten-Milgrom 模型中，做市者先设想资产真正价值 <span class=\"math-inline\">V<\/span>，然后根据自己看到的订单方向更新判断：<\/p>\n<div class=\"formula\" role=\"math\">Ask=E[V |  Buy],     Bid=E[V |  Sell]<\/div>\n<p>当有人主动买入，做市者会提高“对方知道利好消息”的概率，所以卖价靠近一个更高的条件期望。<\/p>\n<p>当有人主动卖出，做市者会提高“对方知道利空消息”的概率，所以买价靠近一个更低的条件期望。<\/p>\n<p>因此：<\/p>\n<div class=\"formula\" role=\"math\">E[V |  Buy]&gt;E[V |  Sell]<\/div>\n<p>两者之间的距离，就是买卖价差的一部分。<\/p>\n<p>价差看起来像摊主两头赚钱，实际要同时覆盖库存风险、订单处理成本，也要补偿他偶尔站在知情者对面的损失。普通交易者支付的那一点价差，有一部分正是在替市场吸收信息不对称的成本。<\/p>\n<p><strong>价差什么时候会突然变宽？<\/strong><\/p>\n<p>答案通常和“谁可能知道得更多”有关。<\/p>\n<p>重大消息公布前、公司情况难以判断时、交易冷清的品种里，做市者更担心下一张订单来自知情者，于是报价会更保守，买卖两边拉得更开。<\/p>\n<p>当公开信息充分、参与者众多、成交连续时，一笔订单携带的秘密更少，价差往往收窄。故事里人人看得见的信号塔，就相当于更及时、更公平的公共信息披露。<\/p>\n<p>这也解释了为什么“流动性”不是一个固定属性。同一项资产平时可能很好成交，一到消息混乱或市场恐慌时，报价深度突然消失。大家担心的并不只是价格波动，还担心站在自己对面的人比自己更清楚发生了什么。<\/p>\n<p><strong>放到个人交易里，最直接的影响是什么？<\/strong><\/p>\n<p>第一，市价成交并非没有代价。你为了立刻成交，通常要跨过买卖价差。交易越频繁、标的越冷门，这项成本越容易侵蚀收益。<\/p>\n<p>第二，看到大单后价格继续同向移动，不一定意味着有人“操纵”价格。市场可能只是从订单方向里学习：主动买入越坚决，其他报价者越怀疑背后有尚未公开的信息。<\/p>\n<p>第三，账面上的最新成交价不等于你能立刻买入或卖出的价格。真正能执行的，是买一价和卖一价，以及那个价格上愿意承接多少数量。<\/p>\n<p><strong>最容易误解的一点<\/strong><\/p>\n<p>塞缪尔不需要准确认出灰帽人。他只要知道“来买的人里有一定比例可能知情”，就必须把这个概率写进报价。<\/p>\n<p>市场价格正是在这种不断猜测、成交、更新中吸收信息的。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>买卖价差不只是交易的门票，它也是市场对“对手可能比我知道得更多”收取的保险费。<\/p>", "reading_minutes": "7"}, {"number": "04", "title": "冬眠之前，粮仓只开一次门", "concept": "Diamond-Dybvig 银行挤兑模型", "story_html": "<p>北谷的冬天长达六个月。<\/p>\n<p>每年秋末，居民会把谷物交给中央粮仓。粮仓给每个人一张木牌，承诺需要时可以换回粮食。<\/p>\n<p>粮仓不会把所有谷物堆在原地。管理员把一部分留在前厅，另一部分送进山后的酿造窖。进入窖里的谷物，到春天会变成更耐储存、也更值钱的麦酒；但如果冬天中途砸开酒桶，只能收回很少一点湿麦。<\/p>\n<p>这套安排运行了很多年。<\/p>\n<p>有些家庭冬天突然生病，需要提前取粮；更多家庭可以等到春天。粮仓只需在前厅保留一部分谷物，就能照顾提前需要的人，同时让大部分谷物在酒窖里增值。<\/p>\n<p>某年初冬，一个旅行商人住进北谷。他在酒馆里说，自己看见粮仓管理员深夜从后门搬东西。<\/p>\n<p>第二天，十户人家拿木牌来取粮。<\/p>\n<p>管理员照常支付。<\/p>\n<p>第三天，队伍变成五十户。排在后面的人问前面的人：“粮仓真的出问题了吗？”<\/p>\n<p>前面的人说：“不知道。但如果所有人都来取，最后来的人一定什么也拿不到。”<\/p>\n<p>这句话传遍了队伍。<\/p>\n<p>有些人原本打算等到春天，现在也回家拿来木牌。不是因为他们相信粮仓偷了粮，而是因为他们相信别人会先取。<\/p>\n<p>前厅的谷物很快见底。管理员请求大家回去：“酒窖里还有足够的麦酒。等到春天，每张木牌都兑得起。”<\/p>\n<p>没人离开。<\/p>\n<p>排在最前面的木匠说：“你说春天兑得起，可我若今天不拿，明天可能排在最后。”<\/p>\n<p>管理员被迫砸开第一批酒桶。原本春天能换回一百袋粮食的麦酒，现在只能滤出六十袋湿麦。<\/p>\n<p>队伍看见运回来的粮食更少，反而更加恐慌。<\/p>\n<p>更多酒桶被砸开，更多价值在冬天里消失。到了第五天，粮仓真的无法兑付全部木牌。<\/p>\n<p>旅行商人的传言最终被查明是误会。管理员深夜搬走的是发霉的空麻袋。<\/p>\n<p>可真相已经没有用了。<\/p>\n<p>北谷长老召集居民，问：“粮仓倒下，是因为它一开始没有足够的财产吗？”<\/p>\n<p>酿酒师说：“如果等到春天，酒窖里的东西足够每个人取回粮食，还有剩余。”<\/p>\n<p>“那是因为传言吗？”<\/p>\n<p>木匠摇头：“后来我已经不在乎传言是真是假。我只在乎别人会不会先到。”<\/p>\n<p>第二年，北谷重新建立粮仓。有人主张把所有谷物都留在前厅，永远不再酿酒。<\/p>\n<p>长老拒绝了：“那样不会发生挤兑，但我们也会失去整个冬天的增值。”<\/p>\n<p>他们最终制定了两条规则。<\/p>\n<p>一旦取粮人数超过某个限度，粮仓暂时关门清点；同时由全谷共同设立一座应急小仓，在恐慌时借粮给中央粮仓。<\/p>\n<p>这并没有让酒窖里的麦酒一夜之间变成现粮。<\/p>\n<p>它改变的是居民对别人的猜测。<\/p>\n<p>当大家相信自己不必抢在最前面时，队伍就没有出现。<\/p>\n<p>粮仓也因此保住了本来就足够的财富。<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：一家原本有足够资产的机构，也可能被所有人的合理自保挤垮。<\/strong><\/p>\n<p>北谷粮仓做了一件现代金融里非常重要的事：期限转换。<\/p>\n<p>居民交进来的木牌可以随时换粮，属于短期承诺；粮仓却把大部分谷物放进酿造窖，只有等到春天才能获得更高价值，属于长期资产。<\/p>\n<p>如果每个人都只能把粮食锁到春天，突然生病的家庭会很痛苦。如果粮仓把所有粮都放在前厅，随时准备兑付，北谷又会失去酿造带来的增值。粮仓把两种需求接在了一起：少数人需要随时取用，多数人的粮食可以长期投入。<\/p>\n<p>这套安排能够成立，因为正常情况下，不会所有人同时来取。<\/p>\n<p><strong>怪事从哪里开始？<\/strong><\/p>\n<p>旅行商人的传言并没有直接烧掉一袋粮食。它只改变了居民对其他居民的判断。<\/p>\n<p>木匠原本愿意等到春天，后来却发现：如果别人都提前拿，我坚持等待就可能成为最后一个拿不到粮的人。即使他仍然相信酒窖里的资产最终足够，也有理由今天排队。<\/p>\n<p>每个人都这么想时，粮仓只能提前砸开酒桶。原本春天值100袋的长期资产，冬天只能卖60袋。真正的损失在清算过程中发生，最初关于粮仓不足的担忧，也被挤兑本身变成了事实。<\/p>\n<p>Diamond-Dybvig 模型最重要的地方，就在于同一套资产可以支持两种结果：<\/p>\n<ul><li>正常均衡：只有真正需要流动性的人提前取粮，其他人愿意等待，粮仓能够兑现承诺。<\/li><li>挤兑均衡：所有人都预期别人会抢先，因此自己也抢先，长期资产被迫贱卖，粮仓最终无法兑付。<\/li><\/ul>\n<p>两种结果之间，资产质量可以没有任何变化。改变结果的是大家对别人行动的预期。<\/p>\n<p><strong>这和“真的资不抵债”有什么区别？<\/strong><\/p>\n<p>资不抵债意味着把所有资产耐心持有并按合理价格出售，仍然还不起全部负债。<\/p>\n<p>流动性危机则可能是：长期看资产够，短期却拿不出所有人同时索要的现金。问题拖得太久，机构被迫低价抛售，流动性危机也可能进一步变成偿付危机。<\/p>\n<p>现实里两者经常纠缠在一起。外部观察者越难判断究竟是哪一种，恐慌越容易自我强化。<\/p>\n<p><strong>为什么存款保险和最后贷款人有用？<\/strong><\/p>\n<p>它们不一定需要真的支付所有人。只要承诺足够可信，让居民相信“即使我不抢在第一位，也能拿到钱”，挤兑均衡就可能失去基础。<\/p>\n<p>暂停兑付也有类似作用。它打断先到先得，让排队不再拥有决定性优势。故事里的应急小仓，则相当于在长期资产无法立刻变现时，先提供一座流动性桥梁。<\/p>\n<p>可是保护越强，粮仓也越可能觉得自己无论如何都会被救，于是把更多粮食投入危险项目。这就是道德风险。所以稳定金融体系通常需要两只手同时工作：危机时提供可信流动性，平时约束机构承担过度风险。<\/p>\n<p><strong>放到投资市场里，这个机制并不只属于银行。<\/strong><\/p>\n<p>任何“允许投资者很快赎回、底层资产却很难快速卖出”的结构，都可能遇到类似问题。开放式基金、信用产品、不动产产品或某些高收益理财，一旦赎回压力集中出现，管理人可能被迫先卖最好卖的资产，再打折处理难卖的资产。<\/p>\n<p>先退出的人拿走接近账面价值的现金，留下的人承受抛售造成的损失，于是“别人可能先跑”本身就会制造抢跑动力。<\/p>\n<p>因此判断一项产品时，只看底层资产好不好还不够。还要看它向投资者承诺了多快的流动性，以及底层资产真正变现需要多久。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>挤兑最可怕的地方，不是所有人都相信坏消息，而是每个人都相信别人会先行动。<\/p>", "reading_minutes": "7"}, {"number": "05", "title": "船长为什么选择驶进风暴", "concept": "有限责任、风险转移与股东—债权人冲突", "story_html": "<p>南方商会有一艘老货船，名叫远星号。<\/p>\n<p>船由三方共同维系：商人们出了本金，债主借钱修船，船长负责决定航线。按契约，远星号每年先偿还债主，剩下的利润才归商人。<\/p>\n<p>最初几年，远星号走的是东岸航线。海面平稳，利润不高，却足以按时还债。<\/p>\n<p>后来，新铁路抢走了大半生意。远星号的货舱越来越空，欠债却不会变少。<\/p>\n<p>到了冬天，船上的全部货物即使平安抵港，也只值一千二百枚金币。债主到期应收一千枚。扣除费用后，商人们几乎拿不到什么。<\/p>\n<p>这时，船长带回一张旧海图。<\/p>\n<p>海图上画着一条穿过风暴海峡的近路。若成功，远星号能抢先到达香料港，带回两千枚金币；若失败，船和货都会沉没。<\/p>\n<p>老水手估计，成功和失败的机会各一半。<\/p>\n<p>债主听后立即反对：“走东岸，船大概率能带回一千二百。穿风暴，平均只能带回一千，而且有一半机会什么都没有。”<\/p>\n<p>商人们却一致支持船长。<\/p>\n<p>债主不明白：“你们以前最怕冒险，为什么现在突然勇敢？”<\/p>\n<p>最大的商人把账本推到他面前。<\/p>\n<p>走东岸，远星号带回一千二百。先还债主一千，再付费用，商人们所得无几。<\/p>\n<p>穿风暴若成功，带回两千。还完一千，商人们可以分走很大一笔。<\/p>\n<p>若失败，远星号沉没。商人们失去的只是已经几乎不值钱的船份；剩余债务无法从他们其他产业追讨。<\/p>\n<p>债主看懂了账本：“成功时，多出来的收益大多归你们；失败时，大部分损失却落在我身上。”<\/p>\n<p>商人说：“契约就是这样写的。”<\/p>\n<p>债主去找船长，希望他坚持东岸航线。船长摊开双手：“我受商人雇用。他们若得不到任何剩余，我保住船也不会有奖金。只有穿过风暴，我和他们才有翻身的机会。”<\/p>\n<p>出航前一夜，老水手问船长：“你真的认为风暴航线更好吗？”<\/p>\n<p>船长说：“对整艘船未必更好。”<\/p>\n<p>“那为什么还去？”<\/p>\n<p>“因为如今决定航线的人，和承担沉船损失的人，已经不是同一群人。”<\/p>\n<p>远星号最终进入风暴海峡。<\/p>\n<p>故事没有记载它是否平安抵港。港口只留下后来重写的借款契约：从此以后，远星号改变航线需要债主同意；船体价值下降到一定程度时，必须增加抵押；船长的奖金也不再只看最好的结果。<\/p>\n<p>人们常说，是那场风暴让契约变得复杂。<\/p>\n<p>其实真正让契约复杂的，并不是海上的风。<\/p>\n<p>而是同一场风暴，对船长、商人和债主意味着完全不同的输赢。<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：同一个项目，对公司、股东和债权人可能有三套不同的答案。<\/strong><\/p>\n<p>远星号走东岸，能带回1200枚金币。债主先拿走1000，商人剩下200。<\/p>\n<p>如果走风暴航线，一半概率带回2000，一半概率归零。整艘船的预期价值只有1000，低于东岸航线的1200。从公司整体看，这是一项会损失价值的选择。<\/p>\n<p>可商人的账并不是这样。<\/p>\n<p>成功时，2000减去债务1000，股东拿走1000；失败时，公司归零，有限责任让股东最差只损失已经投入船里的资本，无法偿还的部分落到债权人身上。<\/p>\n<p>所以股东在风暴航线下的预期所得是：<\/p>\n<div class=\"formula\" role=\"math\">50%×1000+50%×0=500<\/div>\n<p>这比走东岸稳稳得到的200更多。<\/p>\n<p>债权人恰好相反。走东岸，他能收回1000；走风暴，成功收1000，失败收0，预期只能收回500。<\/p>\n<p>公司总价值从1200降到1000，股东的预期所得却从200升到500。消失的价值和增加的股东收益，最后都压在债权人的损失里。<\/p>\n<p>这就是风险转移，也叫资产替代。<\/p>\n<p><strong>为什么股东的收益像一份看涨期权？<\/strong><\/p>\n<p>公司到期时，股东拿到的是偿还债务之后的剩余：<\/p>\n<div class=\"formula\" role=\"math\">Equity=max(V-D,0)<\/div>\n<p><span class=\"math-inline\">V<\/span> 是公司资产价值，<span class=\"math-inline\">D<\/span> 是到期债务。<\/p>\n<p>如果公司价值低于债务，股东所得为0；如果公司价值超过债务，超过的部分归股东。这个收益结构和看涨期权非常相似：下行被0截住，上行仍然保留。<\/p>\n<p>当公司经营健康、资产价值远高于债务时，股东承担的大部分损失最终还是自己的，通常不会随便拿公司去赌。<\/p>\n<p>当公司已经接近违约时，保守经营带来的好处往往先用于保住债权人本金，股东能分到的剩余很少；高风险项目一旦成功，超过债务的上行却主要归股东。这时，提高波动可能成为股东眼里有吸引力的选择。<\/p>\n<p><strong>它为什么常在困境公司里出现？<\/strong><\/p>\n<p>因为债务把公司的收益切成了两段。<\/p>\n<p>债权人的收益上方有封顶：公司赚得再多，通常也只收回本金和利息；下方却要承担公司资产不足时的损失。<\/p>\n<p>股东的收益下方有地板：最差归零；上方没有同样的封顶。<\/p>\n<p>公司越接近资不抵债，这种不对称越尖锐。于是管理层可能选择孤注一掷，也可能拒绝一个能增加公司总价值、却主要用来偿还旧债的稳健项目。前者叫风险转移，后者常被称为债务悬置或投资不足。<\/p>\n<p><strong>放到市场里，会看到什么？<\/strong><\/p>\n<p>高负债企业突然进入陌生的高风险业务、用核心资产为新赌注融资、在经营困难时大幅提高项目波动，都需要检查收益最终流向谁、损失由谁承担。<\/p>\n<p>这不等于所有转型和冒险都是错误的。关键要分别计算三件事：项目是否增加公司总价值，股东是否因此受益，债权人是否承担了更多下行。三项答案可能完全不同。<\/p>\n<p>对股票投资者来说，高波动有时确实能提高股权的“翻身价值”，但这不代表企业质量变好。它也可能只是把一部分价值从债权人手里转给股东，同时提高归零概率。<\/p>\n<p><strong>为什么借款合同总有那么多限制？<\/strong><\/p>\n<p>抵押物、负债率约束、分红限制、交叉违约条款和重大投资需获同意，看起来像债权人多管闲事，实际是在防止借款完成后，公司悄悄换成一场更大的赌局。<\/p>\n<p>如果这些约束缺失，债权人会在一开始就提高利率，或者干脆不借。复杂契约的成本，正是为了解决“决定风险的人”和“承担损失的人”并非同一群人的问题。<\/p>\n<p><strong>最容易误解的一点<\/strong><\/p>\n<p>风险转移不要求任何人故意作恶。商人、船长和债主都可以严格遵守契约，也都在做对自己最有利的选择，最后仍然得到一个损害公司总价值的决定。<\/p>\n<p>问题不在人突然变坏，而在不同人的收益曲线从一开始就没有对齐。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>判断一家公司为什么突然愿意冒险，不能只问项目会赚多少，还要问：赢了归谁，输了又由谁买单。<\/p>", "reading_minutes": "8"}, {"number": "06", "title": "第九个商人已经不再看路", "concept": "信息瀑布", "story_html": "<p>雾岭把盐城和谷地隔在两边。<\/p>\n<p>穿过雾岭有两条路。北路短，路边却有一条雨季河；南路绕远，山壁又常有碎石滑落。天气好的时候，两条路都能走。坏天气来临时，通常只有一条能平安通过。<\/p>\n<p>谷地的商人每年入秋都要运盐。出发当天，山雾会遮住整座山，谁也看不见远处发生了什么。<\/p>\n<p>他们只能派侦察员走到山脚。北坡的泥土若发黑，往往说明河水正在上涨；南坡的石缝若渗出白霜，往往说明山壁快要松动。可这些迹象并不可靠。老向导说，十次里面大概能看准七次。<\/p>\n<p>商人们还有一条规矩：侦察员带回什么，只能告诉自己的主人；但商队最后驶进哪座山门，所有人都看得见。<\/p>\n<p>那年，第一个到达的是布商韩森。<\/p>\n<p>他的侦察员带回一把干燥的黑土，说北路大概安全。韩森想了想，把车队驶向北门。<\/p>\n<p>第二个到达的是药材商罗伊。他的侦察员也判断北路安全。罗伊看见韩森已经进了北门，更加放心，紧跟着驶了进去。<\/p>\n<p>第三个商人叫米洛。<\/p>\n<p>米洛的侦察员满身泥水地跑回来，说北坡的河声很重，最好走南路。<\/p>\n<p>米洛已经让车夫把马头转向南门，却在门前停住了。<\/p>\n<p>他望着北路上两支渐渐消失的车队，心里算了一遍：自己的侦察员可能看错；前面两位商人都做过多年山路生意，他们各自也派了人。两份判断对一份判断，北路似乎仍然更可信。<\/p>\n<p>米洛挥了挥手：“转回去，走北门。”<\/p>\n<p>第四位商人的侦察员同样建议南路。<\/p>\n<p>可他到达时，已经有三支商队选择北路。他不知道米洛其实也看见了危险，只知道米洛是出了名的谨慎。<\/p>\n<p>“连米洛都走北边，我们那点泥水大概不算什么。”<\/p>\n<p>第四支车队驶进北门。<\/p>\n<p>第五位商人来得更晚。他的侦察员还没回来，他就看见四道车辙整齐地通向北边。他不愿错过出发时间，直接加入队伍。<\/p>\n<p>第六位、第七位也是如此。<\/p>\n<p>北门前的车辙越来越深。后来赶到的人甚至不再讨论山色和泥土，只数前面有多少辆车。<\/p>\n<p>第九位商人是个第一次过雾岭的年轻人。他问守门的老人：“九支商队都走一条路，这还不算证据吗？”<\/p>\n<p>老人没有回答，只问：“这九支商队里，有几个人真的看过山？”<\/p>\n<p>年轻人笑了：“他们当然都有自己的判断，不然怎么会把货物押上去？”<\/p>\n<p>他也驶进了北门。<\/p>\n<p>中午过后，山里传来一声闷响。<\/p>\n<p>北坡昨夜下过暴雨，河水冲断木桥。最前面的车停在断桥边，后面的车挤满狭窄山道，想回头也转不开。盐袋被雨淋湿，马匹在泥里打滑，九支商队整整困了三天。<\/p>\n<p>南路那天只有零星碎石，晚到的两支小车队反而顺利抵达盐城。<\/p>\n<p>回到谷地后，商人们召开会议。<\/p>\n<p>第四位商人说：“我本来得到的是南路安全的消息，可米洛已经选择了北路。”<\/p>\n<p>米洛愣了：“我走北路，是因为韩森和罗伊都走了北路。”<\/p>\n<p>罗伊说：“我的侦察员确实说北路安全，韩森的选择也让我更有把握。”<\/p>\n<p>所有人最后望向韩森。<\/p>\n<p>韩森把那把黑土倒在桌上。老向导捏了一点，说：“这土不是北坡的。雾太大，你的侦察员在岔口取错了地方。”<\/p>\n<p>屋里安静下来。<\/p>\n<p>九支车队看起来像九次确认。一路追查下去，真正来自山里的新消息却只有最前面的两份，而且其中一份取错了地方。米洛之后的每一次选择，都没有增加新的观察，只把前面人的选择再重复一次。<\/p>\n<p>守门老人把会议记录合上，说：“车辙会越来越深，却不会因为更深就更接近真相。”<\/p>\n<p>第二年，谷地修改了出发规则。<\/p>\n<p>每位商人在看见别人选择之前，先把自己侦察员的判断写进一只封闭木盒。等所有木盒都交齐，守门人才同时打开。<\/p>\n<p>那以后，商队仍会判断错误。<\/p>\n<p>但山门前再也没有出现过九辆车共同证明同一把泥土的情形。<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：市场上看起来有很多人同意，背后可能只有很少几份独立信息。<\/strong><\/p>\n<p>信息瀑布发生在一连串公开行动中。每个人都有一点私人信号，也能看见前面的人如何选择。当早期行动积累到足够强，后来者会觉得公开行动比自己的微弱信号更可信，于是放弃私人判断，跟随前人。<\/p>\n<p>米洛的选择并不愚蠢。他看见两位有经验的商人都走北路，而自己的侦察员也只有七成把握。把两份可能独立的信号放在一份信号前面，选择北路可以说得通。<\/p>\n<p>问题出在米洛的行动会被第四位商人误读。第四位商人看不见米洛收到的是南路信号，只看见他去了北路，于是把米洛的行动当成第三份支持北路的证据。第五位又把前四辆车都当成证据。队伍越长，外表越有说服力，实际新增的信息却越来越少。<\/p>\n<p>这与普通的“盲目从众”不同。故事里的人可以认真计算、没有受到胁迫，也没有失去理性。只要私人信息不可见、行动按顺序公开，理性选择本身就可能把学习过程堵住。<\/p>\n<p>用一个简化的写法，商人真正需要判断的是：<\/p>\n<div class=\"formula\" role=\"math\">P(北路安全 | 自己的信号, 前人的独立信号)<\/div>\n<p>可他实际看到的只是前人的行动。行动会压缩信息：你知道对方买了，却不知道他为什么买、把握多大、是否也只是跟着别人买。<\/p>\n<p><strong>金融史上，价格也曾经这样冒充消息。<\/strong><\/p>\n<p>1987年10月19日，美国股市发生黑色星期一。事后对市场的回顾显示，当天可靠报价一度很难获得，部分股票无法及时开盘，市场关闭的传言又增加了混乱。许多参与者告诉调查者，他们响应的是价格快速下跌，而不是一条足以解释跌幅的新基本面消息。<\/p>\n<p>这不能证明信息瀑布单独造成了1987年的崩盘。程序化交易、组合保险、市场结构和流动性都参与其中。它提供的视角是：当投资者看不清发生了什么时，价格下跌本身会被理解为“别人可能知道坏消息”，这层推断又会推动新的卖出。<\/p>\n<p>2023年硅谷银行倒闭之后，相似的过程出现在美国地区银行之间。FDIC后来指出，传统媒体、社交媒体和做空者把注意力扩散到拥有高比例未保险存款、账面未实现损失等相似特征的银行。压力先反映在股价上，随后部分银行出现显著存款流出。<\/p>\n<p>那些银行各自有真实的资产负债问题，不能把失败归结为传言。但当一家银行的客户看见另一家银行的客户正在撤离时，“别人已经行动”会成为新的信息。可见的撤离越多，等待就越危险，行动因此加速。<\/p>\n<p><strong>放到个人投资里，最重要的是数信息源，而不是数赞成票。<\/strong><\/p>\n<p>十家机构同时上调评级，可能来自十套独立研究，也可能都在引用同一份行业数据。数百条帖子同时讨论一家公司，可能代表大量新信息，也可能只是一个观点被算法重复分发。成交量很大，说明交易很多，却没有自动告诉你这些交易背后有多少独立判断。<\/p>\n<p>因此，价格连续上涨不等于新增证据正在同比增加；很多人做出同一选择，也不等于他们分别核对过同一事实。<\/p>\n<p>可以继续追问四件事：<\/p>\n<ul><li>最早的判断依据是什么？后来出现了新的事实，还是只有更多人采取了同一行动？<\/li><li>后来者能否看见前人的原始信息，还是只能看见买入、卖出和价格？<\/li><li>参与者是否面对相同的榜单、风控、基准和舆论压力？如果是，他们的行动未必相互独立。<\/li><li>自己掌握的证据能否独立验证？如果不能，“和所有人反着做”也只是一种姿态。<\/li><\/ul>\n<p>信息瀑布不意味着共识必然错误。很多时候，跟随拥有更多信息的人是高效的。危险发生在行动被一层层复制以后，人们仍把每次复制当成一份新证据。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>市场上最响亮的共识，未必包含最多的信息。<\/p>\n<p>有时你看见的是九辆车；真正决定方向的，却只是最前面那一把泥土。<\/p>", "reading_minutes": "9"}, {"number": "07", "title": "银港没有坏掉的货物", "concept": "流动性螺旋", "story_html": "<p>银港的仓库沿着海湾排成一条长街。<\/p>\n<p>商船把香料、棉布和铜锭送进仓库后，会得到一张盖有火漆的仓单。仓单可以转卖，也可以拿到钱庄抵押借钱。<\/p>\n<p>钱庄的规矩很诱人。<\/p>\n<p>一批市价一百枚银币的香料，商人只要拿出二十枚，钱庄愿意借出剩下八十枚。香料涨到一百一十时，偿还八十枚借款，商人的二十枚就变成三十枚。<\/p>\n<p>“香料只涨一成，我却赚了五成。”<\/p>\n<p>很快，银港的大商人都学会了这套做法。<\/p>\n<p>钱庄每天傍晚根据最后一笔成交价重算抵押物。只要仓单价值足够覆盖借款，商人就可以继续持有；若价值下降，就必须在第二天中午前补交银币。<\/p>\n<p>香料生意稳定了很多年。仓单价格在一百上下小幅波动，没人觉得这条规矩有什么危险。<\/p>\n<p>直到一艘客船在外海触礁。<\/p>\n<p>船主奥伦需要立刻赔付遇难船员的家属。他的香料没有受潮，来年的订单也没有取消，可他手里没有足够现金，只能卖仓单。<\/p>\n<p>当天港口买家很少。奥伦先按九十八卖出一批，又按九十五卖出一批。临近收市，他为了凑齐赔款，把最后几张以九十二枚成交。<\/p>\n<p>钱庄掌柜把九十二写上黑板。<\/p>\n<p>第二天一早，所有借钱买香料的商人都收到一封信：<\/p>\n<p>“抵押物价值已经下降。请在中午前补交六枚银币，否则钱庄将出售部分仓单。”<\/p>\n<p>商人们很生气。<\/p>\n<p>“香料明明还在仓库里。”<\/p>\n<p>“春天的订单一张也没少。”<\/p>\n<p>掌柜回答：“我不怀疑香料。我只按今天有人愿意支付的价格计算抵押。”<\/p>\n<p>多数商人的钱都已经变成仓单，没有现成银币。他们只能各卖一点，换钱补足缺口。<\/p>\n<p>上午，价格跌到八十八。<\/p>\n<p>钱庄重新计算，发现昨天补足的银币又不够了。新的信件送出，要求商人继续补钱。<\/p>\n<p>下午，更多仓单被卖到市场。买家看见价格连续下跌，开始压价。有人怀疑仓库发生虫害，有人猜测远方已经取消订单，还有人只是担心明天能以更低的价格买到，于是今天不肯出手。<\/p>\n<p>价格跌到八十。<\/p>\n<p>第三天，钱庄不再等待商人自己出售。它按照契约，接管抵押仓单并直接抛向市场。<\/p>\n<p>价格越低，需要出售的仓单越多；出售越多，下一笔价格又越低。每次下跌都会产生下一轮出售的理由。<\/p>\n<p>到了傍晚，一批完整香料的仓单只卖六十枚。<\/p>\n<p>港口开始流传一句话：“价格跌成这样，货物里面一定藏着我们不知道的问题。”<\/p>\n<p>一位叫索菲的老妇人来到仓库。<\/p>\n<p>她没有买仓单，只请守仓人打开木箱。香料颜色正常，气味浓烈，封条完好。她又去了商会，查看春季采购契约。订单仍然有效，约定交付价接近一百枚。<\/p>\n<p>索菲回到钱庄问：“香料少了吗？”<\/p>\n<p>“没有。”<\/p>\n<p>“买家取消订单了吗？”<\/p>\n<p>“没有。”<\/p>\n<p>“那六十枚的价格从哪里来？”<\/p>\n<p>掌柜指着门外长队：“今天必须卖的人太多，今天能够等待的人太少。”<\/p>\n<p>索菲用没有借来的银币买下仓单。<\/p>\n<p>有人劝她：“既然六十已经这么便宜，明天可能跌到五十。”<\/p>\n<p>她说：“当然可能。所以我只用了不需要明天归还的钱。”<\/p>\n<p>春天到来时，香料按契约交付。仓单价格重新接近一百。<\/p>\n<p>商人们后来把那次暴跌称作“坏船引发的香料灾难”。索菲却说，触礁的客船只推倒了第一块木牌。<\/p>\n<p>真正压垮市场的，是每个人都把等待的权利抵押给了钱庄。<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：价格下跌会收紧融资，融资收紧又会制造新的价格下跌。<\/strong><\/p>\n<p>银港同时存在两种流动性。<\/p>\n<p>市场流动性，是你能否在不大幅压低价格的情况下卖出仓单。买家多、买卖价差小、卖一批货不会明显冲击价格，市场流动性就好。<\/p>\n<p>融资流动性，是你能否借到钱、能借多少，以及抵押物下跌后是否需要迅速补充保证金。钱庄愿意以很低的自有资金支持很大仓位，融资流动性就宽松。<\/p>\n<p>平静时期，两者互相支持。仓单容易交易，钱庄觉得抵押物可靠，愿意提供更多贷款；资金充足的商人又能为市场提供买盘。<\/p>\n<p>压力来临时，方向会反过来。奥伦的出售把价格从一百压到九十二，抵押价值随之下降。钱庄要求补保证金，其他商人被迫出售。集中卖出降低市场流动性，价格进一步下跌，钱庄又要求更多保证金。<\/p>\n<p>链条可以写成：<\/p>\n<div class=\"formula\" role=\"math\">价格下跌 → 抵押价值下降 → 杠杆被迫收缩 → 集中卖出 → 市场流动性恶化 → 价格继续下跌<\/div>\n<p>这里最重要的词是“被迫”。商人可能仍然相信香料值一百，也可能认为六十极度便宜，但契约要求他今天拿出现金。他卖出的原因不再是估值改变，而是已经失去等待能力。<\/p>\n<p><strong>这类机制在真实市场里出现过很多次。<\/strong><\/p>\n<p>2021年3月，家族办公室Archegos持有高度集中、通过总收益互换放大的股票头寸。部分核心持仓下跌后，它原本多余的保证金迅速被侵蚀。交易对手随后提出数十亿美元的追加保证金要求，Archegos无法满足，多家主经纪商开始处理相关头寸。<\/p>\n<p>那些股票的下跌并不只是在重新评估公司利润。持仓集中、杠杆高、多个交易对手同时想退出，使卖出规模远超正常市场能够平稳吸收的程度。价格下跌造成保证金缺口，保证金缺口又把更多股票推向市场。<\/p>\n<p>2020年3月，类似压力甚至出现在美国国债市场。疫情冲击下，全球投资者争相筹集现金。美联储的会议材料记录，部分对冲基金面对追加保证金或主动降低杠杆，出售非当期国债；资产管理机构也在再平衡。交易商自身承接能力有限，原本被视为最安全、最容易交易的资产也出现买卖价差扩大和价格失序。<\/p>\n<p>这两个事件的背景不同，也都包含其他原因。它们共同提醒人们：资产质量高，不能保证任何时刻都有足够买家；参与者最终可能卖掉最好卖的资产，而不是最差的资产，因为他需要的是现金。<\/p>\n<p><strong>放到股市里，可以怎样识别？<\/strong><\/p>\n<p>第一，看杠杆从哪里进入。融资买入、股票质押、场外衍生品、期货保证金和基金内部借款，都可能让仓位在下跌时被动收缩。证券账户里没有显示“融资”两个字，也不代表持有的股票背后没有杠杆资金。<\/p>\n<p>第二，看持仓是否集中。如果多个资金共同重仓少数股票，又使用相似的风控线，一次下跌可能同时触发大量卖出。平时很高的成交活跃度，未必足以承接压力期的共同退出。<\/p>\n<p>第三，观察价格之外的市场状态。成交量突然放大、买卖价差变宽、不同资产同时被出售、优质资产也出现异常折价，都可能说明市场正在筹集现金。当然，这些现象不能单独证明存在强平，只能提示你继续检查资金结构。<\/p>\n<p>第四，区分流动性问题和偿付问题。香料最终完好，索菲才能等到价格恢复。若货物真的腐烂、订单真的取消，所谓“被错杀”就会变成对基本面恶化的否认。流动性危机拖得足够久，也可能通过融资中断、资产贱卖和经营受损变成偿付危机。<\/p>\n<p><strong>对个人投资者，杠杆最大的成本不是利息，而是失去等待权和选择。<\/strong><\/p>\n<p>没有借款时，你可以决定是否忍受波动。使用高杠杆后，补保证金时间、券商折算率和强制平仓线会替你决定。即使最终判断正确，也可能在价格恢复之前被清出市场。<\/p>\n<p>保留现金也不只是为了降低账户波动。它让你在市场要求别人立刻行动时，仍有资格等待、核对事实，或者分批买入。索菲能够利用六十枚的价格，不是因为她准确猜中了最低点，而是因为她没有必须在第二天还钱。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>暴跌有时在传递坏消息，有时也在传递别人的现金期限。<\/p>\n<p>判断价格之前，先问一句：现在卖出的人，是想卖，还是必须卖？<\/p>", "reading_minutes": "9"}, {"number": "08", "title": "星果园被切成了一百张纸", "concept": "彩票偏好与偏度定价", "story_html": "<p>星果镇有一片很老的果园。<\/p>\n<p>果树不高，果子也不稀奇。只要没有罕见的霜冻，果园每年大约能收一千篮果子。镇上的酒坊、糖铺和旅店愿意按一篮一枚银币长期收购。<\/p>\n<p>园主莫林年纪大了，想把果园卖掉。<\/p>\n<p>账房先生把未来的收成、修枝成本和坏年景都算进去，说整片果园大约值九百枚银币。<\/p>\n<p>莫林在集市挂了三个月牌子，没有人出价。<\/p>\n<p>镇民并非觉得九百太贵。他们只是觉得这笔生意太慢。<\/p>\n<p>“一年赚几十枚，要等多久？”<\/p>\n<p>“就算每年都有果子，也改变不了我的生活。”<\/p>\n<p>“九百枚全压进去，明天还是照常开店。”<\/p>\n<p>一位叫维克的票商找到莫林，按九百枚买下果园。<\/p>\n<p>镇民都笑他买了一门无聊生意。<\/p>\n<p>维克接手后没有修建新水渠，没有换树种，也没有让果树多结一篮果子。他只请公证人把来年的全部收成写进一百张纸券。<\/p>\n<p>每张纸券售价十五枚银币。<\/p>\n<p>规则很怪：收获日从一百张纸券中抽出一张。抽中的人拿走一千篮果子，其余九十九张一篮也拿不到。<\/p>\n<p>第一天，柜台前就排起长队。<\/p>\n<p>面包师只买一张。他说：“十五枚不算什么，万一抽中，我就能开全镇最大的面包房。”<\/p>\n<p>酒馆学徒买了三张。他已经想好中奖后要辞掉工作，去海边买房。<\/p>\n<p>杂货商买了十张。他拿着厚厚一叠纸券，觉得幸运离自己比别人更近。<\/p>\n<p>有人提醒他们：“一百张里面只有一张能拿到果子。每张纸平均只对应十篮收成，你们却付了十五枚。”<\/p>\n<p>队伍里的人并不否认。<\/p>\n<p>“我知道大多数纸会变成废纸。”面包师说，“可普通果园永远不会让我一夜拥有一千篮果子。”<\/p>\n<p>不到两天，一百张纸券全部售罄。维克收回一千五百枚银币。<\/p>\n<p>莫林想不明白。<\/p>\n<p>同一片果园，整片卖只值九百；拆成一百张纸，所有权加起来却卖到一千五百。果树没有增加，未来收成也没有改变。<\/p>\n<p>“多出来的六百枚从哪里来？”他问。<\/p>\n<p>维克说：“你卖的是果子。我卖的是某一个人从明天起再也不用过普通日子的可能。”<\/p>\n<p>收获日，全镇挤在广场看抽签。<\/p>\n<p>面包师没有中，学徒没有中，杂货商的十张也全部落空。中奖的是一位路过的钟表匠。他的画像第二天就贴满街道，人们反复讲述十五枚银币如何变成一千篮果子。<\/p>\n<p>至于另外九十九张纸券，没有人把它们并排挂出来。<\/p>\n<p>第二年，维克买下另一片同样普通的果园。这次每张纸卖到十八枚，依然很快售完。<\/p>\n<p>更多园主开始模仿。有人把一船货拆成“沉没归零、到港独得全部”的纸券，有人把矿山收入集中给极少数号码。集市上最受欢迎的东西，越来越不像稳定生意，越来越像一扇极窄却通往巨大财富的门。<\/p>\n<p>莫林后来又种了一片果园。<\/p>\n<p>有人问他会不会也把收成切成纸券。<\/p>\n<p>他摇摇头：“我终于知道那六百枚从哪里来了。”<\/p>\n<p>“从哪里？”<\/p>\n<p>“从九十九个人愿意花钱做的同一个梦里。”<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：投资者可能愿意为极小概率的巨大收益额外付钱。<\/strong><\/p>\n<p>一项投资的收益不只可以用平均值和波动大小描述，还可以看它的形状。<\/p>\n<p>有些收益大致分布在平均值两边，上涨和下跌都不会离得太远。有些收益则是多数时候小亏，极少数时候赚很多。这种右侧拖着一条长尾巴的形状叫正偏度。<\/p>\n<p>星果纸券就是极端正偏度资产。一百张中九十九张支付零，一张支付一千篮。忽略折现和成本，每张纸券的平均收成是：<\/p>\n<div class=\"formula\" role=\"math\">1% × 1000 + 99% × 0 = 10<\/div>\n<p>若一篮果子值一枚银币，平均支付只有十枚，镇民却愿意支付十五枚。多出来的五枚并没有购买更多果子，它购买的是极小概率下的巨大上行。<\/p>\n<p>传统的期望效用模型通常假设，人们根据概率和结果平滑地权衡收益。现实中，人们经常对很小的概率赋予过高注意力。万分之一的暴富机会在计算上很小，在想象中却非常具体。它让人提前体验中奖后的生活，因此本身具有消费价值。<\/p>\n<p>这能解释一个看似奇怪的价格现象：拥有“翻几十倍”可能性的资产，未必因此提供更高的未来平均回报。若很多人都愿意为这项可能性加价，购买价格会被推高，后续期望回报反而被压低。<\/p>\n<p><strong>同样的现金流，切法不同，价格可能不同。<\/strong><\/p>\n<p>莫林出售整片果园时，买家得到的是分散在许多年里的稳定收成。维克没有创造新收成，只把同一年的一千篮集中到一张随机纸券上。他改变了支付分布的形状。<\/p>\n<p>这类切割在金融市场并不陌生。结构化产品可以把稳定现金流重新分层；期权可以把普通资产转换成下行有限、上行陡峭的收益；某些低价股票、困境公司和热门主题也会因为小概率的巨大上行受到追捧。<\/p>\n<p>这并不意味着所有高增长公司都是彩票，也不意味着正偏度资产一定不值得买。关键在价格。一个真实拥有巨大上行空间的项目，仍可能是一项好投资；当所有人都看见这份上行，并愿意为梦想支付很高溢价时，赔率才会发生变化。<\/p>\n<p><strong>放到个人投资里，可以检查三个问题。<\/strong><\/p>\n<p>第一，我买的是现金流，还是一个身份变化的故事？如果投资理由主要是“只要成功一次就自由了”，需要单独估计这项想象已经被价格收取了多少费用。<\/p>\n<p>第二，我是否只看见赢家？媒体和社交平台天然更愿意展示从十五枚变成一千篮的人。大量归零的纸券分散在无数账户里，不会拥有同等传播力。看见的收益分布因此比真实分布更漂亮。<\/p>\n<p>第三，我能否承受大多数时候没有结果？正偏度策略可能在逻辑正确的情况下经历很长失败期。若资金期限、心理承受或仓位不允许等待，极小概率的上行对你没有纸面上那么高的价值。<\/p>\n<p>研究中常用股票过去一个月的极端单日收益等指标，寻找投资者对彩票型股票的偏好。部分实证结果发现，具有极高最大单日收益特征的股票，之后平均回报反而偏低。它提供的是一种统计关系和解释线索，并非保证未来的交易法则。<\/p>\n<p>还要区分“概率很小”和“概率无法估计”。纸券至少把一百张、一个中奖号码写得很清楚；现实中的新技术、困境反转和政策主题没有这么透明。投资者往往既高估巨大成功的权重，又低估自己对真实概率的无知，两层误差可能同时进入价格。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>收益空间越令人兴奋，越要问自己支付的究竟是资产价值，还是想象价值。<\/p>\n<p>果园没有多结一篮果子。改变价格的，是一千篮果子被集中到了一个人的梦里。<\/p>", "reading_minutes": "8"}, {"number": "09", "title": "那张一定会兑付的契据", "concept": "久期与凸性", "story_html": "<p>钟塔城修建了一条穿过旱原的水渠。<\/p>\n<p>为了筹钱，城主发行两种二十年契据。金库、土地税和水渠收入共同担保，城里最谨慎的账房也相信它们一定能够兑付。<\/p>\n<p>第一种叫泉水契据。持有人每年可以领五枚银币，第二十年再领回一百枚本金。<\/p>\n<p>第二种叫钟声契据。前十九年一枚也不支付，第二十年钟楼敲响时，一次支付两百枚。<\/p>\n<p>发行那年，钱庄存一百枚银币，每年只给两枚利息。镇民愿意为更高的未来收入等待，两种契据都卖得很好。<\/p>\n<p>裁缝老顾用积蓄买了一张钟声契据。<\/p>\n<p>“二十年后拿两百枚，正好给女儿开一家店。”<\/p>\n<p>女儿却比他预想得更早找到合适铺面。契据发行五年后，老顾决定把它卖掉。<\/p>\n<p>他来到交易所，以为至少能收回原来的钱。柜台商人看了一眼，只愿意出六十多枚。<\/p>\n<p>老顾以为自己听错了。<\/p>\n<p>“城主没有少付一枚，水渠每年都赚钱，为什么我的契据跌了这么多？”<\/p>\n<p>商人指向街对面的新钱庄。<\/p>\n<p>贸易扩张后，城里对现金的需求大增。新钱庄的牌子上写着：今天存一百枚，每年支付六枚利息。<\/p>\n<p>“过去大家只有两枚利息可拿，愿意等你的两百枚。现在只要把钱存在对面，也能不断得到六枚。想让别人继续等到第二十年，你的契据必须更便宜。”<\/p>\n<p>老顾仍不服。<\/p>\n<p>他找到城里的契据师。契据师没有拿算盘，而是带他来到水塔，摆出两只相同容量的木桶。<\/p>\n<p>第一只桶底部有一条细管，每隔一会儿就流出一点水，最后再放出剩余部分。<\/p>\n<p>第二只桶完全封闭，要等很久以后才一次打开。<\/p>\n<p>契据师问：“两只桶最后流出的水一样重要吗？”<\/p>\n<p>“当然。”<\/p>\n<p>“可如果你今天口渴呢？”<\/p>\n<p>老顾看着第一只桶不断流出的水，明白了他的意思。<\/p>\n<p>契据师又让他把手伸到第二只桶旁边。桶里的水明明没有减少，老顾此刻却一滴也取不到。契据师说：“账本会把未来二十年的水加在一起，生活却总发生在某一个今天。你急着用水的那一天，支付时间就会从纸上的小字变成价格。”<\/p>\n<p>泉水契据和钟声契据都写着二十年，却没有把银币放在同样的时间。泉水契据会提前归还一部分价值，钟声契据几乎把全部价值锁在最远的那一天。<\/p>\n<p>利息从两枚升到六枚后，等待每一年都变得更昂贵。距离今天越远的银币，要经过越多次折算，今天的价格变化也越大。<\/p>\n<p>老顾问：“如果利息以后降回去呢？”<\/p>\n<p>契据师说：“那么远处的银币也会重新变得昂贵。而且利息下降带来的上涨，与同样幅度上升造成的下跌，并不完全对称。这张纸的价格不是一根直线。”<\/p>\n<p>老顾最后卖掉一部分契据，补足女儿店铺的首付款，剩余部分继续持有到期。<\/p>\n<p>二十年后，钟楼按约敲响，城主一枚不少地支付了两百枚。<\/p>\n<p>有人因此说老顾当年不该卖：“你看，它果然没有违约。”<\/p>\n<p>老顾摇头。<\/p>\n<p>“城主兑现的是第二十年的承诺。十五年前别人愿意出多少钱买我的等待，是另一件事。”<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：没有信用损失的债券，也可能因为市场利率变化产生很大的价格损失。<\/strong><\/p>\n<p>债券价格等于未来每一笔现金流折回今天后的总和。若市场要求的收益率为 <span class=\"math-inline\">y<\/span>，一张债券的价格可以写成：<\/p>\n<div class=\"formula\" role=\"math\">P = Σ(CF_t)/(1+y)^t<\/div>\n<p><span class=\"math-inline\">CF_t<\/span> 是第 <span class=\"math-inline\">t<\/span> 年收到的现金流。市场利率上升时，分母变大，未来现金流的现值下降；现金流距离今天越远，这个影响重复的次数越多。<\/p>\n<p>钟声契据几乎所有钱都在第二十年支付，因此对利率非常敏感。泉水契据虽然也在第二十年归还本金，却会在此前不断支付利息，一部分财富更早回到持有人手里，价格敏感度相对较低。<\/p>\n<p>这说明到期年限和久期不是同一个东西。到期年限只看最后一笔钱何时支付；Macaulay久期把每笔现金流的时间按其现值权重加总，表示投资者平均要等待多久才能收回价值。<\/p>\n<p>修正久期进一步近似衡量收益率小幅变化时，债券价格大约变化多少：<\/p>\n<div class=\"formula\" role=\"math\">ΔP/P ≈ -D_{mod} × Δy<\/div>\n<p>如果修正久期为8，市场收益率上升1个百分点，价格可近似下跌8%。这是局部估计，变化很大时不能只用一条直线。<\/p>\n<p><strong>凸性描述的就是这条曲线有多弯。<\/strong><\/p>\n<p>普通固定利率债券的价格—收益率关系通常向外弯曲。同样变动1个百分点，降息带来的上涨往往略大于加息带来的下跌。把凸性加入近似，可以修正久期遗漏的曲率：<\/p>\n<div class=\"formula\" role=\"math\">ΔP/P ≈ -D_{mod}Δy + 0.5 × Convexity × (Δy)^2<\/div>\n<p>凸性较高通常对持有人有利，但市场也会为这种特性定价。含赎回条款、按揭提前还款等选择权的产品，凸性还可能发生变化，不能直接套用普通债券结论。<\/p>\n<p><strong>为什么“持有到期就不会亏”不完整？<\/strong><\/p>\n<p>如果发行人不违约，投资者确实能按契约拿到约定现金流。但这句话省略了三个条件。<\/p>\n<p>第一，你必须真的能够持有到期。老顾提前需要钱，只能按当时市场价格出售。期限越长，未来遇到支出变化的可能性越高。<\/p>\n<p>第二，机会成本已经改变。旧契据按低利率锁定现金流时，新资金可以获得更高收益。即使不卖，经济价值的相对下降仍然存在。<\/p>\n<p>第三，债券基金通常没有属于单个投资者的固定到期日。基金会不断卖出旧券、买入新券，净值会持续反映利率变化。用“单只债券最终还本”解释债券基金短期波动，很容易混淆两种产品。<\/p>\n<p><strong>放到个人投资里，至少同时看四项。<\/strong><\/p>\n<ul><li>信用风险：发行人是否能付钱。<\/li><li>久期：利率变化时价格有多敏感。<\/li><li>凸性和嵌入选择权：大幅利率变化时，线性估计是否失真。<\/li><li>资金期限：自己何时可能需要卖出。<\/li><\/ul>\n<p>短久期资产并不永远优于长久期资产。利率下降时，长久期债券可能获得更大上涨；当投资者需要匹配很远的固定支出时，长久期现金流也可能更合适。关键是把“信用安全”“利率方向”和“自己的用钱时间”分开判断。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>债券承诺的是未来支付，不是今天的价格。<\/p>\n<p>一张纸越把价值放在遥远的未来，今天的利率就越能改变它的重量。<\/p>", "reading_minutes": "7"}, {"number": "10", "title": "跑得最快的马", "concept": "低波动异象与杠杆约束", "story_html": "<p>疾风城每年举办十二场长途赛马。<\/p>\n<p>居民可以买下赛马一年的奖金份额。马赢得的奖金越多，份额持有人年底分到的钱越多。<\/p>\n<p>城里有两类马。<\/p>\n<p>灰马速度不快，却很少受伤。它们通常能完成每场比赛，偶尔拿到第三或第四。一年份额大多能带回十到十五枚金币。<\/p>\n<p>烈焰马腿长、脾气急。状态好时，它能把所有马甩在身后；状态差时，也可能在第一个弯道就退出。它的份额有时带回一百枚，有时一枚也没有。<\/p>\n<p>疾风城还有两条旧法：居民不得借钱购买份额，每人最多只能持有一匹马。<\/p>\n<p>年轻商人诺亚有一百枚金币。他希望一年后变成一百五十枚。<\/p>\n<p>马场账房告诉他：“灰马更稳定，可它很难让一百枚在一年里增加五成。”<\/p>\n<p>诺亚只好去竞拍烈焰马。<\/p>\n<p>很多人和他想法相同。他们并非不知道烈焰马会摔倒，也不是误以为刺激等于安全。他们只是受到同一条限制：无法借钱放大灰马的稳定收益，又不允许同时持有多匹马。若想追求很高的目标，只剩下购买最激烈的份额。<\/p>\n<p>拍卖开始后，烈焰马价格一路上涨。<\/p>\n<p>一匹叫赤星的马，按过去成绩估算，一年份额平均可能支付一百一十五枚。竞拍者却把价格推到一百三十枚。<\/p>\n<p>灰马石桥的份额平均可能支付一百一十枚，因为没人觉得它能改变命运，只卖九十枚。<\/p>\n<p>诺亚的老师提醒他：“赤星也许能赢很多比赛，可你今天已经为那些胜利付了太高价格。”<\/p>\n<p>诺亚说：“石桥就算被低估，也达不到我的收益目标。”<\/p>\n<p>最终，他以一百三十枚买下赤星份额，其中三十枚来自出售家里的工具。<\/p>\n<p>那年赤星确实赢过两场，画像贴满酒馆。可它也缺席了四场比赛。年底算账，诺亚得到一百零五枚。<\/p>\n<p>灰马石桥没有登上任何海报，却稳定带回一百一十二枚。以九十枚买入的人，回报反而更高。<\/p>\n<p>第二年，一位外地马商来到疾风城。他不受当地借款限制。<\/p>\n<p>马商没有购买烈焰马，而是以九十枚买入石桥份额，再借入一部分金币购买更多灰马。他根据自己能够承受的损失调整借款，让整个组合的奖金波动接近一匹烈焰马。<\/p>\n<p>诺亚嘲笑他：“你绕了这么大一圈，才得到和赤星差不多的起伏。”<\/p>\n<p>马商回答：“我需要的是起伏带来的目标，不需要支付所有人追逐赤星时加上的价钱。”<\/p>\n<p>几年后，马场整理记录。<\/p>\n<p>烈焰马仍然包揽了最惊人的单场胜利，也制造了最多归零年份。更意外的是，购买它们的人平均并没有因为承担更多起伏得到更好的回报。被冷落的灰马虽然单年上限不高，买入价格却长期更便宜。<\/p>\n<p>城主看到记录后，问账房：“风险更大，为什么回报没有更高？”<\/p>\n<p>账房说：“风险不会自己支付奖金。只有大家不愿意承担、价格里又没有提前补偿的风险，才可能留下回报。”<\/p>\n<p>后来，疾风城允许合格居民在严格限制下借款，也取消了每人只能持有一匹马的规定。<\/p>\n<p>烈焰马的竞拍不再像过去那样拥挤，灰马的价格则有所上升。<\/p>\n<p>诺亚终于明白，过去最贵的并不是速度。<\/p>\n<p>是所有无法借到钱、又急着跑得更快的人，共同挤进了同一座马厩。<\/p>", "concept_html": "<p><strong>这个故事真正讲的是：高风险不保证高回报，因为投资者可能已经把高风险资产买得太贵。<\/strong><\/p>\n<p>金融学的基本直觉是，投资者承担更多无法分散的风险，应当要求更高预期回报。这个逻辑谈的是均衡中的风险补偿，并没有说任何一项波动更大的资产都会自动提供更高收益。<\/p>\n<p>价格是中间缺失的一步。赤星未来奖金可能比石桥高，但竞拍价格也高得更多。投资回报由未来得到什么和今天支付多少共同决定。<\/p>\n<p>大量历史研究发现，股票市场中高beta、高波动股票的风险调整后回报有时低于模型的简单预测，而低beta、低波动股票表现相对更好。这类现象通常被称为低波动异象或低beta异象。<\/p>\n<p>它不是每个时期都成立的铁律，也不能直接推出“买最稳的股票一定赚钱”。它值得研究，是因为它挑战了把风险排序直接当成回报排序的习惯。<\/p>\n<p><strong>杠杆约束提供了一种解释。<\/strong><\/p>\n<p>假设投资者希望组合获得较高预期收益。理论上，他可以购买回报较稳定的资产，再适度借款放大仓位。但许多个人和机构无法自由使用杠杆：个人融资成本高，基金受到章程限制，养老资金和保险资金有风险规则，管理人还要面对基准和排名。<\/p>\n<p>当借款受限时，想提高组合目标收益的人会转向高beta资产。越来越多人挤进同一类股票，推高其价格，压低未来回报。低beta资产需求不足，价格相对便宜，可能留下更高的风险调整后收益。<\/p>\n<p>在资产定价语言里，beta衡量一项资产对市场共同波动的敏感程度：<\/p>\n<div class=\"formula\" role=\"math\">β_i = Cov(R_i,R_m)/Var(R_m)<\/div>\n<p>beta高，表示市场上涨或下跌时，这项资产通常动得更剧烈。它描述共同风险暴露，不等同于公司好坏，也不等同于未来必然获得更高收益。<\/p>\n<p><strong>彩票式需求也会推一把。<\/strong><\/p>\n<p>烈焰马容易成为新闻，因为它有机会创造惊人单次收益。投资者若偏爱这种正偏度，会对高波动、高beta或近期暴涨的资产支付额外溢价。这与星果纸券的机制相连，但这里还多了一层融资约束：人们无法用便宜稳定资产加杠杆达到目标，只能购买本身波动很大的资产。<\/p>\n<p><strong>放到个人投资里，不能把它简化成“低波躺赢”。<\/strong><\/p>\n<p>低波动组合可能长期跑输强劲牛市，也可能集中在公用事业、消费、防御等特定行业，带来估值、利率和行业暴露。策略变得拥挤以后，低波资产本身也会被买贵。交易成本、税费和再平衡同样会影响结果。<\/p>\n<p>更有用的是改变提问方式。<\/p>\n<p>看到一项高波动资产时，不只问它可能涨多少，还问有多少投资者因为不能使用其他方式提高收益，被迫追逐同一种上行。<\/p>\n<p>看到一项低波动资产时，不只因为它稳定就买入，还要检查估值、行业集中度、盈利质量和利率敏感性。<\/p>\n<p>构建组合时，则把“选择什么资产”和“承担多少风险”拆开。风险预算可以通过仓位、现金和有限度的工具调整，不必完全依赖购买最刺激的标的。<\/p>\n<p>还要避免把名义上的低波动误当成真正的低风险。某些资产在平静时期价格变化很小，却隐藏信用、流动性或估值风险；另一些股票波动不大，只是因为交易稀少。低波动策略讨论的是可观测收益和组合构造，无法替代对企业现金流和资产质量的判断。<\/p>\n<p><strong>最核心的一句话<\/strong><\/p>\n<p>风险只是收益分布的形状，价格才决定你为这份形状付了多少钱。<\/p>\n<p>跑得最快的马可以赢下比赛，却不一定让份额持有人赢得投资。<\/p>\n<p># 第三批金融寓言样稿<\/p>", "reading_minutes": "8"}, {"number": "11", "title": "那家最好的公司为什么拒绝融资", "concept": "信息不对称与融资优序", "story_html": "<p>北辰精密制造公司的第七码头工厂，连续五年没有出现过重大事故。<\/p>\n<p>它生产的不是抢眼的商品，而是一种藏在大型机械内部的精密轴承。客户很少更换供应商，订单稳定，仓库里也没有积压。公司账上有六十枚金币，现有工厂每年能产生可靠的现金。<\/p>\n<p>外面的交易市场却不喜欢北辰。<\/p>\n<p>它没有宏大的故事，管理层也很少接受采访。市场给整家公司标出的价格只有六百枚金币。<\/p>\n<p>只有董事会知道，光是现有客户合同、机器和土地，保守计算也值一千枚。<\/p>\n<p>这一年，工程师发现了一种新的耐热材料。如果投资一百枚建设新产线，一年后大约可以带回一百五十枚。扣除投入，项目能为公司增加五十枚价值。<\/p>\n<p>问题是，公司手里只有六十枚，至少还缺四十枚；为了保留日常经营现金，财务主管建议直接向市场发行一百枚新份额。<\/p>\n<p>下面是北辰留下的第七次董事会会议纪要。<\/p>\n<p><strong>议题一：新产线是否值得建设。<\/strong><\/p>\n<p>工程主管：“即使把原料价格上涨算进去，项目仍然值得做。投入一百，预计能形成一百五十的价值。”<\/p>\n<p>全体董事一致同意。<\/p>\n<p><strong>议题二：是否按当前市场价格发行新份额。<\/strong><\/p>\n<p>财务主管在黑板上写下两列数字。<\/p>\n<p>市场认为旧公司值六百。新投资者拿出一百后，会要求获得合并后公司七分之一的份额。<\/p>\n<p>但董事会知道，旧公司真正值一千。新产线建成后，公司真实总价值不是七百五十，而是一千一百五十。<\/p>\n<p>七分之一的一千一百五十，约是一百六十四枚。<\/p>\n<p>“新投资者只付一百，却会拿走约一百六十四的真实价值。”财务主管说，“多出的六十四，不是项目创造的，是旧股东按错误价格让出去的。”<\/p>\n<p>董事长问：“项目不是还能增加五十吗？”<\/p>\n<p>“能。但五十的新增价值，填不满六十四的转让。”<\/p>\n<p>会议室安静了。<\/p>\n<p>如果不融资，旧股东继续拥有价值一千的公司；如果按当前价格融资并建设好项目，他们最后只剩七分之六的一千一百五十，约九百八十六。<\/p>\n<p>公司做了一个赚钱的项目，旧股东的财富反而少了十四枚。<\/p>\n<p><strong>表决结果：暂缓发行，暂缓新产线。<\/strong><\/p>\n<p>第二天，北辰发布公告：“鉴于融资条件暂不合适，公司决定推迟耐热材料项目。”<\/p>\n<p>市场非常失望。<\/p>\n<p>评论员说北辰缺乏进取心，年轻投资者说管理层看不见未来。价格从六百跌到五百六十。<\/p>\n<p>就在同一条河的下游，还有一家叫南焰机械的公司。<\/p>\n<p>南焰的厂房外表更漂亮，老板经常登上报纸。市场也给它标价六百枚。但南焰董事会知道，旧客户正在流失，机器需要大修，公司真实价值可能只有三百枚。<\/p>\n<p>南焰也收到了一份新项目计划：投入一百枚，一年后大约形成一百五十枚价值。<\/p>\n<p>它召开了第四次临时会议。<\/p>\n<p><strong>议题一：项目是否值得建设。<\/strong><\/p>\n<p>董事们同样认为值得。<\/p>\n<p><strong>议题二：是否按当前市场价格发行新份额。<\/strong><\/p>\n<p>财务顾问算了一遍。市场仍按六百给旧公司定价，新投资者出一百，也只能拿走七分之一。<\/p>\n<p>可南焰连新项目算在内，真实总价值只有四百五十。新投资者支付一百，实际得到的东西只值约六十四。<\/p>\n<p>差额没有消失。它留给了南焰的旧股东。<\/p>\n<p>董事长当即拍板：“不仅要发，还要尽快发。”<\/p>\n<p>南焰公告融资后，市场最初一片欢呼。报纸把它称为“面向未来的扩张”，而北辰则被写成“守着现金不敢行动的旧公司”。<\/p>\n<p>不过，交易市场里有位承销人把两份会议纪要放在一起看了很久。<\/p>\n<p>他没有见过两家公司的内部估值，却注意到一个令人不安的规律：真正认为自己被市场低估的人，似乎最不愿按市场价格出售新份额；最积极出售的人，反而可能知道市场给得太高。<\/p>\n<p>从那以后，只要公司宣布发行，他都会多问一句：<\/p>\n<p>“管理层为什么愿意在今天，把公司的一部分卖给我？”<\/p>\n<p>这句疑问迅速传开。<\/p>\n<p>后来，即使一家经营不错的公司宣布融资，价格也常常先下跌。管理层越解释项目有多好，投资者越想知道：如果未来真的如此光明，为什么旧股东愿意现在让别人加入？<\/p>\n<p>北辰最终用了两年积累内部现金，才建成耐热材料产线。项目确实成功，却比原计划晚了整整两年。<\/p>\n<p>董事长在项目投产日重新翻开第七次会议纪要，在最后补了一句话：<\/p>\n<p>“我们没有错过一项坏投资。我们错过的是一项好投资，因为市场不知道我们已经拥有什么。”<\/p>", "concept_html": "<p>这份会议纪要对应的是公司金融中的经典问题：当管理层比外部投资者更了解公司现有资产价值时，融资方式本身会传递信息，也会改变旧股东与新投资者之间的价值分配。<\/p>\n<p>Myers和Majluf在1984年的模型中讨论了一家拥有正净现值项目、却需要发行普通股筹资的企业。直觉上，只要项目本身赚钱，公司就应该融资并投资。但当股票被低估时，按市场价格发行新股会稀释旧股东，让新投资者以偏低价格分享公司原有资产。<\/p>\n<p>故事中的北辰可以用一组简化数字表示：<\/p>\n<ul><li>现有资产真实价值：1000<\/li><li>市场对现有资产的估值：600<\/li><li>项目投资成本：100<\/li><li>项目完成后的价值：150<\/li><li>项目净现值：50<\/li><\/ul>\n<p>如果公司按市场估值融资100，新投资者会根据市场口径占有：<\/p>\n<div class=\"formula\" role=\"math\">(100)/(600+100)=(1)/(7)<\/div>\n<p>项目完成后，公司真实总价值是：<\/p>\n<div class=\"formula\" role=\"math\">1000+150=1150<\/div>\n<p>新投资者所持七分之一的真实价值约为164.29。旧股东最终保留的价值约为：<\/p>\n<div class=\"formula\" role=\"math\">1150×(6)/(7)=985.71<\/div>\n<p>这低于不融资时旧股东拥有的1000。项目为公司创造了50，却伴随约64.29的价值转移，旧股东仍然净损失约14.29。因此，为旧股东利益决策的管理层可能放弃一项对整个公司有利的项目。<\/p>\n<p>南焰的情况相反。市场高估了旧资产，发行新股相当于让新投资者按过高价格加入，价值会从新投资者转向旧股东。于是，高估公司比低估公司更愿意发行。<\/p>\n<p>外部投资者明白管理层拥有私人信息，就会从融资行为反推公司价值。股权发行因此可能被理解为“管理层认为当前价格不低”的信号。即便某家公司真有好项目，它也会被放进这个选择机制里接受折价。<\/p>\n<p>这进一步产生了所谓的融资优序：企业通常更偏好先用内部资金；内部资金不足时，倾向使用信息敏感度相对较低的债务；最后才考虑发行股权。<\/p>\n<p>这个顺序背后不是简单的“债务比股权便宜”，而是不同证券对私人信息的敏感程度不同。普通股分享公司全部剩余价值，市场一旦怀疑管理层只在高估时发行，就会要求更大的折价。偿付金额相对固定的低风险债务，对公司价值究竟是1000还是1100没有那么敏感，因此逆向选择成本通常较低。等到负债已经很高、违约风险开始影响债务价值时，债务本身也会变得信息敏感，优序才可能被迫向后移动。<\/p>\n<p>这里还存在一个均衡层面的麻烦：外部投资者无法直接看见“好公司因低估而沉默”。他们能观察到的发行样本，更容易包含估值不低或融资需求迫切的公司。于是市场对发行行为打折，进一步抬高真正被低估公司的股权融资成本。这不是某一次公告里的心理误会，而是管理层选择与投资者推断互相作用后形成的价格机制。<\/p>\n<p>这不是一条永远成立的企业融资顺序。现实中还有税盾、破产风险、债务容量、控制权、监管要求、市场窗口、资产结构和公司生命周期。成长企业即使知道自己被低估，也可能因为机会稍纵即逝而选择融资；高杠杆企业也未必有继续借债的空间。<\/p>\n<p>放到股票分析中，这个模型改变了一个常见提问。<\/p>\n<p>看到融资公告时，不能只问“募投项目回报率高不高”，还要同时问：公司为什么选择这种融资工具？管理层在什么估值位置愿意出售股份？旧股东承担了多少稀释？如果不用股权融资，公司还有哪些可行选择？<\/p>\n<p>同样，企业账上长期保留大量现金不一定只是保守。内部现金也具有一种选择权价值：当市场低估公司、外部融资成本过高时，它能让企业不必在坏价格下出售自己。<\/p>\n<p>反过来，股权融资也不能被机械理解为利空。融资可能解除真实的资本约束，项目也可能创造远大于稀释成本的价值。模型提醒的是，项目价值与融资价格必须放在同一张表里计算。<\/p>\n<p>最核心的一句话是：<\/p>\n<p><strong>一家公司的投资机会再好，也可能因为市场错估了它已经拥有的东西，而无法用对旧股东有利的方式筹到钱。<\/strong><\/p>", "reading_minutes": "10"}, {"number": "12", "title": "城里所有反对票都没有价格", "concept": "卖空约束、意见分歧与高估", "story_html": "<p>以下内容来自长生花价格崩溃后的公开听证记录。<\/p>\n<p><strong>案件编号：四十七。<\/strong><\/p>\n<p><strong>审理事项：长生花在三个月内从九百枚银币上涨到一万一千枚，随后跌至二百七十枚。交易所是否曾向市场发布虚假的一致意见。<\/strong><\/p>\n<p>审判长把一摞成交记录放在桌上。<\/p>\n<p>“交易所宣称，全城对长生花形成了高度共识。依据是什么？”<\/p>\n<p>交易所代表回答：“在价格上涨的最后二十天里，主动买入一万八千四百次，主动卖出只有一千一百次。愿意以更高价格成交的人远多于愿意压低价格的人。”<\/p>\n<p>“所以你们认为，大多数人相信它值一万？”<\/p>\n<p>“成交记录如此。”<\/p>\n<p>第一位证人是植物学家林雾。<\/p>\n<p>审判长：“你何时开始怀疑长生花？”<\/p>\n<p>“价格还在一千二百的时候。我解剖过十二株。所谓永不凋谢，只是花瓣表面覆盖了一层蜡。根系寿命和普通花没有差别。”<\/p>\n<p>“你为什么没有卖出？”<\/p>\n<p>“我没有花票。”<\/p>\n<p>“可以买入后再卖。”<\/p>\n<p>“如果我认为它只值二百，为什么要先花一千二百买入？”<\/p>\n<p>“那就借来花票卖出。”<\/p>\n<p>林雾递上一叠申请书。<\/p>\n<p>“我申请了七次。所有持有人都不愿出借。他们说还会涨。后来有人愿意借，要求我每天支付票面价值的千分之八。价格继续上涨时，我还必须追加保证金。我可能在它跌到二百以前，就先失去全部财产。”<\/p>\n<p>审判长问交易所：“她的判断出现在你们的成交记录里吗？”<\/p>\n<p>交易所代表沉默了一会儿。<\/p>\n<p>“没有成交，就没有价格。”<\/p>\n<p>第二位证人是药剂师周迟。<\/p>\n<p>他在价格三千时完成药效试验，确认长生花不能治疗传闻中的失眠症。<\/p>\n<p>审判长：“你也没有卖出？”<\/p>\n<p>“我卖掉了自己原有的二十张花票。”<\/p>\n<p>“卖完以后呢？”<\/p>\n<p>“我仍然认为它太贵，但我已经没有东西可卖。之后价格从三千涨到一万，我的意见没有改变，却再也不能形成新的卖单。”<\/p>\n<p>“交易所把你统计成什么？”<\/p>\n<p>“二十次卖出。那些相信它会继续上涨的人，可以每天继续买。我只能反对一次。”<\/p>\n<p>第三位证人是商人顾遥。<\/p>\n<p>顾遥没有研究花的寿命，也不相信治病传闻。他只是看到价格不断上涨。<\/p>\n<p>审判长：“你为什么在八千枚时买入？”<\/p>\n<p>“因为我听说城里懂植物、懂药的人都没有大举卖出。我以为他们默认了这个价格。”<\/p>\n<p>林雾从证人席抬起头：“我没有默认。我只是无法交易。”<\/p>\n<p>顾遥脸色变了。<\/p>\n<p>第四位证人是长生花协会的会长。<\/p>\n<p>协会每周收集一百位研究者对长生花价值的估计。审判长要求他公开从未发布的原始表格。<\/p>\n<p>第一周，最高估值两千，最低估值三百。<\/p>\n<p>第四周，最高估值一万五千，最低估值仍是二百。<\/p>\n<p>第八周，最高估值三万，最低估值一百八十。<\/p>\n<p>价格上涨并没有消除分歧。相反，分歧越来越大。<\/p>\n<p>交易所代表解释：“我们只能使用真实成交。悲观判断如果不形成订单，交易所也无法把它写进价格。”<\/p>\n<p>审判长问：“那么价格是一百个人判断的平均值吗？”<\/p>\n<p>“不是。”<\/p>\n<p>“是一百个人投票后的多数意见吗？”<\/p>\n<p>“也不是。”<\/p>\n<p>“它是什么？”<\/p>\n<p>代表看着那张从二百到三万的估值表，说：“它是当时仍然愿意、也仍然有能力买入的人，和仍然有东西可卖的人之间形成的价格。”<\/p>\n<p>听证进行到第六天，市场突然传来消息：最大的花票保管库决定允许更多持有人出借花票，并降低借用费用。<\/p>\n<p>当天没有新的药效报告，也没有花朵死亡。<\/p>\n<p>价格却从一万一千跌到七千。<\/p>\n<p>第二天跌到四千。<\/p>\n<p>此前一直沉默的悲观者，终于获得了把判断写进订单的资格。交易所第一次看见，大量卖出并不来自突然出现的坏消息，而来自早已存在、却长期没有交易工具的意见。<\/p>\n<p>最后一次庭审上，审判长没有判定交易所伪造成交记录。每一笔交易都是真的。<\/p>\n<p>他只要求交易所撤下大厅里那句标语：<\/p>\n<p>“价格代表全城共同的判断。”<\/p>\n<p>新标语改成：<\/p>\n<p>“价格代表能够进入市场的判断。”<\/p>\n<p>顾遥在庭外看着它，终于明白自己当初误读了什么。<\/p>\n<p>他把没人卖，当成了没人反对；又把没人能继续卖，当成了所有人都同意。<\/p>", "concept_html": "<p>这个听证会讨论的是一个容易被忽略的价格形成问题：市场价格不是所有人估值的简单平均值。只有能把判断转化为订单的人，才会直接参与边际定价。<\/p>\n<p>当投资者意见接近时，这个区别可能不明显。可在新技术、题材资产或高度不确定的公司上，不同人的估值会相差很大。乐观者可以通过买入持续表达看法；悲观者如果没有持仓，只能借入资产后卖出，或者使用其他能从下跌中获利的工具。<\/p>\n<p>当借入困难、费用高、保证金压力大或工具不可得时，悲观者的表达能力受到限制。卖完现有持仓以后，他即使仍然认为价格过高，也可能从交易记录中消失。<\/p>\n<p>Edward Miller在1977年提出，当不确定性带来较大的意见分歧、卖空又受到限制时，资产更容易由最乐观的一部分投资者持有，价格因此可能偏向乐观估值。这里的关键不是“大家都乐观”，而是悲观意见没有获得同等的资本表达能力。<\/p>\n<p>可以把投资者对同一资产的估值写成一组不同数字：<\/p>\n<div class=\"formula\" role=\"math\">V_1,V_2,ldots,V_n<\/div>\n<p>如果所有人都能无成本地做多或做空，极端高估会吸引卖出力量。但当负面头寸受到约束时，市场清算价格可能更多由估值分布的上部决定，而不是由平均估值决定。<\/p>\n<p>这还能解释一个反直觉现象：意见分歧越大，价格未必因为“信息更多”而更可靠。分歧扩大意味着最乐观估值可以更高；只要悲观者难以交易，乐观者仍可能推高价格。<\/p>\n<p>Diether、Malloy和Scherbina在2002年的研究使用分析师盈利预测离散度作为意见分歧的代理，发现高分歧股票后来获得较低收益的现象与上述乐观定价解释一致，且在部分小型股票中更明显。<\/p>\n<p>这个机制也说明了为什么“分歧”与“风险”不能混为一谈。传统风险补偿故事可能推导出不确定性越高，投资者要求的预期收益越高；卖空约束故事却可能得到相反方向：不确定性扩大了估值分布，最乐观者把今天的价格推得更高，反而压低此后的平均收益。两种力量可以同时存在，最后观察到哪一种，取决于谁在边际上真正拥有定价能力。<\/p>\n<p>判断这个机制是否可能较强，至少要同时看两个条件。只有意见分歧而没有交易约束，悲观资金可以卖出纠偏；只有卖空约束而大家估值接近，也没有足够大的乐观溢价。较大的观点离散、有限的可借证券、昂贵的负面头寸以及集中在乐观持有人手中的筹码，组合在一起才更接近模型描述的环境。<\/p>\n<p>这是一项经验结果，不是一条可以机械应用的交易规则。预测分歧可能同时反映真实风险、信息不确定性、公司转型或分析师覆盖差异。后续收益也会受到样本区间、交易成本和市场制度影响。<\/p>\n<p>故事里还有一个重要区分：没有卖单可能有三种完全不同的原因。<\/p>\n<ul><li>悲观者不存在；<\/li><li>悲观者已经卖完持仓；<\/li><li>悲观者存在，但无法建立负面头寸。<\/li><\/ul>\n<p>只观察成交结果，无法自动区分这三者。<\/p>\n<p>放到A股交易语境中，看到单边上涨、换手活跃或公开观点高度一致时，可以进一步检查：持仓结构是否集中？负面观点有没有可执行的表达渠道？潜在卖方是改变了判断，还是已经退出？价格由广泛共识支撑，还是由边际上最乐观、最有购买力的一群人决定？<\/p>\n<p>这也解释了为什么某些资产会在没有突发基本面坏消息的情况下剧烈下跌。借券条件、风险预算、持有人结构或增量供给改变后，原本沉默的悲观判断可能突然进入价格。下跌不是意见刚刚产生，而是表达意见的约束刚刚松动。<\/p>\n<p>不过，卖空者也不天然正确。负面投资者同样会误判，卖空成本也反映真实风险。价格由乐观者主导不代表价格必然高估，更不代表分歧本身可以预测崩盘。<\/p>\n<p>这个概念真正提供的是一张“意见进入价格的管道图”。研究市场共识时，不能只数有多少买单、多少公开看多报告，还要理解哪些人能够交易、哪些人已经没有仓位、哪些意见被制度与资金约束挡在价格之外。<\/p>\n<p>最核心的一句话是：<\/p>\n<p><strong>沉默既可能表示同意，也可能表示没有表达反对的工具。价格记录了成交，却不会替那些无法成交的人留下反对票。<\/strong><\/p>", "reading_minutes": "10"}, {"number": "13", "title": "那位每天只买三袋盐的客人", "concept": "Kyle模型、策略性拆单与价格冲击", "story_html": "<p><strong>伊莱的记录，第一日。<\/strong><\/p>\n<p>我在港务局的废纸篓里看见了新水道的最终工程图。<\/p>\n<p>七天后，北岸水道会提前开放。内陆盐车不必再绕过黑石峡，运费将下降一半。城里的盐商还不知道这件事。今天一袋盐票卖二十枚铜币，消息公开后至少值三十。<\/p>\n<p>我手里有两千枚铜币。如果立刻买一百袋，理论上能赚一千。<\/p>\n<p>但我不能这样做。<\/p>\n<p><strong>赛恩的报价簿，第一日。<\/strong><\/p>\n<p>上午的交易很普通。渔民卖出十二袋盐票，旅店买入八袋，搬运队为月底工钱卖出五袋。<\/p>\n<p>临近收市时，一个戴灰帽的客人买了三袋，愿意支付二十点一。我把下一袋的报价从二十点一提高到二十点二。他没有继续买。<\/p>\n<p>可能只是某家餐馆补库存。<\/p>\n<p><strong>伊莱的记录，第二日。<\/strong><\/p>\n<p>我换了外套，在另一家柜台买两袋。午后又让助手卖出一袋。<\/p>\n<p>我需要让自己的交易看起来像港口每天都会出现的杂音：有人交房租，有人支付船员，有人突然想多存一点盐。<\/p>\n<p>如果赛恩看出有人持续买入，他会猜测我知道什么。每多买一袋，后面的袋子就会更贵。<\/p>\n<p><strong>赛恩的报价簿，第二日。<\/strong><\/p>\n<p>全天净买入只有四袋，不算异常。但两笔小买单都很有耐心。它们不追价，只在市场出现卖盘时接走。<\/p>\n<p>我把收市价维持在二十点二。<\/p>\n<p><strong>伊莱的记录，第三日。<\/strong><\/p>\n<p>今天港口举行渔船拍卖，成交最嘈杂。我把订单分给四名助手：一人买三袋，一人买两袋，一人什么也不做，最后一人先卖两袋再买五袋。<\/p>\n<p>总共增加八袋。<\/p>\n<p>赛恩把报价提高到了二十点五。<\/p>\n<p>我原以为自己隐藏得很好，可价格已经开始移动。也许他没有识破消息，只是感觉到买方比平时更执着。<\/p>\n<p><strong>赛恩的报价簿，第三日。<\/strong><\/p>\n<p>噪声很大，却有一件事不对。<\/p>\n<p>普通买家在价格上涨后通常会停手，或者换到其他货物。今天几笔买单却像水草下面的暗流，每次卖盘出现，它们都会回来。<\/p>\n<p>我不知道水道，也不知道谁在买。我只知道，如果继续按二十点二卖出，我可能反复把盐票交给一个比我更了解未来的人。<\/p>\n<p>新报价：二十点六。<\/p>\n<p><strong>伊莱的记录，第四日。<\/strong><\/p>\n<p>我只买了一袋。<\/p>\n<p>这很难受。七天后的价值就在眼前，等待却可能让别人先知道消息。但买得越快，我越是在亲手告诉赛恩：现在的价格不对。<\/p>\n<p>我的优势不是“知道三十”。我的难题是，怎样在价格到达三十以前，把知识换成足够多的持仓。<\/p>\n<p><strong>赛恩的报价簿，第四日。<\/strong><\/p>\n<p>净买入恢复正常，我却没有把报价降回去。<\/p>\n<p>昨天的订单可能只是巧合，也可能有人故意停下来观察我。看不见对手，不代表对手离开了。<\/p>\n<p>我把每袋愿意承接的数量减少。如果有人一次买十袋，前两袋按二十点六，后面的必须更贵。<\/p>\n<p><strong>伊莱的记录，第五日。<\/strong><\/p>\n<p>坏消息：一名测量员昨晚在酒馆说漏了嘴。还没有人知道确切日期，但市场开始传水道工程进展顺利。<\/p>\n<p>买单突然增多，其中大部分不是我的。<\/p>\n<p>这是机会，也是危险。我的订单终于可以藏在人群里，可赛恩也更有理由抬价。<\/p>\n<p>我买入十五袋，平均支付二十二点四。到收市时，报价已经是二十三。<\/p>\n<p><strong>赛恩的报价簿，第五日。<\/strong><\/p>\n<p>今天的订单无法再用餐馆补货解释。<\/p>\n<p>我观察到的不是某一笔巨额买入，而是连续五天的方向：买方在不同身份、不同时间和不同柜台出现，却总能吸收新卖盘。<\/p>\n<p>价格从二十涨到二十三，并非因为我看见了工程图。我只是在每次成交后重新估计，站在对面的人知道多少。<\/p>\n<p><strong>伊莱的记录，第六日。<\/strong><\/p>\n<p>我已经持有四十六袋，平均成本二十一点八。<\/p>\n<p>如果第一天能按二十买到一百袋，我会拥有更大利润。但那条路径从来不存在。第一笔大订单本身就会改变后续价格。<\/p>\n<p>我决定不再买。<\/p>\n<p>剩余的信息优势已经小于继续暴露自己的代价。<\/p>\n<p><strong>赛恩的报价簿，第六日。<\/strong><\/p>\n<p>那股持续的暗流消失了。<\/p>\n<p>这让我更确信它曾经存在。普通需求不会在传闻最热时突然停手，知道得更多的人却会在价格接近目标时退出。<\/p>\n<p>收市报价：二十五点七。<\/p>\n<p><strong>港务局公告，第七日。<\/strong><\/p>\n<p>北岸水道于今日正式开放。内陆运输成本将大幅下降。<\/p>\n<p>盐票开盘三十点二，随后稳定在二十九点八。<\/p>\n<p>伊莱卖出全部持仓，获得约三百六十八枚铜币利润。<\/p>\n<p>酒馆里的人称他提前得到消息，是这场交易唯一的赢家。<\/p>\n<p>伊莱没有反驳。<\/p>\n<p>他知道自己如果能在二十买到一百袋，本可以赚近一千；真实利润只有三百多。剩下的价值没有凭空消失。一部分被后来跟随传闻的人拿走，更大一部分在他逐步买入时，已经通过不断提高的报价进入市场。<\/p>\n<p>一周后，他在赛恩的柜台上看见一张新牌子：<\/p>\n<p>“报价不只回答货物值多少，也回答刚刚走进来的人可能知道什么。”<\/p>\n<p>伊莱第一次意识到，他们从未交换过一句话，却完成了一场持续六天的谈判。<\/p>\n<p>他用订单隐藏消息。<\/p>\n<p>赛恩用价格逼消息现形。<\/p>", "concept_html": "<p>这个双视角故事对应市场微观结构中的Kyle模型。模型关心的不是一条消息最终是否正确，而是私人信息怎样通过交易逐渐进入价格，以及知情交易者为什么不会一次完成全部订单。<\/p>\n<p>Kyle在1985年的经典模型中把市场参与者简化为三类：掌握资产最终价值的知情交易者、因其他需求随机买卖的噪声交易者，以及根据总订单流设定价格的竞争性报价者。<\/p>\n<p>报价者只能看见总订单流：<\/p>\n<div class=\"formula\" role=\"math\">Y=X+U<\/div>\n<p>其中，`X`是知情者的订单，`U`是噪声订单。报价者看不见一笔买单究竟来自私人信息，还是来自支付、调仓或临时流动性需求。<\/p>\n<p>价格会根据订单流更新，常见的线性表达是：<\/p>\n<div class=\"formula\" role=\"math\">P=P_0+lambda Y<\/div>\n<p>`λ`表示单位净订单流带来多大价格变化。`λ`越高，同样数量的买入推动价格越多，市场越浅；市场深度常被理解为与`λ`相反的口径。<\/p>\n<p>伊莱知道盐票最终大约值三十，却不能在二十一次买满。大额订单会提高报价者对“对手拥有私人信息”的判断，使价格在订单尚未完成时就向真实价值移动。<\/p>\n<p>因此，知情交易者面对两个相反目标：交易太慢，消息可能公开，优势消失；交易太快，订单会暴露信息，自己把买入成本推高。策略性拆单就是在两者之间寻找平衡。<\/p>\n<p>从报价者一侧看，`λ`并不是固定的摩擦系数。噪声交易越活跃，知情者越容易把订单藏在人群里，单笔订单的可疑程度可能下降，市场通常更深；私人信息优势越大、流动性提供者越担心遇到知情对手，同样订单流需要更大的价格调整，`λ`就会上升。于是成交量大不必然代表流动性好，还要看一笔给定规模的交易会把价格推走多远。<\/p>\n<p>这解释了为什么“知道最终方向”与“能按当前价格买到足够数量”是两件事。屏幕上的价格并不是交易者可以无限成交的固定标签。你的订单一旦足够大，就会改变你面对的价格。<\/p>\n<p>模型还给成交量赋予了更精确的含义。订单流可能含有信息，但不能把每一笔持续买入直接翻译成内幕或所谓主力。报价者只能做概率更新：连续同向订单让知情交易的可能性上升，却永远和噪声需求混在一起。<\/p>\n<p>故事采用了报价人，现实A股主要是订单驱动市场，并不存在一个像赛恩一样垄断报价的单一人物。但限价订单簿中的挂单、撤单和对手方共同承担了类似功能：流动性提供者会根据订单流、库存风险和不利选择调整愿意成交的数量与价格。<\/p>\n<p>放到个人交易中，Kyle模型至少带来四个认识。<\/p>\n<p>第一，所谓“资金流入”是成交结果，不是买方身份说明书。每笔成交同时有买方和卖方，真正有信息的是订单发起方向、持续性、价格响应和市场深度的组合。<\/p>\n<p>第二，大额执行成本不是简单的手续费。显性费用之外，还有买卖价差和市场冲击。策略在纸面上按收盘价计算可行，不代表真实资金规模能按同一价格完成。<\/p>\n<p>第三，拆单不等于操纵，也不自动代表知情交易。机构需要降低冲击，个人的大额订单也可能分批执行。只有结合事件、订单流与价格反应，才能讨论信息含量。<\/p>\n<p>第四，价格发现是一个过程。私人信息并非等公告发布时才突然进入价格；它可能在此前通过订单流一点点泄露。公告日的跳跃，只是尚未被交易吸收的剩余部分。<\/p>\n<p>对执行而言，这还区分了暂时冲击与永久冲击。库存失衡或短时缺少对手盘造成的价格偏离，流动性恢复后可能回撤；订单泄露了对资产价值的真实信息时，价格变化更可能保留下来。个人投资者看到放量拉升后，不能仅凭随后是否回落就断言资金真假，但可以把成交后的价格保持程度作为信息含量的一项证据。<\/p>\n<p>Kyle模型是高度抽象的理论工具。它假设参与者理性、报价规则简化，并忽略现实中的多资产、算法竞争、交易限制和动态信息。它的价值不在于帮助识别某个神秘账户，而在于提供一条清晰链条：<\/p>\n<div class=\"formula\" role=\"math\">私人信息rightarrow策略性订单rightarrow订单流推断rightarrow价格更新<\/div>\n<p>最核心的一句话是：<\/p>\n<p><strong>知情者无法把信息和交易分开。只要他试图从信息中赚钱，他的订单就会成为价格学习这条信息的线索。<\/strong><\/p>", "reading_minutes": "11"}, {"number": "14", "title": "一百个分身都赚钱，为什么本人破产了", "concept": "非遍历性、时间平均增长与波动损耗", "story_html": "<p>以下材料摘自白塔交易实验室第十四号实验记录。<\/p>\n<p><strong>实验对象：陈默。<\/strong><\/p>\n<p><strong>初始资金：100枚金币。<\/strong><\/p>\n<p><strong>单轮规则：抛一枚均匀硬币。正面，账户增加60%；反面，账户减少50%。<\/strong><\/p>\n<p>实验主持人把规则写完，问陈默：“愿意参加吗？”<\/p>\n<p>陈默心算了一遍。<\/p>\n<p>一半概率赚六十，一半概率亏五十，平均下来每轮赚五。<\/p>\n<p>“当然。”<\/p>\n<p>主持人打开第一扇门。<\/p>\n<p>门后是一面由一百块镜子组成的墙。每面镜子里都有一个陈默，每个人拿着同样的100枚金币，只进行一轮交易。<\/p>\n<p>硬币落下后，四十九个陈默得到正面，账户变成160；五十一个得到反面，账户变成50。<\/p>\n<p>实验员把所有账户加起来再除以一百，平均是103.9。<\/p>\n<p>“样本再大一点，会更接近105。”主持人说。<\/p>\n<p>陈默看着大部分镜子里的自己。输的人仍有50，赢的人有160，没有谁破产。这个交易看起来确实不错。<\/p>\n<p><strong>实验记录A：横向测试完成。结论：平均财富上升。<\/strong><\/p>\n<p>第二扇门后没有镜子，只有一张桌子和一枚硬币。<\/p>\n<p>主持人说：“这次不复制你。你用同一个账户连续做二十轮。”<\/p>\n<p>陈默问：“规则一样？”<\/p>\n<p>“完全一样。”<\/p>\n<p>“那二十轮以后，平均每轮赚5%，100应该变成大约265。”<\/p>\n<p>主持人没有回答，只按下计时器。<\/p>\n<p>第一轮，正面。100变成160。<\/p>\n<p>第二轮，反面。160变成80。<\/p>\n<p>陈默愣了一下。一次赚60%，再亏50%，胜负各一次，账户却少了20%。<\/p>\n<p>第三轮又是正面，80变成128。<\/p>\n<p>第四轮反面，128变成64。<\/p>\n<p>他开始希望连续出现更多正面。可硬币不记得前面的结果，账户却记得。亏损发生以后，下一次60%的增长只能作用在更小的本金上。<\/p>\n<p>第十轮结束，陈默赢了六次、输了四次，账户还有约52.43。明明赢的次数更多，财富却接近减半。<\/p>\n<p>他想退出。<\/p>\n<p>主持人指向协议：“实验要求完成二十轮。”<\/p>\n<p>接下来的十轮，他赢四次、输六次。<\/p>\n<p>最终记录是十次正面、十次反面。<\/p>\n<p>实验员输入结果：<\/p>\n<p>100乘以十次1.6，再乘以十次0.5。<\/p>\n<p>屏幕显示：10.7374。<\/p>\n<p>陈默盯着最后的数字。<\/p>\n<p>“第一间房告诉我这项交易平均赚钱。你还说二十轮后的平均财富是265。为什么我只剩十枚？”<\/p>\n<p>主持人调出第二组资料。<\/p>\n<p>实验室此前已经让一百万个模拟账户分别完成二十轮。把它们最后的财富全部相加再平均，确实接近265。3298。<\/p>\n<p>但分布图完全不对称。<\/p>\n<p>绝大多数账户远低于这个平均数。少数连续出现大量正面的账户变得极其富有，甚至超过百万。它们像几根很高的尖塔，把整片低矮的账户平均值向上拉。<\/p>\n<p>陈默指着那些尖塔：“所以265不是一个典型的人会得到的结果？”<\/p>\n<p>“它是把所有可能世界放在一起后算出的平均结果。”<\/p>\n<p>“可我不能生活在所有世界里。”<\/p>\n<p>“是的。你只能沿着其中一条路往前走。”<\/p>\n<p><strong>实验记录B：纵向测试完成。对象财富由100降至10.7374。<\/strong><\/p>\n<p>第三扇门后，主持人允许陈默重新设计规则。<\/p>\n<p>他不能改变硬币，也不能改变赢60%、输50%的赔率，只能决定每轮投入账户的多少比例。<\/p>\n<p>第一次，他仍想投入全部资金。<\/p>\n<p>手伸到确认键前，他想起第二轮结束时只剩80，想起那一百万个账户里少数高塔和大片低地。<\/p>\n<p>最后，他只投入账户的一部分，其余留在桌外。<\/p>\n<p>这样做降低了某一次正面带来的暴涨，也避免一次反面直接砍掉总财富的一半。最吸引人的结果变小了，账户能够承受的连续坏结果却变多了。<\/p>\n<p>实验结束时，主持人问他学到了什么。<\/p>\n<p>陈默没有说“这枚硬币不公平”。它在每一次抛掷中都严格公平。<\/p>\n<p>他在报告上写道：<\/p>\n<p>“我以前计算的是，把无数个我并排放在同一时刻，他们平均拥有什么。真正决定我能否活到最后的，是唯一一个我沿着时间走下去，财富以什么速度增长。”<\/p>", "concept_html": "<p>这个实验区分了两个经常被混在一起的问题：大量平行账户在某一时点的平均结果，与同一个账户沿时间重复经历风险后的典型增长结果。<\/p>\n<p>每轮财富乘数`R`有两种可能：<\/p>\n<div class=\"formula\" role=\"math\">R=1.6quad或quad R=0.5<\/div>\n<p>概率各为一半。单轮乘数的算术期望是：<\/p>\n<div class=\"formula\" role=\"math\">E[R]=0.5×1.6+0.5×0.5=1.05<\/div>\n<p>因此，若存在大量独立账户各做一次，平均财富会从100趋近105。若机械地把期望乘数连续相乘，二十轮后的期望财富为：<\/p>\n<div class=\"formula\" role=\"math\">E[W_{20}]=100×1.05^{20}approx265.3298<\/div>\n<p>这个数学期望没有算错。但单个账户的财富是乘法过程。更能描述长期典型增长的是对数增长率：<\/p>\n<div class=\"formula\" role=\"math\">E[ln R]=0.5ln1.6+0.5ln0.5 =0.5ln0.8approx-0.1116<\/div>\n<p>把它重新指数化，得到每轮的典型几何增长因子：<\/p>\n<div class=\"formula\" role=\"math\">exp(E[ln R])=sqrt{1.6×0.5}=sqrt{0.8}approx0.8944<\/div>\n<p>也就是说，算术期望显示每轮平均增长5%，典型的长期路径却以约10.56%的几何速度收缩。<\/p>\n<p>十胜十负的二十轮路径最终为：<\/p>\n<div class=\"formula\" role=\"math\">100×1.6^{10}×0.5^{10} =100×0.8^{10}approx10.7374<\/div>\n<p>期望值被少数极端富有路径显著抬高。现实中的投资者没有一百万个可以平均合并的平行账户，只有一条不能重来的财富路径。这就是非遍历性问题在增长过程中的直观表现：横截面平均与时间上的长期结果不一定相同。<\/p>\n<p>波动损耗也可以用更熟悉的形式理解。先涨60%再跌50%，财富乘数是：<\/p>\n<div class=\"formula\" role=\"math\">1.6×0.5=0.8<\/div>\n<p>胜负各一次，净结果仍是亏20%。百分比收益作用于不断变化的本金，正负波动并不对称抵消。<\/p>\n<p>这并不意味着数学期望没有意义，也不能简单宣布传统期望效用理论失效。不同决策目标对应不同评价方法。机构可能关心总资产期望、负债匹配或尾部损失；个人可能关心破产概率、最低生活水平和长期复合增长。关键是先说明自己优化的究竟是什么。<\/p>\n<p>Kelly准则与这里密切相关。它选择使期望对数财富增长率最大的下注比例，而不是使单次期望财富最大。全仓参与故事中的赌局会产生负的对数增长；降低投入比例可以改变增长率与回撤之间的关系。<\/p>\n<p>不过，现实交易不能机械套用精确Kelly比例。真实胜率和收益分布未知，估计误差会让理论最优仓位严重偏大；收益之间可能相关，极端事件也可能超出历史样本。实际使用中还要考虑交易成本、流动性、杠杆约束和个人承受能力。<\/p>\n<p>放到A股或其他股票交易中，一项策略“历史平均每笔盈利”仍然不够。还要检查：收益是否由少数极端交易贡献？连续亏损时仓位如何变化？最大回撤后需要多大涨幅才能恢复？策略是否会在优势兑现前触及追加保证金、资金赎回或个人心理边界？<\/p>\n<p>例如，亏损50%以后，需要上涨100%才能回到原点。若使用杠杆，财富乘数的波动被放大，算术平均可能仍然诱人，对数增长却可能迅速转负。仓位管理因此不是在已有策略外面附加一句“注意风险”，而是策略长期收益机制的一部分。<\/p>\n<p>这个概念真正推翻的是一种未经检查的直觉：只要每次交易的期望为正，重复足够多次就自然会富有。对于会复利、会触及零点、而且只有一条时间路径的财富过程，这个结论并不成立。<\/p>\n<p>最核心的一句话是：<\/p>\n<p><strong>你不能靠所有平行世界里的平均财富生活。交易真正需要保护的，是自己唯一这条路径继续复利的能力。<\/strong><\/p>", "reading_minutes": "10"}, {"number": "15", "title": "仓库里不存在的丰收", "concept": "应计项目、利润持续性与应计异象", "story_html": "<p>瑞穗果品商行连续第三年宣布创下利润纪录时，银行却拒绝了它的短期贷款。<\/p>\n<p>理由只有一句：<\/p>\n<p>“你们的利润在增加，现金为什么越来越少？”<\/p>\n<p>董事会请来审计员许清。她到公司的第一天，没有进入会议室，而是直接去了仓库。<\/p>\n<p>仓库主管递给她一张清单：库存价值四百二十枚金币，比去年增加一倍。<\/p>\n<p>许清随机抽取了三十箱。<\/p>\n<p>前十箱是当季新果；中间十箱已经存放八个月；最后十箱外面贴着“精选新品”，撕开标签后，木箱底部还能看见去年的旧编号。<\/p>\n<p>仓库主管解释：“旧果经过重新分级和包装，预计可以按新品出售，所以没有降价处理。”<\/p>\n<p>许清在第一份审计底稿上写道：<\/p>\n<p><strong>问题一：货物仍在仓库，价值却依赖未来能否按计划售出。<\/strong><\/p>\n<p>第二天，她检查销售合同。<\/p>\n<p>商行当年记录收入八百枚，其中三百枚来自一家刚成立的远方经销商。货已经运出，合同也盖了章，但对方只支付了二十枚定金，其余款项要等一年后结算。<\/p>\n<p>销售主管说：“会计规则允许在交易成立、货物交付后确认收入。收款只是时间问题。”<\/p>\n<p>许清没有否认。她只是问：“经销商拿什么在一年后付款？”<\/p>\n<p>没人答得清楚。<\/p>\n<p>第二份审计底稿写道：<\/p>\n<p><strong>问题二：利润已经进入今年，现金是否进入公司仍取决于客户未来。<\/strong><\/p>\n<p>第三天，她来到新品牌部。<\/p>\n<p>瑞穗花了九十枚金币设计包装、铺设渠道并开发一套储鲜流程。过去，这类费用会在发生时减少当年利润。今年，公司把其中六十枚登记为一项“长期品牌与工艺资产”，准备在未来五年逐步摊销。<\/p>\n<p>品牌主管说：“这些投入不只服务今年，它们会带来多年收益。”<\/p>\n<p>这个理由并非荒唐。如果支出确实形成长期经济利益，把全部成本压在第一年也可能扭曲经营表现。<\/p>\n<p>许清继续追问：“哪些支出形成了可辨认的长期资产？未来收益如何验证？如果项目失败，什么时候确认损失？”<\/p>\n<p>会议室再次安静。<\/p>\n<p>第三份审计底稿写道：<\/p>\n<p><strong>问题三：今天没有进入费用的成本，被送往未来；未来是否会接纳它们，尚未得到证据。<\/strong><\/p>\n<p>第四天，许清把利润表与现金记录并排放在桌上。<\/p>\n<p>利润表显示赚了一百八十枚。<\/p>\n<p>经营活动实际流出的现金却比流入多四十枚。利润与现金之间的差额，主要变成了应收款、库存和被推迟确认的费用。<\/p>\n<p>董事长有些恼火：“你是在说我们的利润是假的吗？”<\/p>\n<p>“不是。”许清说，“赊销也可以是真销售，库存也可以在未来卖出，长期投入也可能创造价值。问题是，你们今年的利润中，有多少已经由现金完成，有多少仍然是一组关于未来的判断。”<\/p>\n<p>她要求查看三年前的同类项目。<\/p>\n<p>第一年的应收款，大部分在第二年收回。<\/p>\n<p>第二年的应收款，只有七成收回。<\/p>\n<p>第三年的新经销商规模最大、付款能力却最弱。<\/p>\n<p>库存也呈现相同趋势。过去的水果平均三个月售出，如今平均存放接近九个月。被资本化的项目支出越来越多，后来真正产生持续收益的比例却越来越低。<\/p>\n<p>问题不在某一笔账，而在同一种判断不断向有利方向移动。<\/p>\n<p>第五天，许清找到一封内部邮件。<\/p>\n<p>三年前，财务主管曾提醒董事长：如果把渠道费用全部计入当期，利润会低于市场预期。<\/p>\n<p>董事长回复：“只是把属于未来的费用放回未来，不算改变事实。”<\/p>\n<p>第二年，为了维持增长，公司给经销商更长账期。<\/p>\n<p>第三年，为了避免库存减值，又重新包装旧果，并提高预计售价。<\/p>\n<p>每一次调整都有局部理由。可前一年的判断没有兑现时，公司需要用更乐观的新判断遮住旧判断留下的缺口。<\/p>\n<p>许清没有在报告里使用“造假”二字。她把所有凭证按年份排成一条线，让董事会自己看。<\/p>\n<p>当年冬天，远方经销商无法支付余款。瑞穗确认了大额坏账。<\/p>\n<p>仓库里的旧果也因腐损被迫降价处理。储鲜项目没有达到预期，公司一次性注销了部分资产。<\/p>\n<p>三件事同时发生，利润从一百八十变成亏损二百四十。<\/p>\n<p>市场惊讶地说，瑞穗在一个季度里突然恶化。<\/p>\n<p>许清却在最后一份审计底稿里写道：<\/p>\n<p>“损失不是这个季度才出现。这个季度只是未来终于拒绝替过去签字。”<\/p>\n<p>她离开仓库时，工人正在拆除“精选新品”的标签。箱子里没有凭空消失的丰收，也没有一夜之间腐烂的奇迹。<\/p>\n<p>只有一些原本需要等待验证的判断，被提前写成了已经实现的结果。<\/p>", "concept_html": "<p>这场审计讨论的是会计利润的构成，而不是把“利润”和“现金”粗暴地分成真假。<\/p>\n<p>现代企业采用应计会计，是因为经营活动与现金收付经常不在同一时期发生。赊销已经完成交付，但现金以后才收到；设备今天支付，价值却服务多年；原料先进入库存，等商品售出后才成为成本。应计项目承担了跨期匹配收入与费用的重要功能。<\/p>\n<p>在一种常用的简化关系中：<\/p>\n<div class=\"formula\" role=\"math\">会计利润approx经营现金流+应计项目<\/div>\n<p>也可以从利润与经营现金流的差额观察总应计：<\/p>\n<div class=\"formula\" role=\"math\">Accrualsapprox Net Income-Cash Flow from Operations<\/div>\n<p>具体研究和报表分析会使用更精细的资产负债表或现金流量表定义，并处理折旧、并购、汇率和非经常项目。这个式子只是帮助理解：利润中有一部分已经体现为现金，有一部分依赖收入确认、费用配比、资产估计和未来收付。<\/p>\n<p>Sloan在1996年的经典研究把当期盈利拆成现金流和应计部分，发现两部分对未来盈利的持续性不同。原始样本中，现金流部分的持续性高于应计部分，而股票价格并没有立即充分反映这种差异，直到它在后续盈利中逐渐显现。<\/p>\n<p>这就是应计异象的核心来源之一：投资者可能过度盯住利润总数，没有充分区分利润由什么构成、不同构成能够持续多久。<\/p>\n<p>故事里的三类项目分别对应常见的判断空间。<\/p>\n<ul><li>应收账款：收入已经确认，但现金回收取决于客户信用和账期。<\/li><li>库存：成本尚未进入损益，未来售价、周转速度和减值决定账面价值能否实现。<\/li><li>资本化支出：成本被分配到未来期间，前提是它确实形成可持续的未来经济利益。<\/li><\/ul>\n<p>这些项目本身都不等于操纵。高速成长的公司可能自然增加应收款和库存；研发、设备或渠道投入也可能合理地服务多年。真正需要分析的是变化是否与业务相符、估计是否持续偏向乐观、过去形成的项目后来如何兑现。<\/p>\n<p>应计项目的关键风险来自可逆性。今天确认的赊销收入，未来可能被现金回收验证，也可能变成坏账；今天留在资产负债表里的库存，未来可能按计划售出，也可能通过减值回到损益表。高应计并不是损失已经发生，而是利润中有更大比例仍押在管理层估计和未来经营结果上。现金部分通常少一道这样的反转环节，因此在统计意义上往往更持久。<\/p>\n<p>分析时还要区分经营性应计与投资性应计，并考虑行业的正常周转周期。工程、医药研发、平台预付款和零售备货的报表节奏完全不同。更有效的比较不是把所有公司放在一个绝对阈值下，而是看同一家公司跨期变化、与商业模式相近的同行差异，以及过去应计项目最终转成了现金、减值还是长期挂账。<\/p>\n<p>利润持续性比“利润是真是假”更精确。一项利润可以完全符合会计准则，却因为来自一次性处置、短期价格变化或大额应计而难以重复；另一项尚未收到现金的收入，也可能因为客户质量高而最终稳定兑现。<\/p>\n<p>放到A股公司研究中，看到利润高速增长时，可以顺着四条线核对。<\/p>\n<p>第一，经营现金流与利润长期是否同向。单个季度错位很常见，持续多年背离才需要进一步解释。<\/p>\n<p>第二，应收账款、合同资产和收入增长是否匹配。账期变长可能支持扩张，也可能把销售压力转移到未来收款。<\/p>\n<p>第三，库存增长来自备货、价格上涨还是周转放慢。不同产业库存逻辑差异很大，不能使用统一阈值。<\/p>\n<p>第四，费用资本化、资产减值和非现金收益是否改变了利润确认时间。重点不是看到资本化就否定，而是检查确认条件、后续摊销与项目实际产出。<\/p>\n<p>应计异象同样不是一条稳定不变的选股公式。公开研究被更多投资者采用后，异常收益可能减弱；高应计组合也可能集中于特定行业或成长阶段，交易成本和风险暴露会改变结果。对单家公司而言，报表附注、业务模式与管理层估计比一个总应计指标更重要。<\/p>\n<p>这个概念真正有用的地方，是把利润从一个数字拆成一组时间承诺。现金流告诉你哪些经营结果已经完成了资金交换，应计项目告诉你哪些结果仍需要未来来验证。<\/p>\n<p>最核心的一句话是：<\/p>\n<p><strong>利润不是现金的替代品，也不是谎言的同义词。它是一份跨越时间的会计判断，而判断的质量，要等未来兑现。<\/strong><\/p>", "reading_minutes": "10"}]</script>
  <script id="readerData" type="application/json">{"01": {"field": "资产定价", "question": "同样的一百枚银币，为什么会有两种价格？", "bridge": "阿洛后来才明白，雾港给两张契据标出的差价，藏在同一百枚银币在顺境与困境里的不同分量里。放回金融里，这个分量有一个名字。", "quiz": {"title": "你能算出这两份契约的相对价格吗？", "question": "某个市场明年有两种状态：繁荣概率80%，衰退概率20%。繁荣时的随机贴现因子为1，衰退时为6。两份契约各自在对应状态支付100元，在另一状态支付0。哪份契约今天更贵？", "options": [{"id": "A", "label": "繁荣契约更贵，价格约为衰退契约的4倍"}, {"id": "B", "label": "衰退契约更贵，价格约为繁荣契约的1.5倍"}, {"id": "C", "label": "两份契约一样贵，因为支付金额相同"}], "answer": "B", "explanation": "按P=E[mX]计算：繁荣契约的定价权重是80%×1=0.8；衰退契约是20%×6=1.2。支付金额相同，所以衰退契约价格是繁荣契约的1.5倍。"}}, "02": {"field": "拍卖与信息", "question": "赢得越漂亮，为什么越可能买贵？", "bridge": "拍卖槌落下时，最高价看似证明了眼光；可当每个人都只看见一部分真相，赢到最后的人也最可能高估了矿石。金融里，这种胜利也有自己的陷阱。", "quiz": {"title": "赢下拍卖后，哪一步最容易被漏掉？", "question": "十位专业买家分别得到一个带噪声的矿藏估值。你的估值最高，并刚好赢下拍卖。此时最合理的处理是什么？", "options": [{"id": "A", "label": "坚持原估值，因为赢说明自己的样本最准确"}, {"id": "B", "label": "下调估值，因为成交也说明自己可能是全场误差最乐观的人"}, {"id": "C", "label": "上调估值，因为其他人退出提高了矿藏稀缺性"}], "answer": "B", "explanation": "共同价值拍卖中，赢本身提供了条件信息：你的信号是所有信号中最高的。最高信号更可能混入较大的正向误差，因此应按“我恰好赢了”重新估值。"}}, "03": {"field": "市场微观结构", "question": "同一件东西，为什么同时有两个价格？", "bridge": "集市没有一张统一的价签。想立刻买的人要付得更多，想立刻卖的人只能收得更少，中间那段空隙并不是错误，而是交易发生的代价。", "quiz": {"title": "为什么卖价需要高于中间价？", "question": "做市商认为资产真实价值可能是80或120，概率各半。知情交易者只会在价值120时买入，无信息交易者则随机买卖。做市商看到一笔买单后，应该怎样报价？", "options": [{"id": "A", "label": "仍按100卖出，因为事前平均价值没有改变"}, {"id": "B", "label": "把卖价提高到100以上，因为买单提高了高价值状态的可能性"}, {"id": "C", "label": "把卖价降到100以下，以奖励提供信息的买家"}], "answer": "B", "explanation": "买单不只是交易需求，也可能携带私人信息。看到买单后，高价值状态的后验概率上升；若仍按100卖出，做市商会系统性地在资产更值钱时卖给知情者。"}}, "04": {"field": "银行与流动性", "question": "资产明明足够，为什么还是会倒下？", "bridge": "粮仓里并不缺粮，缺的是此刻能从门口交出去的粮。可一旦所有人都相信别人会先来，原本能撑过冬天的仓库也会在今天倒下。", "quiz": {"title": "哪项措施最能打断抢跑？", "question": "一家基金允许每日按账面价值赎回，底层却是需要一年才能出售的贷款。传言出现后，投资者担心别人先赎回。哪项措施最可能直接削弱抢跑动机？", "options": [{"id": "A", "label": "宣布贷款一年后大概率能获得更高收益"}, {"id": "B", "label": "提供可信的短期流动性后盾，并让先后赎回不再决定能否拿到钱"}, {"id": "C", "label": "提高最先赎回者的兑付比例"}], "answer": "B", "explanation": "挤兑由“别人先走会让我受损”的预期驱动。可信流动性和不鼓励先到先得的规则能改变这项预期；更高的长期收益无法解决今天的现金缺口。"}}, "05": {"field": "公司金融", "question": "谁决定风险，最后又是谁承担损失？", "bridge": "远星号面对的不是一条航线，而是三张不同的损益表。决定冒险的人保留上行，承担沉船的人接住下行，风暴因此变成了一笔看似划算的赌注。", "quiz": {"title": "哪条航线对股东更有吸引力？", "question": "公司欠债100。安全项目确定产生120；风险项目有50%概率产生200、50%概率归零。忽略其他费用，股东更偏好哪项？", "options": [{"id": "A", "label": "安全项目，因为公司总价值120高于风险项目的期望价值100"}, {"id": "B", "label": "风险项目，因为股东期望所得50，高于安全项目的20"}, {"id": "C", "label": "两项一样，因为债务金额没有变化"}], "answer": "B", "explanation": "安全项目中股东得到120−100=20。风险项目成功时股东得到100，失败时有限责任使所得为0，期望为50。公司总价值下降，股东却可能因下行转给债权人而受益。"}}, "06": {"field": "信息与羊群", "question": "九个人做出同一选择，真的代表九份证据吗？", "bridge": "雾岭前排着九辆车，看起来像九次确认。可沿着车辙向前追，真正来自山里的判断只有最前面的两份。市场里，这种被行动反复复制的信号也有一个名字。", "quiz": {"title": "八次买入究竟包含几份新信息？", "question": "前两位投资者各自研究后买入。此后六位投资者都看不见原始研究，只因为前面的人买入而跟随。你观察到八次买入，最稳妥的判断是什么？", "options": [{"id": "A", "label": "八次买入就是八份相互独立的利好证据"}, {"id": "B", "label": "最多确认前两次可能包含独立信息，后六次主要复制公开行动"}, {"id": "C", "label": "只要人数足够多，原始信息是否正确已经不重要"}], "answer": "B", "explanation": "行动会压缩并重复信息。后六个人没有新增私人信号，他们的买入提高了表面共识，却没有按人数同比增加独立证据。"}}, "07": {"field": "杠杆与流动性", "question": "货物没有坏，为什么价格仍会越卖越低？", "bridge": "香料仍然完好，春天的订单也没有消失。价格从一百跌到六十，推动它的却是抵押、保证金和一群已经失去等待资格的人。", "quiz": {"title": "一次小跌会产生多大的保证金缺口？", "question": "投资者用20元本金和80元借款持有价值100元的资产。资产跌到90元，贷款人要求自有资金始终占资产价值20%。若借款余额暂时不变，需要补多少现金？", "options": [{"id": "A", "label": "2元"}, {"id": "B", "label": "8元"}, {"id": "C", "label": "10元"}], "answer": "B", "explanation": "跌到90后，账户权益只剩90−80=10元；20%的目标权益是18元，因此需要补8元。无法补足时只能卖出，卖出又可能继续压低价格。"}}, "08": {"field": "行为资产定价", "question": "同一片果园，切成纸券后为什么能卖得更贵？", "bridge": "果园没有多结一篮果子，维克只改变了谁能拿到它们。稳定收成被切成一张暴富和九十九张归零后，镇民愿意支付的总价也变了。", "quiz": {"title": "这五枚银币买到的是什么？", "question": "一百张纸券中一张支付1000元，其余归零。每张平均支付10元，市场价格却是15元。忽略费用，最贴切的解释是什么？", "options": [{"id": "A", "label": "多出的5元代表投资者为小概率巨大上行支付的溢价"}, {"id": "B", "label": "纸券一定被低估，因为最高收益是1000元"}, {"id": "C", "label": "只要中奖概率固定，价格就必须等于最高支付"}], "answer": "A", "explanation": "现金流期望只有10元。若投资者高估或偏爱小概率暴富机会，正偏度本身会带来效用，使价格高于平均支付并压低未来期望回报。"}}, "09": {"field": "固定收益", "question": "一定会兑付的契据，为什么仍能跌掉四成？", "bridge": "城主兑现的是第二十年的银币，市场交易的却是今天等待这些银币的代价。两只同日到期的契据，也因此拥有不同的重量。", "quiz": {"title": "哪张债券对加息更敏感？", "question": "两张债券都在20年后到期且不会违约。甲每年支付利息，乙把全部现金流集中在第20年。市场收益率上升1个百分点时，通常哪张跌得更多？", "options": [{"id": "A", "label": "甲，因为支付次数更多"}, {"id": "B", "label": "乙，因为现金流平均回收时间更晚"}, {"id": "C", "label": "一样，因为到期日相同"}], "answer": "B", "explanation": "乙的现金流全部位于更远的未来，久期更长，贴现率变化会重复作用更多年。相同到期日并不意味着相同的利率敏感度。"}}, "10": {"field": "资产配置", "question": "风险更大的资产，为什么未必给出更高回报？", "bridge": "烈焰马赢得了最轰动的比赛，买下它的人却没有赢得更好的投资。风险、价格和融资限制之间，藏着另一套回报次序。", "quiz": {"title": "为什么更刺激的资产可能更贵？", "question": "多数投资者不能借钱，却希望组合达到很高目标收益。他们最可能共同推高哪类资产的价格？", "options": [{"id": "A", "label": "高beta、高波动、单项就可能带来巨大收益的资产"}, {"id": "B", "label": "低beta资产，因为所有人都能借钱放大它"}, {"id": "C", "label": "两类资产价格不会受融资限制影响"}], "answer": "A", "explanation": "杠杆受限时，投资者无法通过低beta资产加借款提高目标收益，只能集中追逐高beta资产。拥挤买入会抬高价格，并可能压低其未来风险调整后回报。"}}, "11": {"field": "公司金融", "question": "明明是赚钱的项目，为什么好公司反而拒绝融资？", "bridge": "北辰放弃的不是项目收益，而是在错误价格下出售自己的代价。把两张会议纪要放回公司金融里，融资顺序本身也会泄露管理层掌握的信息。", "quiz": {"title": "低估公司该不该发行新股？", "question": "公司现有资产真实值1000，市场只估600。一个项目需融资100，完成后值150。若按市场估值发行100，新投资者取得公司1/7，旧股东是否愿意融资？", "options": [{"id": "A", "label": "愿意，因为项目净现值为50"}, {"id": "B", "label": "不愿意，因为旧股东最终约剩985.71，低于不融资的1000"}, {"id": "C", "label": "无差别，因为融资只改变股数，不改变价值"}], "answer": "B", "explanation": "融资后真实总价值为1150，旧股东保留6/7，约为985.71。项目创造50，但低价发行把约64.29转给新股东，旧股东净损失约14.29。"}}, "12": {"field": "行为资产定价", "question": "没人卖出，真的代表没人反对吗？", "bridge": "听证会没有发现伪造成交，只发现价格遗漏了无法成交的意见。放回金融里，结果取决于分歧如何遇上卖空约束。", "quiz": {"title": "哪种价格最容易偏向乐观者？", "question": "投资者对一项新资产估值差异很大。乐观者可以自由买入，悲观者没有持仓且无法借券卖空。此时价格最可能怎样形成？", "options": [{"id": "A", "label": "自动等于所有投资者估值的平均数"}, {"id": "B", "label": "更多受仍有购买力的乐观边际买家影响"}, {"id": "C", "label": "悲观者即使不交易，也会按人数直接压低价格"}], "answer": "B", "explanation": "价格由能够下单的边际交易者形成。悲观者卖完现有持仓后又无法建立负面头寸，其判断不会按人数自动进入价格，乐观估值因此可能获得更大的定价权重。"}}, "13": {"field": "市场微观结构", "question": "掌握消息的人，为什么不能一次买够？", "bridge": "伊莱隐藏消息，赛恩从订单里学习消息。两人没有交谈，信息却沿着成交逐步进入了价格。", "quiz": {"title": "更深的市场意味着什么？", "question": "在线性报价规则P=P₀+λY中，如果同样大小的净订单流引起的价格变化更小，最合理的判断是什么？", "options": [{"id": "A", "label": "λ更高，市场更浅"}, {"id": "B", "label": "λ更低，市场深度更高"}, {"id": "C", "label": "订单流不可能包含任何信息"}], "answer": "B", "explanation": "λ衡量单位订单流造成的价格变化。相同订单推动价格更少，对应更低的λ和更高的市场深度；这不等于订单流完全没有信息。"}}, "14": {"field": "交易与风险", "question": "每轮期望赚钱，为什么长期账户反而缩水？", "bridge": "镜子里的平均数没有错，陈默的账户也没有错。冲突来自横向平均与唯一时间路径回答的并不是同一个问题。", "quiz": {"title": "这项交易的典型长期方向是什么？", "question": "每轮有50%概率上涨60%，50%概率下跌50%，并且每次投入全部财富。单轮算术期望收益为+5%，它的长期典型增长方向是什么？", "options": [{"id": "A", "label": "正增长，因为每轮期望收益为正"}, {"id": "B", "label": "零增长，因为上涨和下跌概率相同"}, {"id": "C", "label": "负增长，因为几何平均因子√(1.6×0.5)小于1"}], "answer": "C", "explanation": "连续复利取决于乘法路径。两轮一涨一跌后财富乘数为1.6×0.5=0.8，对应每轮几何平均因子约0.8944，所以典型长期路径缩水。"}}, "15": {"field": "财务分析", "question": "利润持续增长，现金为什么越来越少？", "bridge": "许清没有把应计都判成虚假，她只是把尚待未来验证的部分从利润总数里拆了出来。", "quiz": {"title": "哪种利润更需要继续核查持续性？", "question": "两家公司净利润相同。甲公司的利润主要对应经营现金流，乙公司的利润主要伴随应收账款和库存持续上升。其他条件相同时，哪家更需要核查后续兑现？", "options": [{"id": "A", "label": "甲公司，因为现金流会降低会计利润"}, {"id": "B", "label": "乙公司，因为更大比例利润仍依赖收款、销售和估值验证"}, {"id": "C", "label": "两者完全相同，只需比较净利润"}], "answer": "B", "explanation": "较高应计不等于造假，但意味着更多利润尚需未来现金回收、库存销售或减值结果验证。应结合行业周转、历史兑现和报表附注继续分析。"}}}</script>
  <script>
    const stories=JSON.parse(document.getElementById('storyData').textContent);
    const readerData=JSON.parse(document.getElementById("readerData").textContent);
    const storyMeta=Object.fromEntries(Object.entries(readerData).map(([number,data])=>[number,{field:data.field,question:data.question}]));
    const storyBridge=Object.fromEntries(Object.entries(readerData).map(([number,data])=>[number,data.bridge]));
    const storyArtwork=Object.fromEntries(stories.map(story=>[story.number,`assets/story-${story.number}.webp`]));
    const storyArtworkMobile=Object.fromEntries(stories.map(story=>[story.number,`assets/story-${story.number}-mobile.avif`]));
    const storyArtworkMobileFallback=Object.fromEntries(stories.map(story=>[story.number,`assets/story-${story.number}-mobile.jpg`]));
    const quizData=Object.fromEntries(Object.entries(readerData).map(([number,data])=>[number,data.quiz]));
    const homeView=document.getElementById('homeView'),readerView=document.getElementById('readerView'),reader=document.getElementById('reader'),storyShelf=document.getElementById('storyShelf'),storyMap=document.getElementById('storyMap'),storyMapStatus=document.getElementById('storyMapStatus'),readerProgress=document.getElementById('readerProgress');
    const routeHashes={home:'#home',stories:'#stories'};
    let currentIndex=-1,fontSize=Number(localStorage.getItem('fable-font-size')||19),completionObserver=null,routeFrame=0,mapFrame=0;

    function readStoredSet(key){try{const value=JSON.parse(localStorage.getItem(key)||'[]');return new Set(Array.isArray(value)?value:[])}catch{return new Set()}}
    const readStories=readStoredSet('fable-read-stories');
    function saveReadStories(){localStorage.setItem('fable-read-stories',JSON.stringify([...readStories]))}
    function metaFor(story){return storyMeta[story.number]||{field:'金融学习',question:'这个故事里，价格和选择为什么会走到这一步？'}}
    function artworkFor(story){return storyArtwork[story.number]||`assets/story-${story.number}.webp`}
    function mobileArtworkFor(story){return storyArtworkMobile[story.number]||`assets/story-${story.number}-mobile.avif`}
    function mobileFallbackFor(story){return storyArtworkMobileFallback[story.number]||`assets/story-${story.number}-mobile.jpg`}
    function targetFromLocation(){return location.hash.replace(/^#/,'')||'home'}
    function normalizeTarget(target){if(target==='home'||target==='stories')return target;return stories.some(story=>story.number===target)?target:'home'}

    function renderStoryMap(){const startIndex=Math.max(0,stories.length-5),visibleStories=stories.slice(startIndex);storyMap.innerHTML=visibleStories.map((story,offset)=>{const index=startIndex+offset;return `<button type="button" class="map-story${offset===0?' is-active':''}" data-action="open-story" data-index="${index}" aria-label="阅读《${story.title}》" ${offset===0?'aria-current="true"':''}><picture class="map-picture"><source media="(max-width:640px)" srcset="${mobileArtworkFor(story)}" type="image/avif"><source media="(max-width:640px)" srcset="${mobileFallbackFor(story)}" type="image/jpeg"><img src="${artworkFor(story)}" alt="" fetchpriority="${offset===0?'high':'auto'}" decoding="async"></picture><span class="map-caption"><small>${story.number}</small><strong>${story.title}</strong></span></button>`}).join('');storyMapStatus.innerHTML=visibleStories.map((story,offset)=>{const index=startIndex+offset;return `<button type="button" class="map-dot" data-action="show-map-story" data-index="${index}" aria-label="查看第 ${offset+1} 个故事" aria-current="${offset===0?'true':'false'}"></button>`}).join('');requestAnimationFrame(updateStoryMapActive)}
    function renderShelf(){storyShelf.innerHTML=stories.map((story,index)=>{const meta=metaFor(story),isRead=readStories.has(story.number);return `<button type="button" class="story-card" data-action="open-story" data-index="${index}" aria-label="阅读《${story.title}》"><picture class="story-card-picture"><source media="(max-width:640px)" srcset="${mobileArtworkFor(story)}" type="image/avif"><source media="(max-width:640px)" srcset="${mobileFallbackFor(story)}" type="image/jpeg"><img class="story-card-art" src="${artworkFor(story)}" alt="" decoding="async"></picture><span class="story-card-copy"><span><span class="story-card-number">寓言 ${story.number}</span> · <span class="story-card-field">${meta.field}</span></span><span><h3>${story.title}</h3><p class="story-card-question">${meta.question}</p></span><span class="story-card-footer"><span>${isRead?'<span class="read-status">已读</span>':`约 ${story.reading_minutes} 分钟`}</span><span class="card-arrow" aria-hidden="true">→</span></span></span></button>`}).join('')}
    function updateStoryMapActive(){mapFrame=0;const items=[...storyMap.querySelectorAll('.map-story')],dots=[...storyMapStatus.querySelectorAll('.map-dot')];if(!items.length)return;const mapRect=storyMap.getBoundingClientRect(),center=mapRect.left+storyMap.clientWidth/2;let activeIndex=0,closest=Infinity;items.forEach((item,index)=>{const rect=item.getBoundingClientRect(),distance=Math.abs(rect.left+rect.width/2-center);if(distance<closest){closest=distance;activeIndex=index}});items.forEach((item,index)=>{const active=index===activeIndex;item.classList.toggle('is-active',active);if(active)item.setAttribute('aria-current','true');else item.removeAttribute('aria-current')});dots.forEach((dot,index)=>dot.setAttribute('aria-current',String(index===activeIndex)))}
    function scheduleStoryMapActive(){if(mapFrame)return;mapFrame=requestAnimationFrame(updateStoryMapActive)}
    function setActiveNavigation(target){document.querySelectorAll('.primary-nav [data-route]').forEach(button=>{const active=button.dataset.route===(target==='stories'?'stories':'home');button.setAttribute('aria-current',active?'page':'false')})}

    function renderHome(target='home'){
      currentIndex=-1;homeView.hidden=false;readerView.hidden=true;document.getElementById('siteFooter').hidden=false;document.title='金融寓言｜用故事学懂金融';renderStoryMap();renderShelf();readerProgress.style.width='0';setActiveNavigation(target);
    }
    function renderStory(index){
      const story=stories[index];if(!story)return renderHome();currentIndex=index;const meta=metaFor(story),previous=stories[index-1],next=stories[index+1],quiz=quizData[story.number];
      const quizMarkup=quiz?`<section class="transfer-quiz" aria-labelledby="quizTitle"><p class="quiz-kicker">换一个场景</p><h2 id="quizTitle">${quiz.title}</h2><p class="quiz-context">${quiz.question}</p><div class="quiz-options">${quiz.options.map(option=>`<button type="button" class="quiz-option" data-action="answer-quiz" data-option="${option.id}"><strong>${option.id}.</strong> ${option.label}</button>`).join('')}</div><div class="quiz-explanation" id="quizExplanation" aria-live="polite" hidden></div></section>`:'';
      homeView.hidden=true;readerView.hidden=false;document.getElementById('siteFooter').hidden=true;localStorage.setItem('fable-last-story',story.number);setActiveNavigation('stories');
      reader.innerHTML=`<header class="story-header"><div class="story-index">寓言 ${story.number} / ${String(stories.length).padStart(2,'0')} · ${meta.field}</div><h1>${story.title}</h1><p class="story-deck">${meta.question}</p><div class="story-meta"><span>约 ${story.reading_minutes} 分钟</span></div></header><figure class="story-opening"><picture class="story-opening-picture"><source media="(max-width:640px)" srcset="${mobileArtworkFor(story)}" type="image/avif"><source media="(max-width:640px)" srcset="${mobileFallbackFor(story)}" type="image/jpeg"><img src="${artworkFor(story)}" alt="" fetchpriority="high" decoding="async"></picture></figure><section class="story-body">${story.story_html}</section><p class="story-bridge">${storyBridge[story.number]||'故事里的选择走到这里，背后的金融机制也已经露出了形状。'}</p><section class="concept-section" id="conceptSection"><div class="concept-kicker">放回金融里</div><h2>${story.concept}</h2><div class="concept-copy">${story.concept_html}</div></section>${quizMarkup}<div class="completion"><strong>这一篇读完了</strong><span>回到寓言故事，还可以从另一种市场困境继续。</span></div><nav class="story-nav" aria-label="切换寓言"><button type="button" data-action="previous-story" ${previous?'':'disabled'}><span class="nav-direction">上一篇</span><span class="nav-story-title">${previous?previous.title:'已经是第一篇'}</span></button><button type="button" data-action="next-story" ${next?'':'disabled'}><span class="nav-direction">下一篇</span><span class="nav-story-title">${next?next.title:'已经是最后一篇'}</span></button></nav>`;
      document.title=`${story.title}｜金融寓言`;observeCompletion(story.number);updateProgress();
    }

    function scrollForTarget(target){requestAnimationFrame(()=>{if(target==='stories'){document.getElementById('storyShelfSection').scrollIntoView({block:'start'})}else{window.scrollTo({top:0,left:0})}})}
    function renderRoute(target){const normalized=normalizeTarget(target),index=stories.findIndex(story=>story.number===normalized);if(index>=0)renderStory(index);else renderHome(normalized);scrollForTarget(normalized)}
    function navigate(target,options={}){const normalized=normalizeTarget(target),hash=routeHashes[normalized]||`#${normalized}`,method=options.replace?'replaceState':'pushState';if(location.hash!==hash){history[method](null,'',hash)}renderRoute(normalized)}
    function scheduleLocationRoute(){cancelAnimationFrame(routeFrame);routeFrame=requestAnimationFrame(()=>renderRoute(targetFromLocation()))}

    function showQuizExplanation(optionId){const story=stories[currentIndex],quiz=story&&quizData[story.number],explanation=document.getElementById('quizExplanation');if(!quiz||!explanation)return;reader.querySelectorAll('.quiz-option').forEach(button=>{button.disabled=true;button.classList.toggle('selected',button.dataset.option===optionId)});const selected=quiz.options.find(option=>option.id===optionId);explanation.hidden=false;explanation.innerHTML=`<strong>${optionId===quiz.answer?'结论成立':'再核对一次'}：正确答案是 ${quiz.answer}</strong><span>你选择了 ${selected?selected.id:optionId}。${quiz.explanation}</span>`;updateProgress()}
    function handleAction(action,element){if(action==='open-story'){const index=Number(element.dataset.index);if(Number.isInteger(index)&&stories[index])navigate(stories[index].number)}else if(action==='show-map-story'){const item=storyMap.querySelector(`.map-story[data-index="${element.dataset.index}"]`);if(item)item.scrollIntoView({behavior:matchMedia('(prefers-reduced-motion:reduce)').matches?'auto':'smooth',block:'nearest',inline:'start'})}else if(action==='previous-story'&&currentIndex>0){navigate(stories[currentIndex-1].number)}else if(action==='next-story'&&currentIndex<stories.length-1){navigate(stories[currentIndex+1].number)}else if(action==='answer-quiz'){showQuizExplanation(element.dataset.option)}else if(action==='font-down'){setFontSize(fontSize-1)}else if(action==='font-up'){setFontSize(fontSize+1)}else if(action==='toggle-theme'){toggleTheme()}}
    function observeCompletion(storyNumber){if(completionObserver)completionObserver.disconnect();const concept=document.getElementById('conceptSection');if(!concept)return;if(!('IntersectionObserver' in window)){readStories.add(storyNumber);saveReadStories();return}completionObserver=new IntersectionObserver(entries=>{if(!entries.some(entry=>entry.isIntersecting))return;readStories.add(storyNumber);saveReadStories()},{threshold:.12});completionObserver.observe(concept)}
    function updateProgress(){if(currentIndex<0)return;const scrollable=document.documentElement.scrollHeight-window.innerHeight,ratio=scrollable>0?Math.min(1,Math.max(0,window.scrollY/scrollable)):0;readerProgress.style.width=`${ratio*100}%`}
    function setFontSize(value){fontSize=Math.min(23,Math.max(16,value));document.documentElement.style.setProperty('--body-size',`${fontSize}px`);localStorage.setItem('fable-font-size',String(fontSize));updateProgress()}
    function toggleTheme(){const nextTheme=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=nextTheme;localStorage.setItem('fable-theme',nextTheme)}

    document.addEventListener('click',event=>{const routeControl=event.target.closest('[data-route]');if(routeControl){navigate(routeControl.dataset.route);return}const actionControl=event.target.closest('[data-action]');if(actionControl&&!actionControl.disabled)handleAction(actionControl.dataset.action,actionControl)});
    storyMap.addEventListener('scroll',scheduleStoryMapActive,{passive:true});window.addEventListener('popstate',scheduleLocationRoute);window.addEventListener('hashchange',scheduleLocationRoute);window.addEventListener('scroll',updateProgress,{passive:true});window.addEventListener('resize',()=>{updateProgress();scheduleStoryMapActive()});
    window.addEventListener('keydown',event=>{if(currentIndex<0)return;if(event.key==='ArrowLeft'&&currentIndex>0)navigate(stories[currentIndex-1].number);if(event.key==='ArrowRight'&&currentIndex<stories.length-1)navigate(stories[currentIndex+1].number);if(event.key==='Escape')navigate('stories')});
    document.getElementById('storyCount').textContent=`${stories.length} 篇完整故事`;const savedTheme=localStorage.getItem('fable-theme');if(savedTheme)document.documentElement.dataset.theme=savedTheme;setFontSize(fontSize);navigate(targetFromLocation(),{replace:true});
  </script>
</body>
</html>
