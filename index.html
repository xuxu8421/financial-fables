  <style>
    :root {

    [data-theme="dark"] {

    *{box-sizing:border-box}
    html{scroll-behavior:smooth;overflow-x: hidden;scroll-padding-top:76px}
    body{margin:0;overflow-x: hidden;color:var(--ink);background:var(--paper);font-family:"Songti SC","STSong","Noto Serif CJK SC",serif;letter-spacing:0;transition:background-color .18s,color .18s}

    button:focus-visible{outline:3px solid color-mix(in srgb,var(--gold) 80%,white);outline-offset:3px}

    .story-header h1{margin:0;font-family:"Kaiti SC","STKaiti",serif;font-size:52px;font-weight:600;line-height:1.18}
    .story-deck{margin:20px 0 0;color:var(--soft);font-size:17px;line-height:1.75}.story-meta{display:flex;flex-wrap:wrap;gap:10px 20px;margin-top:24px;color:var(--muted);font:13px/1.6 "PingFang SC",sans-serif}
    .story-opening{width:min(940px,calc(100vw - 44px));margin:38px 0 0 50%;transform:translateX(-50%)}.story-opening-picture{display:block}.story-opening img{display:block;width:100%;aspect-ratio:3/2;object-fit:cover;border-radius:6px;background:var(--mist)}

    .concept-kicker{margin-bottom:10px;color:var(--coral);font:700 12px/1.5 "PingFang SC",sans-serif}.concept-section h2{margin:0 0 30px;font-family:"Kaiti SC","STKaiti",serif;font-size:31px;font-weight:600;line-height:1.35}

    .transfer-quiz{margin-top:32px;padding:30px;border:1px solid var(--line);border-radius:6px;background:var(--raised)}
    .quiz-kicker{margin:0 0 8px;color:var(--coral);font:700 12px/1.5 "PingFang SC",sans-serif}.transfer-quiz h2{margin:0 0 12px;font-family:"Kaiti SC","STKaiti",serif;font-size:29px;font-weight:600;line-height:1.35}.quiz-context{margin:0 0 22px;color:var(--soft);font-size:16px;line-height:1.85}.quiz-options{display:grid;gap:10px}

    .completion{margin-top:28px;padding:22px 24px;border-left:4px solid var(--gold);background:color-mix(in srgb,var(--gold) 12%,var(--raised))}.completion strong{display:block;margin-bottom:5px;font:650 15px/1.5 "PingFang SC",sans-serif}.completion span{color:var(--muted);font:13px/1.7 "PingFang SC",sans-serif}
    .story-nav{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:42px}.story-nav button{min-height:84px;padding:16px 18px;border:1px solid var(--line);border-radius:6px;background:transparent;cursor:pointer;text-align:left;font-family:"PingFang SC",sans-serif}.story-nav button:last-child{text-align:right}.story-nav button:hover:not(:disabled){border-color:var(--teal);background:var(--concept)}.story-nav button:disabled{opacity:.35;cursor:default}.nav-direction{display:block;margin-bottom:6px;color:var(--muted);font-size:11px}.nav-story-title{font-size:14px;line-height:1.5}
    .mobile-dock{display:none}

    @media(min-width:901px) and (hover:hover){.story-map:hover .map-story,.story-map:focus-within .map-story{flex-grow:.72}.story-map .map-story:hover,.story-map .map-story:focus-visible{flex-grow:5}.story-map:hover .map-story .map-caption strong{opacity:0}.story-map:hover .map-story:hover .map-caption strong,.story-map .map-story:focus-visible .map-caption strong{opacity:1;white-space:normal;text-overflow:clip}}
    @media(max-width:900px){.site-header{grid-template-columns:auto 1fr auto}.primary-nav{justify-self:center}.hero{height:auto;min-height:calc(100svh - 140px)}.hero-copy{grid-template-columns:1fr;gap:18px}.hero h1{font-size:72px}.story-card,.story-card:nth-child(1),.story-card:nth-child(2){grid-column:span 6}.reader-shell{width:min(100% - 48px,var(--reader-width))}}
    @media(max-width:640px){
      :root{--body-size:18px}body{-webkit-tap-highlight-color:transparent}.site-header{height:58px;padding:0 8px;box-shadow:0 1px 12px color-mix(in srgb,var(--shadow) 45%,transparent)}.brand-button{gap:7px;padding:5px}.brand-button>span:last-child{display:none}.brand-mark{width:25px;height:25px}.primary-nav{height:58px}.primary-nav button{min-width:70px;padding:0 9px;font-size:13px}.primary-nav button[aria-current="page"]:after{right:9px;left:9px}.desktop-only{display:none}
      .hero{width:calc(100% - 32px);min-height:0;grid-template-rows:auto auto auto;gap:18px;padding:26px 0 28px}.hero-copy{gap:10px}.hero h1{font-size:52px}.hero-intro{font-size:16px;line-height:1.65}.hero-intro strong{font-size:16px}.story-map{display:grid;grid-auto-flow:column;grid-auto-columns:82vw;gap:12px;min-height:0;padding:0 22px 0 0;overflow-x:auto;overflow-y:hidden;overscroll-behavior-inline:contain;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;scroll-padding-inline:0 22px;scroll-snap-type:x mandatory;scrollbar-width:none;border:0;background:transparent}.story-map::-webkit-scrollbar{display:none}.map-story{aspect-ratio:4/5;scroll-snap-align:start;scroll-snap-stop:always;border:0;border-radius:8px;box-shadow:0 14px 30px rgba(18,38,31,.14);opacity:.7;transform:scale(.965);transform-origin:center;transition:opacity .32s ease,transform .42s cubic-bezier(.2,.8,.2,1),box-shadow .32s ease}.map-story.is-active{opacity:1;transform:scale(1);box-shadow:0 18px 38px rgba(18,38,31,.2)}.map-story:active{transform:scale(.985)}.map-caption{padding:118px 18px 18px;color:#fff;border:0;background:linear-gradient(to bottom,transparent 0%,rgba(7,15,13,.18) 35%,rgba(7,15,13,.9) 100%)}.map-caption small{color:#f3a595}.map-caption strong{font-size:18px;line-height:1.45;white-space:normal;text-overflow:clip}.story-map-status{display:flex;align-items:center;justify-content:center;gap:6px;min-height:12px}.map-dot{width:6px;height:6px;padding:0;border:0;border-radius:99px;background:color-mix(in srgb,var(--muted) 45%,transparent);transition:width .32s cubic-bezier(.2,.8,.2,1),background-color .22s ease}.map-dot[aria-current="true"]{width:24px;background:var(--teal)}
      .section-inner{width:calc(100% - 32px)}.shelf-band{padding:34px 0 68px}.section-heading{display:block}.section-heading h2{font-size:34px}.section-heading p{margin-top:12px}.story-shelf{display:grid;grid-template-columns:1fr}.story-card,.story-card:nth-child(1),.story-card:nth-child(2){position:relative;display:grid;grid-template-areas:"stack";grid-template-rows:1fr;grid-column:auto;min-height:0;aspect-ratio:4/5;border:0;border-radius:8px;box-shadow:0 12px 30px rgba(18,38,31,.12);transition:transform .22s ease,box-shadow .22s ease}.story-card:active{transform:scale(.985);box-shadow:0 7px 18px rgba(18,38,31,.12)}.story-card:before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(to bottom,rgba(7,16,14,.08) 0%,rgba(7,16,14,.32) 48%,rgba(7,16,14,.94) 100%)}.story-card-picture{grid-area:stack;width:100%;height:100%;min-width:0}.story-card-art{width:100%;height:100%;min-width:0;object-fit:cover}.story-card-copy{grid-area:stack;position:relative;z-index:2;min-height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:24px;color:#fff}.story-card-copy>span:first-child{margin-bottom:14px}.story-card h3{margin:0 0 8px;color:#fff;font-size:29px}.story-card-question{color:rgba(255,255,255,.82)}.story-card-footer{width:100%;color:rgba(255,255,255,.78);border-top-color:rgba(255,255,255,.48)}.story-card-field,.read-status,.card-arrow{color:#9fe0d1}

<body>
  <header class="site-header">
    <button type="button" class="brand-button" data-route="home" aria-label="返回金融寓言首页"><span class="brand-mark" aria-hidden="true"></span><span>金融寓言</span></button>
    <nav class="primary-nav" aria-label="主导航">
      <button type="button" data-route="home">首页</button>
      <button type="button" data-route="stories">寓言故事</button>
    </nav>
    <div class="header-actions" aria-label="阅读设置">
      <button type="button" class="icon-button desktop-only" data-action="font-down" aria-label="减小字号" title="减小字号">A−</button>
      <button type="button" class="icon-button desktop-only" data-action="font-up" aria-label="增大字号" title="增大字号">A+</button>
      <button type="button" class="icon-button" data-action="toggle-theme" aria-label="切换深浅模式" title="切换深浅模式">◐</button>
    </div>
  </header>

  <main class="home-view" id="homeView">
    <section class="hero" aria-labelledby="homeTitle">
      <div class="hero-copy">
        <div><p class="hero-kicker">FINANCIAL FABLES</p><h1 id="homeTitle">金融寓言</h1></div>
        <p class="hero-intro"><strong>复杂的金融概念，应该先发生，再被解释。</strong>先跟着人物经历一次价格、风险与选择，故事结束后，再把直觉还原成可以反复使用的金融框架。</p>
      </div>
      <div class="story-map" id="storyMap" aria-label="最新五篇故事"></div>
      <div class="story-map-status" id="storyMapStatus" aria-label="故事位置" aria-live="polite"></div>
    </section>

    <section class="shelf-band" id="storyShelfSection">
      <div class="section-inner">
        <div class="section-rule">完整故事，持续更新</div>
        <div class="section-heading">
          <h2>寓言故事</h2>
          <p><span id="storyCount"></span>，每篇独立成章。从价格、信息、流动性到资产配置，随便从哪一篇进去。</p>
        </div>
        <div class="story-shelf" id="storyShelf"></div>
      </div>
    </section>
  </main>

  <main class="reader-view" id="readerView" hidden>
    <div class="reader-progress" id="readerProgress" aria-hidden="true"></div>
    <article class="reader-shell" id="reader" aria-live="polite"></article>
    <div class="mobile-dock" aria-label="移动端阅读设置">
      <button type="button" class="icon-button" data-route="stories" aria-label="返回寓言故事" title="寓言故事">←</button>
      <button type="button" class="icon-button" data-action="font-down" aria-label="减小字号" title="减小字号">A−</button>
      <button type="button" class="icon-button" data-action="font-up" aria-label="增大字号" title="增大字号">A+</button>
    </div>
